                        <span><b>Foe slot 1</b>{result.lead_positions.enemy?.[0] || "—"}</span>
                        <span><b>Foe slot 2</b>{result.lead_positions.enemy?.[1] || "—"}</span>
                      </div>}
                      <div className="rnb-muted">Positions stay explicit through switches and replacements. Spread moves show both targets; single-target moves name the exact slot they hit.</div>
                    </div>
                  )}
                  {(result.alternate_answer_lines || []).map((alternate, alternateIndex) => (
                    <div className="rnb-turn-row" key={`alternate-answer-${alternateIndex}`}>
                      <strong style={{color: alternate.status === "winning-alternate" ? "#77d49b" : "#f0b86a"}}>
                        Backup {alternateIndex + 1}: {alternate.forbidden_answer} cannot be used
                      </strong>
                      <div className="rnb-muted">
                        {alternate.status === "winning-alternate"
                          ? `Deathless winning replacement found · confidence ${pct(alternate.confidence)}`
                          : alternate.status === "unsafe-alternate"
                            ? "The alternate cleared, but caused a Nuzlocke death and is not approved."
                            : "No complete replacement line found with this restriction."}
                      </div>
                      <div className="rnb-muted">Team tested: {(alternate.team || []).join(" · ") || "No legal team"}</div>
                      {(alternate.turns || []).map((turn) => (
                        <div className={`rnb-contingency-step${turn.is_doubles ? " doubles-turn" : ""}`} key={`alternate-${alternateIndex}-turn-${turn.turn}`}>
                          <b>Turn {turn.turn}: {turn.enemy} | {turn.answer}</b>
                          <div>{turn.action}</div>
                          <div className="rnb-muted">{turn.calc}</div>
                        </div>
                      ))}
                    </div>
                  ))}
                  {(result.turns || []).map((turn) => (
                    <div className={`rnb-turn-row${turn.is_doubles ? " doubles-turn" : ""}`} key={`rnb-turn-${turn.turn}`}>
                      <strong>Turn {turn.turn}: {turn.enemy} | {turn.answer}</strong>
                      {turn.slot_actions?.length ? <div className="doubles-slot-actions">
                        {turn.slot_actions.map((action, index) => <div className={action.side} key={`slot-action-${turn.turn}-${index}`}>
                          <b>{action.side === "player" ? "Your" : "Foe"} slot {Number(action.field_slot) + 1} · {action.actor}</b>
                          <span>{action.kind === "switch" ? `Switch → ${action.switch_to}` : `${action.move} → ${action.target}`}</span>
                        </div>)}
                      </div> : <div>{turn.action}</div>}
                      <div className="rnb-muted">{turn.calc}</div>
                      <div className="rnb-muted">HP: {turn.your_hp} | Enemy: {turn.enemy_hp} | {turn.consistency}</div>
                      {(turn.risks || []).slice(0, 3).map((risk, index) => <div className="rnb-muted" key={`rnb-risk-${turn.turn}-${index}`}>Risk: {risk}</div>)}
                    </div>
                  ))}
                  {result.optimized_item_line && (
                    <>
                      <div className="rnb-turn-row">
                        <strong>Recommended item line</strong>
                        <div className="rnb-muted">
                          Result: {result.optimized_item_line.result} | Confidence {pct(result.optimized_item_line.confidence)}
                        </div>
                        <div className="rnb-muted">{result.optimized_item_line.item_retry_policy}</div>
                        {(result.optimized_item_line.item_changes || []).map((change, index) => (
                          <div className="rnb-muted" key={`rnb-item-change-${index}`}>
                            {change.pokemon}: {change.old_item ? `${change.old_item} -> ` : ""}{change.new_item} | {change.reason}
                          </div>
                        ))}
                      </div>
                      {(result.optimized_item_line.turns || []).map((turn) => (
                        <div className="rnb-turn-row" key={`rnb-opt-turn-${turn.turn}`}>
                          <strong>Alt Turn {turn.turn}: {turn.enemy} | {turn.answer}</strong>
                          <div>{turn.action}</div>
                          <div className="rnb-muted">{turn.calc}</div>
                          <div className="rnb-muted">HP: {turn.your_hp} | Enemy: {turn.enemy_hp} | {turn.consistency}</div>
                          {(turn.risks || []).slice(0, 3).map((risk, index) => <div className="rnb-muted" key={`rnb-opt-risk-${turn.turn}-${index}`}>Risk: {risk}</div>)}
                        </div>
                      ))}
                    </>
                  )}
                  <table className="rnb-matchup-table">
                    <thead>
                      <tr>
                        <th>Your mon</th>
                        <th>Enemy</th>
                        <th>Your best</th>
                        <th>Enemy best</th>
                      </tr>
                    </thead>
                    <tbody>
                      {(result.matchups || []).slice(0, 12).map((row, index) => (
                        <tr key={`rnb-matchup-${index}`}>
                          <td>{row.player}</td>
                          <td>{row.enemy}</td>
                          <td>{row.best_move || "none"} | {row.damage}</td>
                          <td>{row.enemy_best || "none"} | {row.enemy_damage}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </>
              )}
            </div>
          </section>
        );
      }

      function TrainerDropdown({ trainers, value, onChange, label, disabledBeforeId = null }) {
        const [query, setQuery] = useState("");
        const [open, setOpen] = useState(false);
        const catalog = trainers || [];
        const selected = catalog.find((trainer)=>Number(trainer.id) === Number(value));
        const normalized = query.trim().toLowerCase();
        const options = catalog.filter((trainer) => {
          if (!normalized) return true;
          const text = [trainer.trainer_name, trainer.label, trainer.location, trainer.section, trainer.is_double ? "double doubles 2v2" : "single"].filter(Boolean).join(" ").toLowerCase();
          return normalized.split(/\s+/).every((token)=>text.includes(token));
        });
        const minimumIndex = disabledBeforeId == null ? -1 : catalog.findIndex((trainer)=>Number(trainer.id) === Number(disabledBeforeId));
        function choose(trainer) {
          onChange(Number(trainer.id));
          setOpen(false);
          setQuery("");
        }
        return <div className="trainer-dropdown">
          <label>{label}</label>
          <button type="button" className="trainer-dropdown-trigger" aria-haspopup="listbox" aria-expanded={open} onClick={()=>setOpen((current)=>!current)}>
            <span>{selected ? `${selected.is_double ? "2v2 · " : ""}${selected.trainer_name}` : "Choose a trainer"}</span>
            <small>{selected ? selected.location : `${catalog.length} trainers available`}</small>
          </button>
          {open && <div className="trainer-dropdown-popover">
            <input autoFocus type="search" value={query} onChange={(event)=>setQuery(event.target.value)} placeholder="Search trainer, class, location, or double…" aria-label={`Search ${label.toLowerCase()}`} />
            <div className="trainer-search-count">{options.length} of {catalog.length} trainers</div>
            <div className="trainer-dropdown-options" role="listbox" aria-label={`${label} options`}>
              {options.length ? options.map((trainer) => {
                const trainerIndex = catalog.findIndex((item)=>Number(item.id) === Number(trainer.id));
                const disabled = minimumIndex >= 0 && trainerIndex < minimumIndex;
                return <button type="button" role="option" aria-selected={Number(trainer.id) === Number(value)} disabled={disabled} className={Number(trainer.id) === Number(value) ? "active" : ""} onClick={()=>choose(trainer)} key={`${label}-${trainer.id}`}><span>{trainer.is_double ? "2v2 · " : ""}{trainer.trainer_name}</span><small>{trainer.location}</small></button>;
              }) : <div className="trainer-search-empty">No trainers match that search.</div>}
            </div>
          </div>}
        </div>;
      }

      function GauntletSetupModal({ gameMode, trainers, form, setForm, onClose, onRun, running, teamImports, setTeamImports, localForm }) {
        const [query, setQuery] = useState(gameMode === "emerald" ? "" : "breeder");
        const selected = form.trainer_ids || [];
        const normalized = query.trim().toLowerCase();
        const matches = trainers.filter((trainer) => !normalized || `${trainer.trainer_name} ${trainer.location} ${trainer.label}`.toLowerCase().includes(normalized));
        const visibleMatches = matches.slice(0, 24);
        function applyRuleset(ruleset) {
          const presets = {
            "hardcore-nuzlocke": { items_in_battle:false, allow_revives:false },
            "nuzlocke": { items_in_battle:true, allow_revives:false },
            "standard": { items_in_battle:true, allow_revives:true },
          };
          setForm({ ...form, ruleset, ...(presets[ruleset] || {}) });
        }
        function useEliteFourRoute() {
          const names = ["Elite Four Sidney", "Elite Four Phoebe", "Elite Four Glacia", "Elite Four Drake", "Champion Wallace"];
          const route = names.map((name) => trainers.find((trainer) => trainer.trainer_name === name)).filter(Boolean);
          if (route.length !== 5) return;
          setForm({
            ...form, trainer_ids: route.map((trainer) => trainer.id), route_mode:"until",
            start_trainer_id:route[0].id, end_trainer_id:route[4].id, next_count:4,
            healing_mode:"bag", back_to_back:false, ruleset:"hardcore-nuzlocke",
            items_in_battle:false, allow_revives:false, hint_mode:false, max_total_faints:3,
          });
        }
        function buildRoute(changes) {
          const next = { ...form, ...changes };
          const startIndex = trainers.findIndex((trainer) => trainer.id === Number(next.start_trainer_id));
          if (startIndex < 0) return setForm({ ...next, trainer_ids: [] });
          let route;
          if (next.route_mode === "until") {
            const endIndex = trainers.findIndex((trainer) => trainer.id === Number(next.end_trainer_id));
            route = endIndex >= startIndex ? trainers.slice(startIndex, endIndex + 1) : [];
          } else {
            route = trainers.slice(startIndex, startIndex + Math.max(0, Number(next.next_count || 0)) + 1);
            next.end_trainer_id = route[route.length - 1]?.id ?? next.start_trainer_id;
          }
          if (gameMode === "emerald" && next.required_path) {
            route = route.filter((trainer) => trainer.required);
          }
          setForm({ ...next, trainer_ids: route.map((trainer) => trainer.id) });
        }
        return <div className="gauntlet-overlay" role="presentation" onMouseDown={(event) => { if (event.target === event.currentTarget) onClose(); }}>
          <section className="gauntlet-modal" role="dialog" aria-modal="true" aria-label="Set up consecutive battles">
            <div className="gauntlet-modal-head">
            <div><div className="sim-kicker">GAUNTLET · MULTIPLE FIGHTS</div><h2>Build the trainer route.</h2><p>{gameMode === "emerald" ? "Gauntlet plans trainers in succession. It carries damage forward or models a Center and PC visit between fights. Routes with a supported overworld replay say so explicitly." : "Gauntlet runs trainers in succession. For one trainer, use Simulator. Center visits are recorded: heal, open the real PC, show the chosen party and items, then walk to the fight."}</p></div>
              <button onClick={onClose} aria-label="Close gauntlet setup">Close</button>
            </div>
            {gameMode === "emerald" && <button className="elite-four-preset" onClick={useEliteFourRoute}><span>RECOMMENDED JUDGE TEST</span><strong>Load the Elite Four → Wallace Gauntlet</strong><small>Five fights · Hardcore Nuzlocke · bag healing between rooms · no Revives</small></button>}
            <div className="ruleset-grid" aria-label="Battle rules">
              <label>Ruleset<select value={form.ruleset || "hardcore-nuzlocke"} onChange={(event) => applyRuleset(event.target.value)}><option value="hardcore-nuzlocke">Hardcore Nuzlocke</option><option value="nuzlocke">Nuzlocke</option><option value="standard">Standard Emerald</option><option value="custom">Custom</option></select></label>
              <label>Last-resort leveling<select value={form.leveling_policy || "party-max"} onChange={(event) => setForm({ ...form, leveling_policy:event.target.value })}><option value="none">Never level</option><option value="party-max">Rare Candy to current party max</option><option value="boss-cap">Rare Candy up to boss ace</option></select></label>
              <label>Sacrifice fallback<select value={Number(form.max_total_faints ?? 3)} onChange={(event) => setForm({ ...form, max_total_faints:Number(event.target.value) })}><option value="0">Zero faints only</option><option value="1">Prefer zero · allow 1</option><option value="2">Prefer zero · allow 2</option><option value="3">Prefer zero · allow up to 3</option></select></label>
              <button className={form.items_in_battle ? "active" : ""} onClick={() => setForm({ ...form, ruleset:"custom", items_in_battle:!form.items_in_battle })}>Items in battle: {form.items_in_battle ? "YES" : "NO"}</button>
              <button className={form.allow_revives ? "active" : ""} onClick={() => setForm({ ...form, ruleset:"custom", allow_revives:!form.allow_revives })}>Revives: {form.allow_revives ? "YES" : "NO"}</button>
              <button className={form.hint_mode ? "active" : ""} onClick={() => setForm({ ...form, hint_mode:!form.hint_mode })}>Hint mode: {form.hint_mode ? "ON" : "OFF"}</button>
            </div>
            <div className="gauntlet-mode three" aria-label="Between battle healing">
              <button className={(form.healing_mode || "bag") === "none" ? "active" : ""} onClick={() => setForm({ ...form, healing_mode:"none", back_to_back: true })}>
                <strong>Back-to-back battles</strong><small>No healing. HP, status, faints, and consumed berries carry into the next trainer.</small>
              </button>
              <button className={(form.healing_mode || "bag") === "bag" ? "active" : ""} onClick={() => setForm({ ...form, healing_mode:"bag", back_to_back: false })}>
                <strong>Bag healing</strong><small>Restore HP, status, and PP between fights using owned supplies. The party cannot visit the PC.</small>
              </button>
              <button className={form.healing_mode === "pokemon-center" ? "active" : ""} onClick={() => setForm({ ...form, healing_mode:"pokemon-center", back_to_back: false })}>
                <strong>Center + PC between fights</strong><small>Heal, inspect the full live PC box, switch the party, and redistribute only held items the save actually owns.</small>
              </button>
            </div>
            <div className="gauntlet-mode" aria-label="Trainer route rule">
              <button className={form.route_mode !== "until" ? "active" : ""} onClick={() => buildRoute({ route_mode: "next" })}>
                <strong>Fight the next trainers</strong><small>Start at one trainer, then automatically include the next number of trainers in game order.</small>
              </button>
              <button className={form.route_mode === "until" ? "active" : ""} onClick={() => buildRoute({ route_mode: "until", end_trainer_id: form.end_trainer_id || form.start_trainer_id })}>
                <strong>Fight through a target</strong><small>Continue from the starting trainer until the selected target trainer is beaten, inclusive.</small>
              </button>
            </div>
            {gameMode === "emerald" && <div className="gauntlet-mode" aria-label="Emerald story path">
              <button className={!form.required_path ? "active" : ""} onClick={() => buildRoute({ required_path: false })}><strong>Every trainer in order</strong><small>Include optional trainers between the selected start and finish.</small></button>
              <button className={form.required_path ? "active" : ""} onClick={() => buildRoute({ required_path: true })}><strong>Required story path</strong><small>Use only the bold required trainers from the Emerald sheet.</small></button>
            </div>}
            <div className="grid2">
              <TrainerDropdown trainers={trainers} value={form.start_trainer_id} onChange={(trainerId)=>buildRoute({start_trainer_id:trainerId})} label="Starting trainer" />
              {form.route_mode === "until" ? <TrainerDropdown trainers={trainers} value={form.end_trainer_id} onChange={(trainerId)=>buildRoute({end_trainer_id:trainerId})} label="Final trainer to beat" disabledBeforeId={form.start_trainer_id} />
                : <label>Trainers after the start<input type="number" min="1" max="511" value={form.next_count ?? 4} onChange={(event) => buildRoute({ next_count: Math.max(1, Math.min(511, Number(event.target.value) || 1)) })} /></label>}
            </div>
            <div className="gauntlet-builder">
              <div className="gauntlet-search-results">
                <label>Search every trainer</label>
                <input autoFocus value={query} onChange={(event) => setQuery(event.target.value)} placeholder="Try breeder, Corgi, Route 116…" />
                <div className="trainer-search-count">{matches.length} of {trainers.length} trainers match{matches.length > visibleMatches.length ? ` · showing the first ${visibleMatches.length}` : ""}</div>
                <div className="gauntlet-search-list">
                  {visibleMatches.map((trainer) => <div className="gauntlet-search-row" key={`gauntlet-search-${trainer.id}`}><span>{trainer.label}</span><div className="gauntlet-queue-actions"><button onClick={() => buildRoute({ start_trainer_id: trainer.id })}>Start here</button>{form.route_mode === "until" && <button onClick={() => buildRoute({ end_trainer_id: trainer.id })}>End here</button>}</div></div>)}
                </div>
              </div>
              <div className="gauntlet-queue">
                <div className="sim-kicker">GENERATED BATTLE ORDER · {selected.length}</div>
                {selected.length === 0 ? <div className="empty">Choose a valid starting and ending trainer.</div> : selected.map((id, index) => {
                  const trainer = trainers.find((item) => item.id === id);
                  return <div className="gauntlet-queue-row" key={`gauntlet-queue-${id}`}>
                    <span><strong>{index + 1}.</strong> {trainer?.label || `Trainer ${id}`}</span>
                    <span>{index === 0 ? "START" : index === selected.length - 1 ? "FINISH" : "NEXT"}</span>
                  </div>;
                })}
              </div>
            </div>
            <div className="simulator-state-box">
              <strong>Party source</strong>
              <div className="sim-read-status">{gameMode === "emerald" ? "The starting trainer loads the exact party and legal Box 1–12 roster decoded from its captured checkpoint. No ROM or local save is needed." : `The app reads the party and PC from ${localForm?.pc_state || localForm?.state || "your selected save"}.`}</div>
              <details>
                <summary>Use an imported team if the save cannot be read</summary>
                <textarea className="rnb-textarea" value={teamImports || ""} onChange={(event) => setTeamImports(event.target.value)} placeholder="Paste Pokémon Showdown team text here" />
              </details>
            </div>
            <div className="gauntlet-modal-actions">
              <div className="node-meta">The solver always ranks zero-faint routes first, then uses no more than the selected sacrifice fallback. Sacrificed Pokémon stay dead because Revives are disabled. Box 13 and Box 14 remain excluded. Every run saves both an MP4 replay and its full text log.</div>
              <button className="primary" onClick={onRun} disabled={running || selected.length < 2}>{running ? "Solving…" : `Solve ${selected.length} fights`}</button>
            </div>
          </section>
        </div>;
      }

      function videosForRun(run) {
        if (run?.comparison) {
          return [
            { label: "Original team", video_url: run.comparison.original_video_url, video_ready: Boolean(run.comparison.original_video_url) },
            { label: "Approved team", video_url: run.comparison.approved_video_url, video_ready: Boolean(run.comparison.approved_video_url) },
          ].filter((video) => video.video_ready);
        }
        if ((run?.videos || []).length) return run.videos.filter((video) => video.video_ready && video.video_url);
        if (run?.video_ready && run?.video_url) return [{ label: "Full game replay", video_url: run.video_url, video_ready: true }];
        return [];
      }

      function VideoLightbox({ title, subtitle, videos, initialIndex = 0, onClose }) {
        const [index, setIndex] = useState(initialIndex);
        const selectedVideo = videos[index] || videos[0];
        useEffect(() => {
          const onKeyDown = (event) => { if (event.key === "Escape") onClose(); };
          window.addEventListener("keydown", onKeyDown);
          return () => window.removeEventListener("keydown", onKeyDown);
        }, [onClose]);
        if (!selectedVideo) return null;
        return <div className="video-lightbox" role="presentation" onMouseDown={(event) => { if (event.target === event.currentTarget) onClose(); }}>
          <section className="video-lightbox-dialog" role="dialog" aria-modal="true" aria-label={title || "Recorded replay"}>
            <div className="video-lightbox-head"><div><strong>{selectedVideo.label || title || "Recorded replay"}</strong><span>{subtitle || title || "Uncut game recording"}</span></div><button onClick={onClose} aria-label="Close video">Close</button></div>
            <video className="video-lightbox-player" key={selectedVideo.video_url} controls autoPlay preload="metadata" src={selectedVideo.video_url} />
            {videos.length > 1 && <div className="video-lightbox-switcher" aria-label="Videos in this run">{videos.map((video, videoIndex) => <button className={videoIndex === index ? "active" : ""} onClick={() => setIndex(videoIndex)} key={`${video.video_url}-${videoIndex}`}>{video.label || `Replay ${videoIndex + 1}`}</button>)}</div>}
          </section>
        </div>;
      }

      function VideoPicker({ videos, title, subtitle }) {
        const readyVideos = (videos || []).filter((video) => video.video_ready && video.video_url);
        const [openIndex, setOpenIndex] = useState(null);
        if (!readyVideos.length) return null;
        return <>
          <div className="video-picker">{readyVideos.map((video, index) => <button onClick={() => setOpenIndex(index)} key={`${video.video_url}-${index}`}>Watch · {video.label || `Replay ${index + 1}`}</button>)}</div>
          {openIndex !== null && <VideoLightbox title={title} subtitle={subtitle} videos={readyVideos} initialIndex={openIndex} onClose={() => setOpenIndex(null)} />}
        </>;
      }

      function EvidenceLibrary({ runs, kind }) {
        const [openDays, setOpenDays] = useState({});
        const [viewer, setViewer] = useState(null);
        const groups = useMemo(() => {
          const grouped = new Map();
          (runs || []).forEach((run) => {
            const created = run.created_at ? new Date(run.created_at) : null;
            const validDate = created && !Number.isNaN(created.getTime());
            const key = validDate ? `${created.getFullYear()}-${String(created.getMonth() + 1).padStart(2,"0")}-${String(created.getDate()).padStart(2,"0")}` : "unknown";
            if (!grouped.has(key)) grouped.set(key, { key, date: validDate ? created : null, runs: [] });
            grouped.get(key).runs.push(run);
          });
          return [...grouped.values()].sort((a, b) => (b.date?.getTime() || 0) - (a.date?.getTime() || 0));
        }, [runs]);
        const statusFor = (run) => run.proof_complete ? "CARTRIDGE VERIFIED" : run.strategy_status === "team_change_required" ? "TEAM CHANGE REQUIRED" : run.strategy_status === "conditionally_approved" ? "CRIT PIVOT READY" : run.result === "route-complete" ? "PROOF INCOMPLETE" : "STOPPED";
        const titleFor = (run) => kind === "gauntlet" ? `${run.completed || 0} of ${run.queued || 0} fights completed` : (run.trainer || "Simulator run");
        const detailFor = (run) => kind === "gauntlet"
          ? (run.proof_complete ? `${run.emulator_validation?.fixed_deathless_wins ?? 0}/${run.emulator_validation?.fixed_replays ?? 0} deathless uncut replays${run.emulator_validation?.minimum_player_hp ? ` · minimum observed HP ${run.emulator_validation.minimum_player_hp}` : ""} · preparation and travel included.` : (run.proof_error || run.stopped_reason || "Saved planner diagnosis."))
          : `${run.turn_count || 0} turns · ${run.player_faints || 0} faints · ${run.confidence_replays || 0} confidence replays`;
        return <>
          <div className="evidence-library">
            {groups.map((group) => {
              const open = Boolean(openDays[group.key]);
              const videoCount = group.runs.reduce((total, run) => total + videosForRun(run).length, 0);
              const label = group.date ? group.date.toLocaleDateString(undefined, { weekday:"long", month:"long", day:"numeric", year:"numeric" }) : "Date unavailable";
              return <section className={`evidence-day ${open ? "open" : ""}`} key={group.key}>
                <button className="evidence-day-toggle" onClick={() => setOpenDays((days) => ({ ...days, [group.key]: !open }))} aria-expanded={open}>
                  <span className="evidence-day-chevron">⌄</span><span className="evidence-day-title"><strong>{label}</strong><span>{group.runs.length} saved {group.runs.length === 1 ? "run" : "runs"}</span></span><span className="evidence-day-count">{videoCount} {videoCount === 1 ? "video" : "videos"}</span>
                </button>
                {open && <div className="evidence-run-list">{group.runs.map((run) => {
                  const videos = videosForRun(run);
                  const created = run.created_at ? new Date(run.created_at) : null;
                  const time = created && !Number.isNaN(created.getTime()) ? created.toLocaleTimeString([], { hour:"numeric", minute:"2-digit" }) : "Saved run";
                  const logHref = kind === "gauntlet" ? `/api/calc/gauntlet/runs/${encodeURIComponent(run.id)}` : `/api/simulator/runs/${encodeURIComponent(run.id)}`;
                  return <article className="evidence-run-row" key={run.id}>
                    <div className="evidence-run-copy"><strong>{time} · {titleFor(run)}</strong><span>{detailFor(run)}</span></div>
                    <div className="evidence-run-actions"><span className="evidence-badge">{statusFor(run)}</span>{videos.length ? <button className="evidence-watch" onClick={() => setViewer({ run, videos })}>Watch {videos.length === 1 ? "video" : `${videos.length} videos`}</button> : <span className="evidence-badge">NO VIDEO</span>}<a href={logHref} target="_blank">Full log</a></div>
                  </article>;
                })}</div>}
              </section>;
            })}
          </div>
          {viewer && <VideoLightbox title={titleFor(viewer.run)} subtitle={viewer.run.created_at ? new Date(viewer.run.created_at).toLocaleString() : "Saved replay"} videos={viewer.videos} onClose={() => setViewer(null)} />}
        </>;
      }

      function GauntletTeamState({ team }) {
        return <>{(team || []).map((member, index) => <div className="gauntlet-mon-state" key={`${member.name}-${member.slot ?? index}`}><span>{member.name}{member.status ? ` · ${member.status}` : ""}{member.consumed_item ? " · item used" : ""}</span><strong>{member.hp}/{member.max_hp}</strong></div>)}</>;
      }

      function GauntletView({ gameMode, trainers, form, result, status, progress, onConfigure, onRunProven, savedRuns, localForm, setLocalForm }) {
        const [playbooks, setPlaybooks] = useState([]);
        useEffect(() => {
          if (gameMode === "emerald") {
            setPlaybooks([]);
            return;
          }
          fetch("/api/calc/gauntlet/playbooks").then((response) => response.json()).then((data) => {
            setPlaybooks(data.playbooks || []);
          }).catch(() => setPlaybooks([{ id:"unavailable", ready:false, error:"Preflight unavailable" }]));
        }, [gameMode]);
        const queue = (form.trainer_ids || []).map((id) => trainers.find((trainer) => trainer.id === id)).filter(Boolean);
        const verifiedRuns = (savedRuns || []).filter((run) => run.proof_complete);
        const readyPlaybooks = playbooks.filter((item) => item.ready);
        const featuredPlaybook = readyPlaybooks.find((item) => {
          const ids = item.trainer_ids || [];
          return ids.length === form.trainer_ids.length && ids.every((id, index) => Number(id) === Number(form.trainer_ids[index]));
        }) || [...readyPlaybooks].sort((a, b) => Number(b.trainer_count || 0) - Number(a.trainer_count || 0))[0];
        const localInputsReady = Boolean(localForm.rom && (localForm.pc_state || localForm.state || featuredPlaybook?.starting_state));
        return <section className="gauntlet-view" aria-label="Multi-fight gauntlet solver">
          <div className="gauntlet-hero">
            <div><div className="sim-kicker">{gameMode === "emerald" ? "POKÉMON EMERALD ROUTE PLANNER" : "EMULATOR-BACKED POKEMON SEARCH"}</div><h2>{gameMode === "emerald" ? "Plan several fights from one real save." : "Plan the route. Replay it on the cartridge."}</h2><p>{queue.length ? queue.map((trainer) => trainer.trainer_name).join(" → ") : (gameMode === "emerald" ? "Choose a starting trainer and how far to continue. The planner carries HP and status or models a Center visit between fights." : "The strongest saved run below cleared eight connected fights twice with no cuts or mid-run state reloads.")}</p></div>
            <div className="sim-action-row"><button className="ghost" onClick={onConfigure}>Configure route</button>{featuredPlaybook && <button className="primary" onClick={()=>onRunProven(featuredPlaybook)} disabled={progress?.running || !localInputsReady}>{progress?.running ? "Running in game…" : localInputsReady ? `Run this ${featuredPlaybook.trainer_count}-fight route` : "Add the ROM to run"}</button>}</div>
          </div>
          {gameMode !== "emerald" && <div className={`sim-line-record ${playbooks.length && !playbooks.some((item)=>item.ready) ? "sim-video-error" : ""}`}><strong>{playbooks.some((item)=>item.ready) ? "PLAYBOOKS READY" : "CHECKING PLAYBOOKS"}</strong> · {playbooks.some((item)=>item.ready) ? playbooks.filter((item)=>item.ready).map((item)=>`${item.label} (${item.trainer_count} fights)`).join(" · ") : (playbooks[0]?.error || "validating routes, battle inputs, Box rules, and recording assets")}</div>}
          <div className="gauntlet-summary">
            <div><strong>{queue.length}</strong>Queued fights</div>
            <div><strong>{form.back_to_back ? "NO" : "YES"}</strong>Healing between</div>
            <div><strong>{result ? pct(result.route_confidence) : verifiedRuns.length}</strong>{result ? "Route confidence" : "Verified runs"}</div>
            <div><strong>{result ? `${result.completed}/${result.queued}` : verifiedRuns.length ? "2×" : "—"}</strong>{result ? "Fights solved" : "Uncut proof"}</div>
          </div>
          {gameMode === "emerald" && <div className="gauntlet-rule-strip"><strong>{(form.ruleset || "hardcore-nuzlocke").replaceAll("-", " ")}</strong><span>{form.items_in_battle ? "Battle items allowed" : "No items in battle"}</span><span>{form.allow_revives ? "Revives allowed" : "No Revives"}</span><span>Zero-first · max {Number(form.max_total_faints ?? 3)} faints</span><span>{(form.healing_mode || "bag").replaceAll("-", " ")} healing</span><span>Hints {form.hint_mode ? "on" : "off"}</span></div>}
          {gameMode === "emerald" ? <div className="sim-line-record"><strong>ROM-FREE JUDGE RUN</strong> · The opening trainer automatically loads the party and legal Box 1–12 roster decoded from its captured checkpoint.</div> : <div className="local-input-strip" aria-label="Local emulator inputs">
            <label>Local {gameMode === "emerald" ? "Pokémon Emerald" : "Run & Bun"} ROM<input value={localForm.rom} onChange={(event) => setLocalForm({ ...localForm, rom: event.target.value })} placeholder={gameMode === "emerald" ? "/path/to/your/Pokemon Emerald.gba" : "/path/to/your/RunAndBun.gba"} /><small>Required only to run new emulator searches. The ROM stays on this computer.</small></label>
            <label>Starting save<input value={localForm.pc_state || localForm.state} onChange={(event) => setLocalForm({ ...localForm, pc_state: event.target.value, result_state: "" })} placeholder={gameMode === "emerald" ? "/path/to/Pokemon Emerald.sav or checkpoint.ss0" : "/path/to/starting-checkpoint.ss0"} /><small>{gameMode === "emerald" ? "A .sav is converted automatically. A checkpoint is used directly." : "Use the overworld or PC checkpoint that begins the connected route."}</small></label>
          </div>}
          {progress && <div className="task-progress-card" role="progressbar" aria-label="Gauntlet route progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow={Math.round(progress.pct || 0)}>
            <div className="task-progress-head"><span>{progress.stage === "cartridge-proof" ? `Cartridge proof: ${progress.completed_replays || 0}/${progress.total_replays || 2} replays · ${progress.video_ready ? "video ready" : "video pending"}` : progress.running ? `Fight ${progress.current || 1} of ${progress.total || queue.length}: ${progress.trainer || "starting"}` : (progress.phase || "complete")}</span><strong>{Math.round(progress.pct || 0)}%</strong></div>
            <div className="task-progress-track"><div className="task-progress-fill" style={{ width: `${Math.max(1, progress.pct || 0)}%` }} /></div>
            <div className="sim-read-status">{progress.phase || "preparing route"}</div>
          </div>}
          {status !== "ready" && <div className={`sim-running-note ${result?.result === "route-stopped" ? "sim-video-error" : ""}`}>{status}</div>}
          {!result ? <div className="empty">Open Configure route to choose the trainer order and whether damage carries forward.</div> : <div className="gauntlet-fights">
            {result.saved_run?.id && <div className="sim-line-record">Permanent route log: <a href={`/api/calc/gauntlet/runs/${encodeURIComponent(result.saved_run.id)}`} target="_blank">open full request, teams, items, turns, and result</a>{result.cache_hit ? " · exact saved route reused" : ""}</div>}
            {result.proof_complete ? <div className="sim-line-record"><strong>CARTRIDGE VERIFIED</strong> · {result.emulator_validation?.fixed_deathless_wins || 0}/{result.emulator_validation?.fixed_replays || 0} full routes were deathless{result.emulator_validation?.minimum_player_hp ? `; minimum observed HP was ${result.emulator_validation.minimum_player_hp}` : ""}. The approved uncut videos are ready. The fight cards below are calculator estimates; the cartridge verdict is authoritative.</div> : result.result === "route-complete" ? <div className="sim-line-record"><strong>VIDEO + TEXT SAVED</strong> · The deterministic planner replay and full complementary log were generated together. This is simulator evidence, not a cartridge claim.</div> : <div className="sim-video-error">{result.stopped_reason || "The current party did not produce a complete route. Open the diagnosis below for specific changes."}</div>}
            <VideoPicker videos={result.videos || []} title="Current route evidence" subtitle="Video replay with complementary saved text" />
            {(result.fights || []).map((fight) => <article className="gauntlet-fight" key={`${fight.position}-${fight.trainer}`}>
              <div className="gauntlet-fight-head"><h3>{fight.position}. {fight.trainer}</h3><span>{fight.result === "win-line" ? "CLEARED" : "ROUTE STOPS"} · {pct(fight.confidence)}</span></div>
              <div className="node-meta">{fight.location} · {fight.is_doubles ? "Double battle" : "Single battle"} · {(fight.turns || []).length} turns</div>
              <div className="gauntlet-hp-grid"><div><b>ENTERED FIGHT</b><GauntletTeamState team={fight.starting_team} /></div><div><b>LEFT FIGHT</b><GauntletTeamState team={fight.ending_team} /></div></div>
              <PreparationDiagnosis diagnosis={fight.failure_diagnosis} />
              {fight.nuzlocke_failure && <div className="sim-video-error"><strong>NUZLOCKE LINE REJECTED</strong> · Fainted: {(fight.nuzlocke_failure.fainted || []).join(", ")}. The trainer may be beaten, but this route does not count.</div>}
              {fight.accepted_sacrifices && <div className="last-resort-disclosure"><strong>BOUNDED SACRIFICE FALLBACK</strong><span>{(fight.accepted_sacrifices.fainted || []).join(", ")} · {fight.accepted_sacrifices.total_faints}/{fight.accepted_sacrifices.max_total_faints} route faint budget used</span><small>Zero-faint lines were ranked first. Fainted Pokémon remain unavailable for every later fight.</small></div>}
              {fight.preparation?.box_visit && <div className="sim-ci">Pokémon Center prep · withdrew {(fight.preparation.chosen || []).join(" · ")}{Object.keys(fight.preparation.held_items || {}).length ? ` · items: ${Object.entries(fight.preparation.held_items).map(([name,item]) => `${name}—${item}`).join(", ")}` : ""}</div>}
              {(fight.preparation?.leveling || []).length > 0 && <div className="last-resort-disclosure"><strong>LAST-RESORT RARE CANDY USE</strong><span>{fight.preparation.leveling.map((change) => `${change.pokemon}: Lv. ${change.from} → ${change.to}`).join(" · ")}</span><small>The original roster failed first. This change is included in the saved run and video disclosure.</small></div>}
              <details className="sim-replay-details"><summary>Open full turn-by-turn line</summary>{(fight.turns || []).map((turn, index) => <div className="sim-turn-detail" key={`${fight.position}-turn-${turn.turn || index}`}><strong>Turn {turn.turn || index + 1}: {turn.action || turn.plan || turn.answer || "Continue line"}</strong><span>{turn.calc || turn.outcome || ""}</span></div>)}</details>
              {(fight.alternate_answer_lines || []).map((alternate, alternateIndex) => <details className="sim-replay-details" key={`${fight.position}-backup-${alternateIndex}`}><summary>Backup {alternateIndex + 1} · no {alternate.forbidden_answer} · {alternate.status === "winning-alternate" ? "DEATHLESS WIN" : alternate.status === "unsafe-alternate" ? "UNSAFE · DEATH OCCURRED" : "NO CLEAR"}</summary><div className="sim-ci">Different team: {(alternate.team || []).join(" · ") || "none"} · confidence {pct(alternate.confidence)}</div>{(alternate.turns || []).map((turn, index) => <div className="sim-turn-detail" key={`${fight.position}-backup-${alternateIndex}-turn-${turn.turn || index}`}><strong>Turn {turn.turn || index + 1}: {turn.action || turn.answer || "Continue line"}</strong><span>{turn.calc || ""}</span></div>)}</details>)}
            </article>)}
          </div>}
          {(savedRuns || []).length > 0 && <section className="sim-video-log"><div className="sim-header"><div><h3>{gameMode === "emerald" ? "Saved route logs" : "Cartridge evidence"}</h3><div className="sim-subtitle">Runs are grouped by date. {gameMode === "emerald" ? "Open a day to inspect the planner result; a Watch button appears only when an uncut game replay really exists." : "Open a day, then choose the exact uncut replay you want to watch."}</div></div><div className="sim-count">{savedRuns.length} saved</div></div><EvidenceLibrary runs={savedRuns} kind="gauntlet" /></section>}
        </section>;
      }

      function SimulatorSetupModal({ gameMode, form, setForm, onClose, onInspect, onCheckpoint, onRun, running, inspectStatus }) {
        function startRun() {
          onClose();
          onRun();
        }
        return <div className="gauntlet-overlay" role="presentation" onMouseDown={(event) => { if (event.target === event.currentTarget && !running) onClose(); }}>
          <section className="gauntlet-modal simulator-modal" role="dialog" aria-modal="true" aria-label="Set up one battle simulation">
            <div className="gauntlet-modal-head">
              <div><div className="sim-kicker">One fight</div><h2>Choose how much testing to do.</h2><p>Start from a battle save. The app tries plans, keeps the useful ones, and then plays them again on the cartridge.</p></div>
              <button onClick={onClose} aria-label="Close simulator setup" disabled={running}>Close</button>
            </div>

            <div className="simulator-state-box">
              <label>Game file<input value={form.rom} onChange={(event) => setForm({ ...form, rom: event.target.value })} placeholder={gameMode === "emerald" ? "/path/to/your/Pokemon Emerald.gba" : "/path/to/your/RunAndBun.gba"} /></label>
              <label>Save before the fight<input value={form.state} onChange={(event) => setForm({ ...form, state: event.target.value, result_state: "" })} placeholder="Choose a .sav or checkpoint immediately before the fight" /></label>
              <div className="sim-action-row">
                <button className="ghost" onClick={onInspect} disabled={running}>Read this fight</button>
                <button className="ghost" onClick={() => onCheckpoint(false)} disabled={running}>Save current position</button>
                <button className="ghost" onClick={() => onCheckpoint(true)} disabled={running}>Open the Emerald battery save</button>
              </div>
              <div className="sim-read-status">{inspectStatus === "idle" ? "Read the fight first to confirm the trainer, moves, and current HP." : inspectStatus}</div>
              {form.result_state && <div className="sim-line-record"><strong>Victory checkpoint ready.</strong> Testing again still starts from the original fight. <button className="ghost" onClick={() => setForm({ ...form, state: form.result_state, result_state: "" })}>Continue from victory</button></div>}
            </div>

            <div className="simulator-setting-grid" aria-label="Simulation effort">
              <label><span>Simulators at once</span><input type="number" min="1" max="16" value={form.instances} onChange={(event) => setForm({ ...form, instances: Number(event.target.value) })} /><small>Four is a good default. Raise this only if the Mac stays responsive.</small></label>
              <label><span>Plans to try</span><input type="number" min="4" value={form.iterations} onChange={(event) => setForm({ ...form, iterations: Number(event.target.value) })} /><small>More plans take longer. The obvious attack-only plan is always checked first.</small></label>
              <label><span>Best plans to retest</span><input type="number" min="1" max="12" value={form.final_line_candidates} onChange={(event) => setForm({ ...form, final_line_candidates: Number(event.target.value) })} /><small>Only these plans move on to the slower proof step.</small></label>
              <label><span>Retests per plan</span><input type="number" min="3" max="2000" value={form.final_line_trials} onChange={(event) => setForm({ ...form, final_line_trials: Number(event.target.value) })} /><small>12 is a useful check. Use 30 or more before risking an important Pokémon.</small></label>
            </div>

            <div className="simulator-run-preview">
              <div><strong>{form.instances}</strong><span>at once</span></div>
              <div><strong>{form.iterations}</strong><span>plans tried</span></div>
              <div><strong>{form.final_line_candidates}</strong><span>plans retested</span></div>
              <div><strong>{Number(form.final_line_trials) * Number(form.final_line_candidates)}</strong><span>maximum retests</span></div>
            </div>

            <div className="gauntlet-modal-actions">
              <div className="node-meta">Nuzlocke rules stay on. A plan cannot pass if it needs a faint, crit, or flinch.</div>
              <button className="primary" onClick={startRun} disabled={running || !form.state}>{running ? "Testing the fight…" : "Test this fight"}</button>
            </div>
          </section>
        </div>;
      }

      function SimulatorStageProgress({ snapshot, running, progress, proofProgress, validationDone, validationTotal }) {
        const pct = Math.max(0, Math.min(100, Number(proofProgress?.pct || 0)));
        const current = pct >= 100 ? 4 : pct >= 86 ? 3 : pct >= 35 ? 2 : pct > 0 ? 1 : 0;
        const rawPhase = String(proofProgress?.phase || "").toLowerCase();
        const phaseLabel = ({
          idle: "Ready",
          starting: "Starting",
          searching: "Trying plans",
          validation: "Retesting the best plans",
          recording: "Recording proof",
          complete: "Finished",
        })[rawPhase] || proofProgress?.phase || (running ? "Starting" : "Ready");
        const stages = [
          { title: "Read the fight", note: snapshot?.trainer?.name ? `${snapshot.trainer.name} recognized` : "Waiting for a battle save", done: Boolean(snapshot?.trainer?.name) || current > 0 },
          { title: "Try plans", note: running && progress?.iterations_total ? `${progress.iterations_done || 0} of ${progress.iterations_total} tried` : "The direct attack plan goes first", done: current > 1 },
          { title: "Retest the best", note: running ? `${validationDone || proofProgress?.completed_replays || 0} of ${validationTotal || proofProgress?.total_replays || 0} replays` : validationDone ? `${validationDone} replays saved` : `${validationTotal} replays planned`, done: current > 2 },
          { title: "Save proof", note: proofProgress?.video_ready ? "Video and next checkpoint saved" : "Full-speed video is made last", done: current > 3 },
        ];
        return <section className="sim-stage-progress" aria-live="polite">
          <div className="sim-stage-head"><div><span>Progress</span><strong>{phaseLabel}</strong></div><b>{Math.round(pct)}%</b></div>
          <div className="sim-stage-main-track" role="progressbar" aria-label="Simulator progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow={Math.round(pct)}><i style={{width:`${pct}%`}} /></div>
          <div className="sim-stage-list">{stages.map((stage, index) => <div className={`${stage.done ? "done" : ""} ${current === index + 1 ? "current" : ""}`} key={stage.title}><span>{stage.done ? "✓" : index + 1}</span><p><strong>{stage.title}</strong><small>{stage.note}</small></p><i><b style={{width:stage.done ? "100%" : current === index + 1 ? `${Math.max(8, (pct % 25) * 4)}%` : "0%"}} /></i></div>)}</div>
        </section>;
      }

      function SimulatorView({ gameMode, trainers, events, snapshot, inspectStatus, validations, form, setForm, onInspect, onCheckpoint, onRun, onKill, running, progress, proofProgress, runLogs }) {
        const [showSetup, setShowSetup] = useState(false);
        const validationDone = validations.reduce((sum, line) => sum + (line.trials || 0), 0);
        const validationTotal = Math.max(1, Number(form.final_line_trials) * Number(form.final_line_candidates));
        return (
          <section className="sim-view" aria-label="Simulator runs">
            {showSetup && <SimulatorSetupModal gameMode={gameMode} form={form} setForm={setForm} onClose={() => setShowSetup(false)} onInspect={onInspect} onCheckpoint={onCheckpoint} onRun={onRun} running={running} inspectStatus={inspectStatus} />}
            <div className="gauntlet-hero simulator-hero">
              <div><div className="sim-kicker">{gameMode === "emerald" ? "Pokémon Emerald" : "One fight"}</div><h2>Test a fight before you play it.</h2><p>{snapshot?.trainer?.name ? `${snapshot.trainer.name} is ready. ` : "Choose a save immediately before a trainer. "}The app tries the quick attack plan first, searches for safer alternatives when needed, and proves the winner in the game.</p></div>
              <div className="sim-action-row"><button className="ghost" onClick={() => setShowSetup(true)}>Settings</button><button className="ghost" onClick={onInspect} disabled={running}>Read fight</button><button className="primary" onClick={onRun} disabled={running}>{running ? "Testing…" : "Test fight"}</button>{running && <button className="ghost danger" onClick={onKill}>Stop</button>}</div>
            </div>
            <div className="gauntlet-summary simulator-summary">
              <div><strong>{form.instances}</strong>simulators at once</div>
              <div><strong>{form.iterations}</strong>plans to try</div>
              <div><strong>{form.final_line_candidates}</strong>plans retested</div>
              <div><strong>{form.final_line_trials}</strong>retests each</div>
            </div>

            {snapshot && <BattleFingerprint snapshot={snapshot} />}

            <AutonomyPanel gameMode={gameMode} form={form} setForm={setForm} trainers={trainers} />

            {events.length > 0 && <LiveReplayWall events={events.slice(0, 4)} running={running} />}

            <SimulatorStageProgress snapshot={snapshot} running={running} progress={progress} proofProgress={proofProgress} validationDone={validationDone} validationTotal={validationTotal} />
            {running && <div className="sim-running-note">{progress?.message || "Exploring routes in parallel…"}</div>}

            {validations.length > 0 && (
              <div className="sim-line-grid">
                {[...validations].sort((a, b) => (b.clear_rate || 0) - (a.clear_rate || 0)).map((line, index) => (
                  <ValidationCard line={line} rank={index + 1} key={`${line.line?.join("-")}-${index}`} />
                ))}
              </div>
            )}

            <SimulatorVideoLogs runs={runLogs || []} />

            <div className="sim-header sim-log-head">
              <div><h3>Replay log</h3><div className="sim-subtitle">Open a replay to inspect its live move sequence and the HP state after every turn.</div></div>
              <div className="sim-count">{events.length} recent replays</div>
            </div>
            {events.length === 0 ? <div className="empty">No emulator replays yet. Read the battle, then find and test lines.</div> : (
              <table className="sim-table">
                <thead>
                  <tr>
                    <th>Trial</th>
                    <th>Status</th>
                    <th>Route</th>
                    <th>Player HP</th>
                    <th>Enemy HP</th>
                    <th>Faints</th>
                    <th>Details</th>
                  </tr>
                </thead>
                <tbody>
                  {events.map((event) => <SimulatorRow key={`${event.trial_id}-${event.instance_id}-${event.frames_run}`} event={event} />)}
                </tbody>
              </table>
            )}
          </section>
        );
      }

      function SimulatorVideoLogs({ runs }) {
        const [folderStatus, setFolderStatus] = useState("");
        async function openRecordingsFolder() {
          setFolderStatus("Opening…");
          try {
            const response = await fetch("/api/simulator/open-folder", { method: "POST" });
            if (!response.ok) throw new Error(await response.text());
            const data = await response.json();
            setFolderStatus(`Opened ${data.path}`);
          } catch (error) {
            setFolderStatus(`Could not open folder: ${error.message}`);
          }
        }
        return <section className="sim-video-log">
          <div className="sim-header sim-log-head">
            <div><h3>Recorded run logs</h3><div className="sim-subtitle">Every completed simulator run is saved here with its raw game recording. No intro cards.</div></div>
            <div className="sim-action-row"><span className="sim-count">{runs.length} saved</span><button className="ghost" onClick={openRecordingsFolder}>Open recordings folder</button></div>
          </div>
          {folderStatus && <div className="sim-read-status">{folderStatus}</div>}
          {runs.length === 0 ? <div className="empty">Finish a simulator run and its video, result, route, and final HP will stay here after refresh.</div> : <EvidenceLibrary runs={runs} kind="simulator" />}
        </section>;
      }

      function BattleFingerprint({ snapshot }) {
        const trainer = snapshot.trainer;
        return (
          <div className={`sim-fingerprint ${snapshot.recognized ? "recognized" : "unknown"}`}>
            <div className="sim-fingerprint-title">
              <span className="sim-signal">{snapshot.recognized ? "LOCKED" : "UNKNOWN"}</span>
              <div><strong>{trainer ? trainer.name : "Trainer not recognized"}</strong><span>{trainer ? `${trainer.location} · ${trainer.confidence} match` : "Check that this state is at a battle command menu."}</span></div>
            </div>
            <div className="sim-versus">
              <div className="sim-combatant"><span>YOUR ACTIVE</span><strong>{snapshot.player.name}</strong><em>{snapshot.player.moves.join(" · ")}</em></div>
              <b>VS</b>
              <div className="sim-combatant enemy"><span>ENEMY ACTIVE</span><strong>{snapshot.enemy.name}</strong><em>{snapshot.enemy.moves.join(" · ")}</em></div>
              <GameScreen screen={snapshot.screen} className="sim-fingerprint-screen" missingClassName="sim-screen-missing" />
            </div>
            {trainer && <div className="sim-roster">{trainer.party.map((mon) => <span key={mon.species}>{mon.species} <small>Lv. {mon.level}</small></span>)}</div>}
          </div>
        );
      }

      function LiveReplayWall({ events, running }) {
        const [tick, setTick] = useState(0);
        useEffect(() => {
          if (!running) return undefined;
          const timer = setInterval(() => setTick((value) => value + 1), 900);
          return () => clearInterval(timer);
        }, [running]);
        useEffect(() => { setTick(0); }, [events.length, running]);
        return <div style={{margin:"14px 0"}}>
          <div className="sim-header"><div><h3>{running ? "Games playing now" : "Latest GBA replays"}</h3><div className="sim-subtitle">Each card follows captured game frames, then stops on the last real turn.</div></div></div>
          <div className="sim-line-grid">
            {events.map((event) => {
              const turns = event.turns || [];
              const index = turns.length ? (running ? Math.min(tick, turns.length - 1) : turns.length - 1) : 0;
              const turn = turns[index] || {};
              return <article className="sim-line-card" key={`live-${event.trial_id}-${event.instance_id}`}>
                <div className="sim-line-card-head"><span>GAME {event.instance_id + 1} · TURN {turn.turn || 0}</span><strong>{event.status === "WIN" ? "Finished" : event.status}</strong></div>
                <GameScreen screen={turn.screen || event.screen} className="sim-fingerprint-screen" />
                <div className="sim-line-record">{(turn.actions || []).join(" + ") || event.reason}</div>
                <div className="sim-ci">Your HP {compactHp(turn.player_hp || event.player_hp)} · Enemy HP {compactHp(turn.enemy_hp || event.enemy_hp)}</div>
              </article>;
            })}
          </div>
        </div>;
      }

      function AutonomyPanel({ gameMode, form, setForm, trainers }) {
        const [trainerId, setTrainerId] = useState(gameMode === "emerald" ? 1 : 48);
        const [routeRun, setRouteRun] = useState(null);
        const [routeStatus, setRouteStatus] = useState("ready");
        const [routeLogs, setRouteLogs] = useState([]);
        const loadRouteLogs = () => fetch("/api/autonomy/runs").then((response)=>response.json()).then((data)=>setRouteLogs(data.runs || [])).catch(()=>{});
        useEffect(()=>{ loadRouteLogs(); }, []);
        useEffect(()=>{
          if (!(trainers || []).length) return;
          if (!(trainers || []).some((trainer)=>Number(trainer.id) === Number(trainerId))) {
            setTrainerId(Number(trainers[0].id));
          }
        }, [trainers]);
        const selectedDestination = (trainers || []).find((trainer)=>Number(trainer.id) === Number(trainerId));
        async function runRoute(kind) {
          const overworldState = form.state || form.pc_state;
          const actions = kind === "bag" ? [{kind:"open_bag"}]
            : [];
          const selectedTrainer = (trainers || []).find((trainer)=>trainer.id === Number(trainerId));
          setRouteStatus(kind === "bag" ? "Opening the bag from a fresh checkpoint…" : kind === "trainer" ? `Walking straight to ${selectedTrainer?.trainer_name || "the trainer"}…` : "Saving a resumable checkpoint…");
          try {
            const response = await fetch("/api/autonomy/route", {
              method:"POST", headers:{"Content-Type":"application/json"},
              body:JSON.stringify({rom:form.rom,state:overworldState,route_name:kind === "bag" ? "open bag" : kind === "trainer" ? `go to trainer ${trainerId}` : "safe checkpoint",trainer_id:kind === "trainer" ? Number(trainerId) : null,actions,checkpoint_every:1,game_mode:gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun"}),
            });
            if (!response.ok) throw new Error(await response.text());
            const data = await response.json();
            setRouteRun(data);
            if (kind === "trainer" && data.checkpoints?.length) {
              setForm((current) => ({...current, state:data.checkpoints[data.checkpoints.length - 1]}));
            }
            setRouteStatus(data.status === "complete" ? "Route completed and checkpointed" : data.status);
            loadRouteLogs();
          } catch (error) { setRouteStatus(`Route stopped safely: ${error}`); }
        }
        return <section className="sim-fingerprint" style={{marginTop:14}}>
          <div className="sim-fingerprint-title"><span className="sim-signal">TRAVEL</span><div><strong>Walk to the fight</strong><span>Choose one trainer. The app saves the route so you can resume if movement stops.</span></div></div>
          <div className="simulator-trainer-picker">
            <TrainerDropdown trainers={trainers} value={trainerId} onChange={setTrainerId} label="Go straight to which trainer?" />
            <div className="trainer-search-count">{selectedDestination ? `Selected destination: ${selectedDestination.label}` : "Choose a trainer destination."}</div>
          </div>
          <div className="sim-action-row">
            <button className="ghost" onClick={()=>runRoute("checkpoint")}>Save this position</button>
            <button className="ghost" onClick={()=>runRoute("bag")}>Open the bag</button>
            <button className="ghost" onClick={()=>runRoute("trainer")}>Walk to trainer</button>
          </div>
          <div className="sim-read-status">{routeStatus}</div>
          {routeRun && <div className="sim-versus" style={{marginTop:10}}><GameScreen screen={routeRun.screen} className="sim-fingerprint-screen" /><div className="sim-combatant"><span>LAST POSITION</span><strong>{(routeRun.position || []).join(", ")}</strong><em>{routeRun.checkpoints?.length || 0} resumable checkpoints · {routeRun.events?.length || 0} actions logged</em></div></div>}
          {routeLogs.length > 0 && <details className="sim-replay-details"><summary>Simulator travel logs ({routeLogs.length})</summary>{routeLogs.slice(0,8).map((run)=><div className="sim-turn-detail" key={run.run_id}><strong>{run.route_name} · {run.status}</strong><span>{run.events?.length || 0} route actions · {(run.checkpoints || []).length} checkpoints{run.error ? ` · ${run.error}` : ""}</span></div>)}</details>}
        </section>;
      }

      function ValidationCard({ line, rank }) {
        const crit = line.critical_analysis || {};
        const diversions = crit.material_diversions || [];
        const route = line.line || [];
        const oneMovePlan = route.length > 1 && route.every((step) => step === route[0]);
        const preview = oneMovePlan
          ? [`Repeat ${route[0]} until the battle ends`]
          : route.length <= 6 ? route : [...route.slice(0, 3), "…", ...route.slice(-2)];
        return (
          <article className={`sim-line-card ${rank === 1 ? "best" : ""}`}>
            <div className="sim-line-card-head"><span>{rank === 1 ? "BEST PLAN" : `ALTERNATIVE ${rank}`}</span><strong>{pct(line.clear_rate)}</strong></div>
            <div className="sim-line-record">{line.wins || 0} of {line.trials || 0} tests cleared · {line.losses || 0} blackouts · {line.incomplete || 0} unfinished</div>
            <div className="sim-ci">Expected clear range {pct(line.confidence_low)}–{pct(line.confidence_high)} · faint risk {pct(line.faint_rate)}</div>
            <div className={`sim-line-record ${crit.critical_safe ? "" : "sim-video-error"}`}>{crit.critical_safe ? "Damage spikes seen in testing stayed safe" : "Set aside: a damage spike broke this plan"} · {diversions.length} useful backup branches</div>
            {diversions.slice(0, 2).map((event, index) => <div className="sim-ci" key={`crit-diversion-${event.turn}-${index}`}>Turn {event.turn} · {event.side === "player" ? "your crit changed the sendout" : "enemy damage spike changed your state"}{event.continuation?.length ? ` · then ${event.continuation[0]}` : ""}</div>)}
            <div className="sim-ci">The replay stops on the real KO. A final move may repeat when a lower damage roll needs it.</div>
            <ol>{preview.map((step, index) => <li key={`${step}-${index}`}>{step}</li>)}</ol>
            {route.length > 6 && <details className="sim-replay-details"><summary>Show every turn</summary><ol>{route.map((step, index) => <li key={`full-${step}-${index}`}>{step}</li>)}</ol></details>}
          </article>
        );
      }

      function SimulatorRow({ event }) {
        const statusClass = (event.status || "IN PROGRESS").replace(" ", "-");
        const actions = event.actions && event.actions.length ? event.actions.join(" → ") : "No action executed";
        const playerMax = event.player_max_hp_total || 0;
        const enemyMax = event.enemy_max_hp_total || 0;
        return (
          <tr className="sim-row">
            <td>#{event.trial_id}</td>
            <td><span className={`sim-status ${statusClass}`}>{event.status}</span></td>
            <td className="sim-actions">{actions}</td>
            <td>{event.player_hp_total || 0}{playerMax ? ` / ${playerMax}` : ""}<div className="sim-muted">{compactHp(event.player_hp)}</div></td>
            <td>{event.enemy_hp_total || 0}{enemyMax ? ` / ${enemyMax}` : ""}<div className="sim-muted">{compactHp(event.enemy_hp)}</div></td>
            <td>{event.player_faints || 0} yours · {event.enemy_faints || 0} enemy</td>
            <td><details className="sim-replay-details"><summary>Open replay</summary><GameScreen screen={event.screen} /><div>{event.error || event.reason || ""}</div>{(event.turns || []).map((turn) => <div className="sim-turn-detail" key={`${event.trial_id}-turn-${turn.turn}`}><strong>Turn {turn.turn}: {(turn.actions || []).join(" + ")}</strong><span>Your HP {compactHp(turn.player_hp)} · Enemy HP {compactHp(turn.enemy_hp)}</span><small>Enemy move set: {(turn.enemy_moves || []).join(", ")}</small></div>)}</details></td>
          </tr>
        );
      }

      function GameScreen({ screen, className = "sim-screen", missingClassName = "sim-screen-missing" }) {
        const canvasRef = useRef(null);
        useEffect(() => {
          if (!screen || !screen.rgba_base64 || !screen.width || !screen.height || !canvasRef.current) return;
          const binary = atob(screen.rgba_base64);
          const pixels = new Uint8ClampedArray(binary.length);
          for (let i = 0; i < binary.length; i += 1) pixels[i] = binary.charCodeAt(i);
          const canvas = canvasRef.current;
          canvas.width = screen.width;
          canvas.height = screen.height;
          const ctx = canvas.getContext("2d");
          ctx.putImageData(new ImageData(pixels, screen.width, screen.height), 0, 0);
        }, [screen?.rgba_base64, screen?.width, screen?.height]);

        if (!screen || !screen.rgba_base64) {
          return <div className={missingClassName}>No frame</div>;
        }
        return <canvas className={className} ref={canvasRef} aria-label="Game screen frame" />;
      }

      function compactHp(values) {
        if (!values || !values.length) return "";
        return values.filter((value) => value > 0).join(" / ");
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
