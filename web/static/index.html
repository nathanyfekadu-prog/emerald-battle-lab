        if ((result.team || []).some((m) => /staravia|staraptor|gyarados|mawile|hitmontop|arcanine|granbull|salamence|incineroar/i.test(m.name || m.species || ""))) notes.push("An Intimidate lead drops the enemy's Attack on entry, softening physical hits for your whole line.");
        if (has("Mach Punch") || has("Aqua Jet") || has("Ice Shard") || has("Quick Attack") || has("Bullet Punch") || has("Sucker Punch")) notes.push("Priority moves (Mach Punch / Aqua Jet / Ice Shard / Quick Attack) let you pick off weakened or faster threats before they move.");
        if (has("Toxic") || has("Will-O-Wisp")) notes.push("Status (Toxic / burn) on a bulky enemy you can't break quickly turns a stall into a win and chips through Protect.");
        if (has("Protect") || has("Detect")) notes.push("Protect scouts the enemy's move and stalls poison/burn damage — useful against choice-locked or set-up foes.");
        if (has("Dragon Rage")) notes.push("Dragon Rage deals a flat 40 — reliable, accuracy-independent chip that the confidence model loves.");
        return notes;
      }

      // Strategy toolbox appendix: every strategy the line finder can pull from,
      // with the ones this plan actually uses in bold plus where they are used.
      function renderStrategyToolbox(result) {
        const rows = result.strategy_report || [];
        if (!rows.length) return "";
        const scopeLabel = { "single-turn": "single-turn tactic", "multi-turn": "multi-turn tactic", "full-battle": "full-battle concept" };
        const items = rows.map((s) => {
          const name = s.used ? `<strong>${escapeHtml(s.name)}</strong>` : escapeHtml(s.name);
          const scope = s.scope ? ` <em>(${escapeHtml(scopeLabel[s.scope] || s.scope)})</em>` : "";
          const model = s.modeled === false ? ` <em>(advisory; not fully simulated)</em>` : "";
          const where = s.used && (s.where || []).length
            ? `<div class="bp-step-detail"><strong>Used:</strong> ${escapeHtml((s.where || []).join(" · "))}</div>`
            : "";
          const detail = [
            s.when ? `<div class="bp-step-detail"><strong>Consider when:</strong> ${escapeHtml(s.when)}</div>` : "",
            s.viable ? `<div class="bp-step-detail"><strong>Viable if:</strong> ${escapeHtml(s.viable)}</div>` : "",
            s.example ? `<div class="bp-step-detail"><strong>Example:</strong> ${escapeHtml(s.example)}</div>` : "",
          ].join("");
          return `<li>${name}${scope}${model} — ${escapeHtml(s.description)}${where}${detail}</li>`;
        }).join("");
        return `<p class="bp-muted">Modeled tactics and advisory playbook. <strong>Bold</strong> entries appear in this plan; advisory entries are useful ideas whose complete field/PP behavior is not yet simulated.</p><ul class="bp-list">${items}</ul>`;
      }

      function renderUsedStrategyPlan(result) {
        const used = (result.strategy_report || []).filter((strategy) => strategy.used);
        if (!used.length) return `<p class="bp-muted">This line is mostly direct damage and clean switching; no additional tactical pattern was detected.</p>`;
        return `<p class="bp-muted">These are the tactical ideas the planner is actually relying on. If the battle diverges, preserve the idea even when the exact move changes.</p><ol class="bp-strategy-plan">` + used.map((strategy) => `
          <li>
            <strong>${escapeHtml(strategy.name)}</strong>${strategy.modeled === false ? " <em>(advisory; not fully simulated)</em>" : ""} — ${escapeHtml(strategy.description)}
            ${(strategy.where || []).length ? `<div class="bp-step-detail"><strong>Where it matters:</strong> ${escapeHtml(strategy.where.join(" · "))}</div>` : ""}
            ${strategy.viable ? `<div class="bp-step-detail"><strong>Keep using it only if:</strong> ${escapeHtml(strategy.viable)}</div>` : ""}
          </li>`).join("") + `</ol>`;
      }

      // Plain-English flinch/crit outlook from the backend's statistical model.
      function renderHaxOutlook(result) {
        const h = result.hax_outlook;
        if (!h) return "";
        const pf = Math.round((h.p_any_flinch || 0) * 100);
        const pnf = Math.round((h.p_no_flinch || 0) * 100);
        const pck = Math.round((h.p_any_crit_ko || 0) * 100);
        const flinchTurns = h.flinch_turns || [];
        const critTurns = h.crit_ko_turns || [];

        const summary = `
          <p>Over the whole line you can expect about <strong>${h.expected_flinches ?? 0}</strong> flinch${(h.expected_flinches === 1) ? "" : "es"} and
          <strong>${h.expected_crit_kos ?? 0}</strong> fight-ending crit${(h.expected_crit_kos === 1) ? "" : "s"} on average.
          There is a <strong>${pf}%</strong> chance you hit at least one flinch (so a <strong>${pnf}%</strong> chance of a clean, flinch-free run)
          and a <strong>${pck}%</strong> chance at least one crit lands where it would actually KO you.</p>
          <p class="bp-muted">Math: "expected" sums each turn's probability; "at least one" is 1 minus the chance none of them happen (the product of each not-happening). Plan for the average — these <em>will</em> sometimes happen — but prefer the lines below that keep the dangerous turns to a minimum.</p>`;

        const flinchHtml = flinchTurns.length
          ? `<p style="margin-bottom:4px;"><strong>Flinch-exposed turns (have a pivot ready):</strong></p><ul class="bp-list">` +
            flinchTurns.map((e) => `<li>Turn ${escapeHtml(e.turn)}: <strong>${escapeHtml(e.enemy)}</strong>'s ${escapeHtml(e.move)} flinches <strong>${escapeHtml(e.mon)}</strong> ~${Math.round(e.p * 100)}% if it moves first. If it flinches, expect to lose that turn — keep a Pokémon that can take the follow-up and pivot in.</li>`).join("") + `</ul>`
          : `<p class="bp-muted">No flinch-exposed turns on this line — good.</p>`;

        const critHtml = critTurns.length
          ? `<p style="margin:10px 0 4px;"><strong>Crit-KO–exposed turns:</strong></p><ul class="bp-list">` +
            critTurns.map((e) => `<li>Turn ${escapeHtml(e.turn)}: a crit ${escapeHtml(e.move)} from <strong>${escapeHtml(e.enemy)}</strong> (~${Math.round(e.p * 100)}%) would KO <strong>${escapeHtml(e.mon)}</strong>. Don't leave your only answer here on a crit-roll — bring a second check or sacrifice a throwaway to bait it.</li>`).join("") + `</ul>`
          : `<p class="bp-muted">No crit would outright KO you on this line.</p>`;

        return summary + flinchHtml + critHtml;
      }

      // Berry budget: berries are consumable and finite across a run. Flag berries that
      // were held but never triggered (free to reassign) so you don't burn Sitrus on a
      // mon that never needed it.
      const CONSUMABLE_BERRIES = ["sitrus", "oran", "lum", "aguav", "figy", "iapapa", "mago", "wiki", "chesto", "pecha", "cheri", "rawst", "aspear", "persim", "leppa", "salac", "liechi"];
      function isBerry(item) { return CONSUMABLE_BERRIES.some((b) => String(item || "").toLowerCase().includes(b)); }

      function renderBerryBudget(result) {
        const team = result.team || [];
        const holders = team.filter((m) => isBerry(m.item));
        if (!holders.length) return `<p class="bp-muted">No berry holders on this team.</p>`;
        // Detect which berries actually fired, from the turn calc text ("recovers with X Berry").
        const allText = (result.turns || []).map((t) => String(t.calc || "")).join(" ").toLowerCase();
        const usedByMon = {};
        team.forEach((m) => {
          const name = String(m.name || m.species || "").toLowerCase();
          if (isBerry(m.item) && name) {
            const berry = String(m.item).toLowerCase();
            const triggered = allText.includes(`${name} recovers`) || (allText.includes("recovers with") && allText.includes(name) && allText.includes(berry.split(" ")[0]));
            usedByMon[m.name] = triggered;
          }
        });
        const counts = {};
        holders.forEach((m) => { const k = m.item; counts[k] = (counts[k] || 0) + 1; });
        const inventory = Object.entries(counts).map(([item, n]) => `${escapeHtml(item)} ×${n}`).join(", ");
        const wasted = holders.filter((m) => usedByMon[m.name] === false);
        const used = holders.filter((m) => usedByMon[m.name] === true);

        const lines = [`<p><strong>Berries equipped this fight:</strong> ${inventory}.</p>`];
        if (used.length) {
          lines.push(`<p style="margin-bottom:4px;"><strong>Pulled their weight (keep the berry):</strong></p><ul class="bp-list">` +
            used.map((m) => `<li>${escapeHtml(m.name)} — ${escapeHtml(m.item)} triggered during the fight.</li>`).join("") + `</ul>`);
        }
        if (wasted.length) {
          lines.push(`<p style="margin:8px 0 4px;"><strong>Never needed it (free to reassign):</strong></p><ul class="bp-list">` +
            wasted.map((m) => `<li><strong>${escapeHtml(m.name)}</strong> held ${escapeHtml(m.item)} but never triggered it this fight. Berries are finite — move this one to a Pokémon that actually drops into berry range, or save it.</li>`).join("") + `</ul>`);
        } else {
          lines.push(`<p class="bp-muted">Every berry on the field was used — no obvious waste here.</p>`);
        }
        lines.push(`<p class="bp-muted" style="margin-top:8px;">Rule of thumb: a Sitrus/Oran only matters on a Pokémon that actually dips low enough to eat it and survive a follow-up. If a mon sweeps without ever getting hit into range, its berry is better off elsewhere. Lum is best on a Pokémon you expect to get statused (sleep/burn/para).</p>`);
        return lines.join("");
      }

      // Best answer to each enemy (advisory): tank its best hit, outspeed, hit hard.
      function renderThreatAnswers(result) {
        const rows = result.threat_answers || [];
        if (!rows.length) return "";
        const noClean = rows.filter((r) => !r.clean);
        const table = `<table class="bp-table"><thead><tr><th>Enemy</th><th>Your best answer</th><th>You take</th><th>You deal</th><th>Speed</th></tr></thead><tbody>` +
          rows.map((r) => {
            const b = r.best || {};
            return `<tr${r.clean ? "" : ' style="background:#eee;"'}>
              <td>${escapeHtml(r.enemy)}</td>
              <td>${escapeHtml(b.mon || "—")}${b.move ? ` (${escapeHtml(b.move)})` : ""}</td>
              <td>${Math.round((b.incoming || 0) * 100)}%</td>
              <td>${Math.round((b.outgoing || 0) * 100)}%</td>
              <td>${b.faster ? "outspeeds" : "slower"}</td>
            </tr>`;
          }).join("") + `</tbody></table>`;
        const lead = rows.reduce((best, r) => {
          const count = rows.filter((x) => x.best && x.best.mon === (r.best && r.best.mon) && x.clean).length;
          return count > best.count ? { mon: r.best && r.best.mon, count } : best;
        }, { mon: null, count: 0 });
        const advice = [];
        if (lead.mon && lead.count >= 2) advice.push(`<strong>${escapeHtml(lead.mon)}</strong> is your best pivot here — it cleanly answers ${lead.count} of ${rows.length} of this trainer's Pokémon. Lead with it or keep it healthy as your anchor.`);
        if (noClean.length) advice.push(`No clean answer to: ${noClean.map((r) => escapeHtml(r.enemy)).join(", ")}. These need a dedicated check — a typing that resists their STAB (e.g. a Ghost is immune to a Normalize user's moves; a Steel wall resists Normal) or a faster super-effective attacker. Consider adding one to the box.`);
        else advice.push("Every enemy has at least one clean answer in your box — the fight is about pivoting to the right Pokémon and not letting your key answers get worn down.");
        return `<p class="bp-muted">Reading: "you take" is the worst-case chunk off your full HP from its best hit; "you deal" is the chunk you take off it. A clean answer survives the hit, ideally outspeeds, and hits hard.</p>${table}<div style="margin-top:8px;"><ul class="bp-list">${advice.map((a) => `<li>${a}</li>`).join("")}</ul></div>`;
      }

      // ---- Contingency flowchart: interactive on-page view (ReactFlow) ----
      // The backend ships a decision tree (each node: trunk `steps`, then a `fork` with
      // `branches`, or a terminal `outcome`). We render it as a real pan/zoom flowchart and
      // highlight the single most-likely path so the realistic line reads at a glance.

      function fcSwitchTarget(action) {
        const text = (action || "").trim().replace(/\.$/, "");
        let pivot = /^Switch to (.+)$/i.exec(text);
        if (pivot) return pivot[1];
        pivot = /^(?:Tactical sac:\s*)?Switch\s+(.+?)\s*->\s*(.+)$/i.exec(text);
        if (pivot) return pivot[2];
        return "";
      }

      function fcStepText(s) {
        const pivot = fcSwitchTarget(s.action);
        if (pivot) return <span className="fc-pivot">⇄ {pivot}</span>;
        return s.action || "";
      }

      function FcNode({ data }) {
        const node = data.node;
        const steps = node.steps || [];
        const first = steps[0], last = steps[steps.length - 1];
        const title = first ? (first.turn === last.turn ? `Turn ${first.turn}` : `Turns ${first.turn}–${last.turn}`) : "Decision";
        const isFork = node.fork && (node.fork.branches || []).length;
        const merge = node.outcome === "merge";
        const trunc = node.outcome === "truncated";
        const win = node.outcome === "win-line";
        const cls = `fc-node ${data.onPath ? "fc-on" : ""} ${isFork ? "fc-fork" : merge ? "fc-merge" : trunc ? "fc-trunc" : node.outcome ? (win ? "fc-win" : "fc-partial") : ""}`;
        return (
          <div className={cls} title="Click for branch details">
            <Handle type="target" position={Position.Top} />
            <div className="fc-head"><span>{merge ? "Rejoins line" : trunc ? "Rare line" : title}</span>{data.onPath && <span className="fc-badge">most likely</span>}</div>
            {merge ? (
              <div className="fc-step" style={{ fontStyle: "italic" }}>↳ Same position as an earlier branch — follow it from there{node.merge_label ? `: ${node.merge_label}` : "."}</div>
            ) : trunc ? (
              <div className="fc-step" style={{ fontStyle: "italic", whiteSpace: "normal" }}>{node.note || "Rare tail not expanded — continue in Turn Coach from this position."}</div>
            ) : steps.length ? steps.map((s, i) => (
              <div className="fc-step" key={i} title={(s.action || "") + ((s.your_hp || s.enemy_hp) ? ` (${s.your_hp || "?"}/${s.enemy_hp || "?"})` : "")}><b>T{s.turn}</b> {fcStepText(s)} {(s.your_hp || s.enemy_hp) && <span className="fc-hp">({s.your_hp || "?"}/{s.enemy_hp || "?"})</span>}</div>
            )) : <div className="fc-step" style={{ color: "#666", fontStyle: "italic" }}>(no actions this leg)</div>}
            {isFork ? <div className="fc-foot fc-q">◇ {node.fork.question}</div>
              : merge ? <div className="fc-foot fc-merge-foot">↺ rejoins earlier line</div>
              : trunc ? <div className="fc-foot fc-trunc-foot">➜ continue in Co-pilot</div>
              : node.outcome ? <div className={`fc-foot ${win ? "fc-okk" : "fc-warn"}`}>{win ? "✓ Clears the fight" : "△ Doesn’t fully clear"} · {Math.round((node.confidence || 0) * 100)}%</div>
              : null}
            <Handle type="source" position={Position.Bottom} />
          </div>
        );
      }
      const fcNodeTypes = { fc: FcNode };

      // Most-likely path = follow the highest-probability branch from the root at every fork.
      function fcMostLikely(root) {
        const onPath = new Set();
        let n = root;
        while (n) {
          onPath.add(n);
          const branches = (n.fork && n.fork.branches) || [];
          if (!branches.length) break;
          n = branches.reduce((best, b) => ((b.probability || 0) > (best.probability || 0) ? b : best), branches[0]).node;
        }
        return onPath;
      }

      function fcNodeHeight(node) {
        if (node.outcome === "truncated") return 104; // multi-line note wraps
        const steps = Math.max(1, (node.steps || []).length);
        return 30 + steps * 16 + ((node.fork || node.outcome) ? 22 : 8);
      }

      // Edge labels from the backend are verbose ("Furfrou uses Iron Tail (60%)"); shorten
      // them so they don't overlap each other or the connector lines.
      function fcShortLabel(s) {
        if (!s) return s;
        const pm = /\((<?\d+(?:\.\d+)?%)\)/.exec(s); const pct = pm ? pm[1] : "";
        let m = /uses (.+?) \(/.exec(s); if (m) return `${m[1]} · ${pct}`;
        m = /crits with (.+?) \(/.exec(s); if (m) return `crit ${m[1]} · ${pct}`;
        if (/KOs /.test(s)) return `KO · ${pct}`;
        if (/survives/.test(s)) return `survives · ${pct}`;
        if (/No crit/.test(s)) return `no crit · ${pct}`;
        if (/^Other moves/.test(s)) { const mm = /mostly (.+?) \(/.exec(s); return mm ? `other: ${mm[1]} · ${pct}` : `other · ${pct}`; }
        return pct ? s.replace(/\s*\(<?\d+(?:\.\d+)?%\)/, ` · ${pct}`) : s;
      }

      function treeToFlow(root, mode, focusedNodes) {
        const onPath = mode === "route" && focusedNodes ? focusedNodes : fcMostLikely(root);
        const nodes = [], edges = [];
        let id = 0;
        (function walk(node, parentId, label, edgeOnPath) {
          const myId = "fc" + id++;
          nodes.push({ id: myId, type: "fc", position: { x: 0, y: 0 }, data: { node, onPath: onPath.has(node) } });
          if (parentId !== null) {
            edges.push({
              id: myId + "-e", source: parentId, target: myId, label: fcShortLabel(label),
              type: "smoothstep",
              style: { stroke: edgeOnPath ? "#fff" : "#3a3a3a", strokeWidth: edgeOnPath ? 2.5 : 1.25 },
              labelStyle: { fill: edgeOnPath ? "#fff" : "#9a9a9a", fontSize: 10, fontWeight: edgeOnPath ? 800 : 600 },
              labelBgStyle: { fill: "#0a0a0a", fillOpacity: 0.9 },
              labelBgPadding: [4, 2], labelBgBorderRadius: 4,
            });
          }
          let branches = (node.fork && node.fork.branches) || [];
          if (mode === "path" || mode === "route") branches = branches.filter((b) => onPath.has(b.node));
          branches.forEach((b) => walk(b.node, myId, b.label, onPath.has(node) && onPath.has(b.node)));
        })(root, null, null, false);
        return { nodes, edges };
      }

      function fcLayout(nodes, edges) {
        const graph = new dagre.graphlib.Graph();
        graph.setDefaultEdgeLabel(() => ({}));
        // Extra horizontal/vertical spacing so the (shortened) edge labels sit between nodes
        // without overlapping each other or the connector lines.
        graph.setGraph({ rankdir: "TB", nodesep: 70, ranksep: 96, marginx: 60, marginy: 50 });
        nodes.forEach((node) => graph.setNode(node.id, { width: 300, height: fcNodeHeight(node.data.node) }));
        edges.forEach((edge) => graph.setEdge(edge.source, edge.target));
        dagre.layout(graph);
        return nodes.map((node) => {
          const pos = graph.node(node.id);
          return { ...node, position: { x: pos.x - 150, y: pos.y - fcNodeHeight(node.data.node) / 2 } };
        });
      }

      function fcStats(root) {
        const stats = { nodes: 0, forks: 0, terminals: 0, winLeaves: 0, truncated: 0 };
        (function walk(node) {
          if (!node) return;
          stats.nodes += 1;
          const branches = (node.fork && node.fork.branches) || [];
          if (branches.length) {
            stats.forks += 1;
            branches.forEach((b) => walk(b.node));
            return;
          }
          if (node.outcome === "truncated") {
            stats.truncated += 1;
            return;
          }
          if (node.outcome) {
            stats.terminals += 1;
            if (node.outcome === "win-line") stats.winLeaves += 1;
          }
        })(root);
        return stats;
      }

      function fcPrimaryPath(root) {
        const path = [];
        let node = root;
        while (node) {
          path.push(node);
          const branches = (node.fork && node.fork.branches) || [];
          if (!branches.length) break;
          node = branches.reduce((best, b) => ((b.probability || 0) > (best.probability || 0) ? b : best), branches[0]).node;
        }
        return path;
      }

      function fcFindState(root, stateId) {
        if (!stateId) return null;
        let found = null;
        (function walk(node) {
          if (!node || found) return;
          if (node.state_id === stateId) { found = node; return; }
          ((node.fork && node.fork.branches) || []).forEach((branch) => walk(branch.node));
        })(root);
        return found;
      }

      function fcRouteCatalog(root) {
        const routes = [];
        (function walk(node, trail, probability, branchLabels) {
          if (!node) return;
          const next = [...trail, node];
          const branches = (node.fork && node.fork.branches) || [];
          if (!branches.length) {
            const steps = next.flatMap((n) => n.steps || []);
            const text = [
              ...branchLabels,
              ...steps.map((s) => `${s.action || ""} ${s.detail || ""} ${s.answer || ""} ${s.enemy || ""} ${s.your_hp || ""} ${s.enemy_hp || ""}`),
            ].join(" ").toLowerCase();
            routes.push({
              node, nodes: next, steps, probability, branchLabels,
              outcome: node.outcome || "partial-line",
              text,
              tokens: new Set(fcQueryTokens(text)),
            });
            return;
          }
          branches.forEach((branch) => walk(
            branch.node, next, probability * Math.max(0, branch.probability || 0),
            [...branchLabels, branch.label || ""],
          ));
        })(root, [], 1, []);
        return routes.sort((a, b) => b.probability - a.probability);
      }

      const FC_QUERY_STOP_WORDS = new Set(["i", "you", "we", "the", "a", "an", "and", "then", "so", "now", "did", "do", "used", "uses", "with", "my", "their", "they", "led", "lead"]);
      function fcQueryTokens(value) {
        return String(value || "").toLowerCase().replace(/[^a-z0-9%]+/g, " ").split(/\s+/)
          .filter((token) => token && !FC_QUERY_STOP_WORDS.has(token));
      }

      function fcWithinEdits(a, b, limit) {
        if (a === b) return true;
        if (Math.abs(a.length - b.length) > limit) return false;
        let previous = Array.from({ length: b.length + 1 }, (_, i) => i);
        for (let i = 1; i <= a.length; i += 1) {
          const current = [i];
          let rowMin = i;
          for (let j = 1; j <= b.length; j += 1) {
            current[j] = Math.min(
              current[j - 1] + 1,
              previous[j] + 1,
              previous[j - 1] + Number(a[i - 1] !== b[j - 1]),
            );
            rowMin = Math.min(rowMin, current[j]);
          }
          if (rowMin > limit) return false;
          previous = current;
        }
        return previous[b.length] <= limit;
      }

      function fcRouteMatchesToken(route, token) {
        if (route.text.includes(token)) return true;
        if (token.length < 5) return false;
        const limit = token.length >= 6 ? 2 : 1;
        for (const candidate of route.tokens) {
          if (candidate.length >= 5 && fcWithinEdits(token, candidate, limit)) return true;
        }
        return false;
      }

      function FlowInspector({ node, tree, onSelect, onExploreAll, onCancelExplore, exploreStatus }) {
        const active = node || tree;
        if (!active) return null;
        const steps = active.steps || [];
        const branches = (active.fork && active.fork.branches) || [];
        const title = active.outcome
          ? (active.outcome === "win-line" ? "Terminal: clears"
            : active.outcome === "merge" ? "Rejoins an earlier line"
            : active.outcome === "truncated" ? "Rare line — continue in Co-pilot"
            : "Terminal: partial")
          : branches.length ? "Fork details" : "Line segment";
        return (
          <aside className="fc-side" aria-label="Flowchart details">
            <h3>{title}</h3>
            {steps.length ? steps.map((s, i) => (
              <div className="fc-step-detail" key={`detail-${i}`}>
                <b>Turn {s.turn}</b>: {fcStepText(s)}
                {(s.your_hp || s.enemy_hp) && <span className="fc-hp">HP {s.your_hp || "?"} / foe {s.enemy_hp || "?"}</span>}
                {s.calc && <div className="fc-side-row">{s.calc}</div>}
                {s.consistency && <div className="fc-side-row">{s.consistency}</div>}
              </div>
            )) : <div className="fc-side-row">Select any box to read the full turn text, calcs, and branch odds.</div>}
            {branches.length > 0 && (
              <div className="fc-side-section">
                <h3>{active.fork?.question || "Branches"}</h3>
                {branches.map((b, i) => (
                  <button className="fc-branch-row" key={`branch-${i}`} onClick={() => onSelect(b.node)}>
                    <div className="fc-branch-prob">{Math.round((b.probability || 0) * 100)}%</div>
                    <div>{b.label || "Branch"}{b.node?.outcome && <span className="fc-hp"> · {b.node.outcome}</span>}</div>
                  </button>
                ))}
              </div>
            )}
            {active.outcome && (
              <div className="fc-side-section">
                <div className="fc-side-row"><b>Outcome:</b> {active.outcome}</div>
                {active.note && <div className="fc-side-row">{active.note}</div>}
                {active.confidence != null && <div className="fc-side-row"><b>Branch confidence:</b> {pct(active.confidence)}</div>}
              </div>
            )}
            {active.outcome === "merge" && active.merge_state_id && (
              <button className="fc-explore-all" onClick={() => onSelect(fcFindState(tree, active.merge_state_id))}>
                Jump to the shared continuation
              </button>
            )}
            {active.outcome === "truncated" && (
              exploreStatus === "expanding every branch"
                ? <button className="fc-explore-all" onClick={onCancelExplore}>Stop and keep explored routes</button>
                : <button className="fc-explore-all" onClick={onExploreAll}>Explore every branch</button>
            )}
          </aside>
        );
      }

      function FlowchartGuide({ tree, onClose, onOpenCoach }) {
        const [node, setNode] = useState(tree);
        const [stepIndex, setStepIndex] = useState(0);
        const [history, setHistory] = useState([]);
        const [startedTurns, setStartedTurns] = useState([]);
        const steps = node?.steps || [];
        const step = steps[stepIndex] || null;
        const stepWasStarted = step ? startedTurns.includes(step.turn) : false;
        const fork = !step ? node?.fork : null;
        const forkStarted = fork ? startedTurns.includes(fork.turn) : false;

        function follow(nextNode) {
          let resolved = nextNode;
          if (resolved?.outcome === "merge" && resolved.merge_state_id) {
            resolved = fcFindState(tree, resolved.merge_state_id) || resolved;
          }
          setHistory((items) => [...items, { node, stepIndex }]);
          setNode(resolved || { steps: [], outcome: "partial-line" });
          setStepIndex(0);
        }

        function goBack() {
          setHistory((items) => {
            const previous = items[items.length - 1];
            if (previous) {
              setNode(previous.node);
              setStepIndex(previous.stepIndex);
            }
            return items.slice(0, -1);
          });
        }

        return (
          <aside className="fc-side fc-guide" aria-label="Guided battle line">
            <div className="fc-guide-kicker">Guided battle · one decision at a time</div>
            {step ? (
              <>
                <h3>Turn {step.turn || "next"}</h3>
                <div className="fc-guide-action">{step.action || "Follow the planned action"}</div>
                {step.detail && <div className="fc-guide-detail">{step.detail}</div>}
                <div className="fc-guide-hp">
                  <span><b>You:</b> {step.your_hp || "check live HP"}</span>
                  <span><b>Foe:</b> {step.enemy_hp || "check live HP"}</span>
                </div>
                {step.consistency && <div className="fc-guide-progress">Model note: {step.consistency}</div>}
                <button className="fc-guide-next" onClick={() => {
                  if (!stepWasStarted) setStartedTurns((turns) => [...turns, step.turn]);
                  setStepIndex((index) => index + 1);
                }}>
                  {stepWasStarted ? "Outcome matches — next instruction" : "I did it — next instruction"}
                </button>
              </>
            ) : fork && !forkStarted ? (
              <>
                <div className="fc-guide-kicker">Your next action</div>
                <h3>Turn {fork.turn || "next"}</h3>
                <div className="fc-guide-action">{fork.instruction?.action || "Follow the planned action"}</div>
                <div className="fc-guide-detail">Make this play in-game first. Then confirm it and choose the move, crit, miss, damage, or HP result you actually saw.</div>
                <button className="fc-guide-next" onClick={() => setStartedTurns((turns) => [...turns, fork.turn])}>
                  I did it — what happened?
                </button>
              </>
            ) : fork ? (
              <>
                <h3>{fork.question || "What happened?"}</h3>
                <div className="fc-guide-detail">Pick the result you actually saw. The guide will jump to the correct continuation and recalculate the remaining instructions for that HP state.</div>
                {(fork.branches || []).map((branch, index) => (
                  <button className="fc-guide-choice" key={`guide-branch-${index}`} onClick={() => follow(branch.node)}>
                    {branch.label || "This happened"}
                  </button>
                ))}
              </>
            ) : (
              <>
                <h3>{node?.outcome === "win-line" ? "Fight cleared" : "End of this modeled route"}</h3>
                <div className="fc-guide-action">{node?.outcome === "win-line" ? "You reached the planned win." : "This route needs a live update."}</div>
                {node?.note && <div className="fc-guide-detail">{node.note}</div>}
                {node?.outcome !== "win-line" && <button className="fc-guide-next" onClick={onOpenCoach}>Continue from the live state in Co-pilot</button>}
              </>
            )}
            <div className="fc-guide-tools">
              <button onClick={goBack} disabled={!history.length}>Back</button>
              <button onClick={onOpenCoach}>Something differed</button>
              <button onClick={onClose}>Exit guide</button>
            </div>
            <div className="fc-guide-progress">{history.length} confirmed decision{history.length === 1 ? "" : "s"} · every deterministic turn still requires confirmation</div>
          </aside>
        );
      }

      function FlowchartExpansionProgress({ progress, onCancel }) {
        if (!progress || !(
          progress.running || progress.complete
          || ["failed", "cancelled", "stopping"].includes(progress.phase)
        )) return null;
        const value = Math.max(0, Math.min(100, Number(progress.pct) || 0));
        const label = progress.complete
          ? "Every branch explored"
          : progress.phase === "failed"
            ? "Expansion failed"
            : progress.phase === "cancelled"
              ? "Expansion stopped"
              : progress.phase === "stopping"
                ? "Stopping safely…"
                : "Exploring every possible line";
        return (
          <div className="fc-expansion-progress fc-toolbar-progress" aria-live="polite">
            <div><b>{label}</b><span>{Math.round(value)}%</span></div>
            <progress
              className="fc-progress-track"
              max="100"
              value={value}
              aria-label="Flowchart exploration progress"
            >{Math.round(value)}%</progress>
            <small>
              {progress.expanded || 0} positions explored · {progress.queued || 0} waiting · {progress.positions_per_s || 0}/s
              {progress.eta_s ? ` · about ${progress.eta_s}s remaining` : ""} · {progress.elapsed_s || 0}s elapsed
            </small>
            {progress.running && <button type="button" onClick={onCancel}>Stop and keep explored routes</button>}
          </div>
        );
      }

      function FlowchartView({ result, onExploreAll, onCancelExplore, exploreStatus, expansionProgress, onOpenCoach }) {
        const tree = result && result.contingency_flowchart;
        const [mode, setMode] = useState("path");
        const [selectedNode, setSelectedNode] = useState(null);
        const [flowInstance, setFlowInstance] = useState(null);
        const [routeQuery, setRouteQuery] = useState("");
        const [outcomeFilter, setOutcomeFilter] = useState("all");
        const [focusedRoute, setFocusedRoute] = useState(null);
        const [showAllRoutes, setShowAllRoutes] = useState(false);
        const [guideActive, setGuideActive] = useState(false);
        const [guideSession, setGuideSession] = useState(0);
        const graph = useMemo(() => {
          if (!tree) return { nodes: [], edges: [] };
          const focusNodes = focusedRoute ? new Set(focusedRoute.nodes) : null;
          const { nodes, edges } = treeToFlow(tree, mode, focusNodes);
          return { nodes: fcLayout(nodes, edges), edges };
        }, [tree, mode, focusedRoute]);
        const stats = useMemo(() => tree ? fcStats(tree) : { nodes: 0, forks: 0, terminals: 0, winLeaves: 0 }, [tree]);
        const pathTurns = useMemo(() => tree ? fcPrimaryPath(tree).flatMap((n) => n.steps || []).length : 0, [tree]);
        const routes = useMemo(() => tree ? fcRouteCatalog(tree) : [], [tree]);
        const visibleRoutes = useMemo(() => routes.filter((route) => {
          const queryTokens = fcQueryTokens(routeQuery);
          const matchesText = !queryTokens.length || queryTokens.every((token) => fcRouteMatchesToken(route, token));
          const matchesOutcome = outcomeFilter === "all"
            || (outcomeFilter === "clears" && route.outcome === "win-line")
            || (outcomeFilter === "fails" && !["win-line", "truncated", "merge"].includes(route.outcome))
            || (outcomeFilter === "unexplored" && route.outcome === "truncated");
          return matchesText && matchesOutcome;
        }), [routes, routeQuery, outcomeFilter]);
        useEffect(() => {
          setSelectedNode(null);
          setGuideActive(false);
          setTimeout(() => flowInstance?.fitView({ padding: 0.18, duration: 250 }), 0);
        }, [tree, mode, flowInstance]);
        if (!tree) {
          return <div className="empty">Run a Sim Calc in Matchup to generate the contingency flowchart, then open Contingencies here.</div>;
        }
        return (
          <div className={`fc-shell ${guideActive ? "guide-active" : ""}`}>
            <aside className="fc-routes" aria-label="Battle routes">
              <div className="fc-routes-head"><h2>Routes</h2><span>{visibleRoutes.length}/{routes.length}</span></div>
              <div className="fc-current-state">
                <label htmlFor="fc-current-state">What happened so far?</label>
                <textarea id="fc-current-state" value={routeQuery} onChange={(e) => { setRouteQuery(e.target.value); setShowAllRoutes(false); }} placeholder="Example: led Arcanine, foe used Wild Charge, I used Protect…" />
                <div>{fcQueryTokens(routeQuery).length ? `${visibleRoutes.length} matching continuations` : "Enter any lead, move, switch, or HP you remember."}</div>
                {routeQuery && <button type="button" onClick={() => setRouteQuery("")}>Clear current state</button>}
              </div>
              <div className="fc-filter-row">
                {[['all','All'],['clears','Clears'],['fails','Fails'],['unexplored','Unexplored']].map(([key,label]) => (
                  <button key={key} className={outcomeFilter === key ? "active" : ""} onClick={() => setOutcomeFilter(key)}>{label}</button>
                ))}
              </div>
              <div className="fc-route-label">Recommended route</div>
              <div className="fc-primary-route">
                {fcPrimaryPath(tree).flatMap((n) => n.steps || []).map((step, i) => (
                  <button key={`primary-${i}`} onClick={() => setSelectedNode(fcPrimaryPath(tree).find((n) => (n.steps || []).includes(step)))}>
                    <span className="fc-route-turn">{i + 1}</span><span><b>{step.action || `Turn ${step.turn}`}</b><small>{step.your_hp || "?"} HP · foe {step.enemy_hp || "?"}</small></span>
                  </button>
                ))}
              </div>
              <div className="fc-route-label">Alternate endings</div>
              <div className="fc-route-list">
                {visibleRoutes.slice(0, showAllRoutes ? 80 : 12).map((route, i) => (
                  <button key={`route-${i}`} className={focusedRoute === route ? "selected" : ""} onClick={() => { setFocusedRoute(route); setSelectedNode(route.node); setMode("route"); }}>
                    <span className={`fc-route-dot ${route.outcome}`}></span>
                    <span className="fc-route-summary">
                      <span>{route.outcome === "win-line" ? "Clears fight" : route.outcome === "truncated" ? "Unexplored tail" : route.outcome === "merge" ? "Rejoins route" : "Does not clear"}</span>
                      <small>{route.branchLabels.slice(-2).map(fcShortLabel).join(" → ") || route.steps.slice(-2).map((step) => step.action).filter(Boolean).join(" → ") || "Main line"}</small>
                    </span>
                    <b>{route.probability < .001 ? "<0.1%" : pct(route.probability)}</b>
                  </button>
                ))}
              </div>
              {visibleRoutes.length > 12 && <button className="fc-show-more" onClick={() => setShowAllRoutes((shown) => !shown)}>{showAllRoutes ? "Show fewer endings" : `Show ${visibleRoutes.length - 12} more endings`}</button>}
            </aside>
            <div className="fc-toolbar">
              <div>
                <div className="fc-title">{result.trainer || "Contingency flowchart"}</div>
                <div className="fc-summary">
                  {(tree._meta && tree._meta.complete) ? "Complete modeled tree" : "Budgeted modeled tree"} · {stats.nodes} boxes · {stats.forks} forks · {stats.winLeaves}/{stats.terminals || 1} clearing endings{stats.truncated ? ` · ${stats.truncated} tails not expanded → Co-pilot` : ""} · main line {pathTurns} turns · confidence range {confidenceRange(result)}
                  {result.contingency_flowchart_note ? <> · {result.contingency_flowchart_note}</> : null}
                </div>
              </div>
              <div className="fc-toolbar-actions">
                <button className="fc-guide-start" onClick={() => { setGuideSession((value) => value + 1); setGuideActive(true); }}>Start guided battle</button>
                <button className={`tab ${mode === "all" ? "active" : ""}`} onClick={() => setMode("all")}>Every path</button>
                <button className={`tab ${mode === "path" ? "active" : ""}`} onClick={() => setMode("path")}>Most likely only</button>
                {focusedRoute && <button className={`tab ${mode === "route" ? "active" : ""}`} onClick={() => setMode("route")}>Current line</button>}
                <button className="ghost" onClick={() => flowInstance?.fitView({ padding: 0.18, duration: 250 })}>Fit</button>
                {!(tree._meta && tree._meta.complete) && (exploreStatus === "expanding every branch"
                  ? <button className="fc-explore-compact" onClick={onCancelExplore}>Stop expansion</button>
                  : <button className="fc-explore-compact" onClick={onExploreAll}>Explore every branch</button>)}
              </div>
              <FlowchartExpansionProgress progress={expansionProgress} onCancel={onCancelExplore} />
            </div>
            <ReactFlow
              nodes={graph.nodes}
              edges={graph.edges}
              nodeTypes={fcNodeTypes}
              fitView
              minZoom={0.08}
              maxZoom={1.6}
              nodesDraggable={false}
              nodesConnectable={false}
              onInit={setFlowInstance}
              onNodeClick={(_, node) => setSelectedNode(node.data.node)}
              proOptions={{ hideAttribution: true }}
            >
              <Background color="#1a1a1a" gap={22} />
              <MiniMap pannable zoomable nodeColor={(n) => (n.data?.onPath ? "#777" : "#292929")} maskColor="rgba(0,0,0,0.78)" />
            </ReactFlow>
            {guideActive
              ? <FlowchartGuide key={guideSession} tree={tree} onClose={() => setGuideActive(false)} onOpenCoach={onOpenCoach} />
              : <FlowInspector node={selectedNode} tree={tree} onSelect={setSelectedNode} onExploreAll={onExploreAll} onCancelExplore={onCancelExplore} exploreStatus={exploreStatus} />}
            <div className="fc-legend">
              <div className="row"><span className="sw" style={{ background: "#fff" }} /><span><b>most likely path</b> — follow this</span></div>
              <div className="row"><span className="sw" style={{ background: "#3a3a3a" }} /><span>if a roll / the AI differs</span></div>
              <div className="row"><span>◇ fork &nbsp;·&nbsp; <span style={{ color: "#46c46a" }}>✓ clears</span> &nbsp;·&nbsp; <span style={{ color: "#e0b341" }}>△ partial</span> &nbsp;·&nbsp; <span style={{ color: "#6aa9ff" }}>↺ rejoins</span> &nbsp;·&nbsp; <span style={{ color: "#b98add" }}>➜ rare line, use Co-pilot</span></span></div>
            </div>
          </div>
        );
      }

      const COACH_STATUSES = ["", "burn", "poison", "toxic", "paralysis", "sleep", "freeze"];

      // Interactive co-pilot: you report the live position, it tells you the best play and what
      // the foe is likely to do, then advances to the projected next turn.
      function CoachView({ data, state, status, log, turn, hasTeam, onStart, onEdit, onNext }) {
        const [pick, setPick] = useState(0);
        useEffect(() => { setPick(0); }, [data]);

        if (!hasTeam) {
          return <div className="empty">Import your team in <b>Matchup</b> first — Turn Coach uses that team and the selected trainer.</div>;
        }
        if (data && data.won) {
          return (
            <div className="coach-view">
              <div className="coach-won">✓ Battle won — every enemy Pokémon is down.</div>
              <CoachLog log={log} />
              <button className="rnb-btn rnb-green" onClick={onStart}>Start a new run</button>
            </div>
          );
        }
        if (!state || !data) {
          return (
            <div className="coach-view">
              <div className="coach-intro">
                <h2>Battle Co-pilot</h2>
                <p>Step through the fight turn by turn. Each turn it tells you the best move to click, shows what the foe is likely to do, and you tell it what actually happened — then it advises the next turn from the real position.</p>
                <button className="rnb-btn rnb-green" onClick={onStart} disabled={status === "running"}>{status === "running" ? "Thinking…" : "Start battle ▶"}</button>
                {status !== "idle" && status !== "running" && status !== "ok" && <div className="coach-err">{status}</div>}
              </div>
            </div>
          );
        }

        const rec = data.recommendation;
        const you = data.team[data.player_active];
        const foe = data.enemies[data.enemy_active];
        const pred = data.enemy_prediction || [];
        const chosen = pred[pick] || pred[0];
        const dmgText = (d) => d ? `${d.min_pct}–${d.max_pct}%${d.accuracy < 100 ? ` · ${d.accuracy}% acc` : ""}` : "";

        return (
          <div className="coach-view">
            <div className="coach-turn-head">Turn {turn}</div>

            <div className="coach-situation">
              <div className="coach-side">
                <span className="coach-side-tag you">YOU</span>
                <select value={data.player_active} onChange={(e) => onEdit({ player_active: Number(e.target.value) })}>
                  {data.team.map((m) => <option key={m.slot} value={m.slot}>{m.name}</option>)}
                </select>
                <input type="number" className="coach-hp" value={state.player_hp} min={0} max={you.max_hp}
                  onChange={(e) => onEdit({ player_hp: Math.max(0, Math.min(you.max_hp, Number(e.target.value))) })} />
                <span className="coach-max">/ {you.max_hp}</span>
                {String(you.item || "").toLowerCase().includes("oran berry") && !state.player_consumed_items?.[data.player_active] && (
                  <button type="button" className="coach-heal" onClick={() => {
                    const consumed = [...(state.player_consumed_items || [])]; consumed[data.player_active] = true;
                    onEdit({ player_hp: Math.min(you.max_hp, state.player_hp + 10), player_consumed_items: consumed });
                  }}>Oran +10</button>
                )}
                {String(you.item || "").toLowerCase().includes("sitrus berry") && !state.player_consumed_items?.[data.player_active] && (
                  <button type="button" className="coach-heal" onClick={() => {
                    const consumed = [...(state.player_consumed_items || [])]; consumed[data.player_active] = true;
                    onEdit({ player_hp: Math.min(you.max_hp, state.player_hp + Math.max(1, Math.floor(you.max_hp / 4))), player_consumed_items: consumed });
                  }}>Sitrus +{Math.max(1, Math.floor(you.max_hp / 4))}</button>
                )}
                <select value={state.player_status || ""} onChange={(e) => onEdit({ player_status: e.target.value })}>
                  {COACH_STATUSES.map((s) => <option key={s} value={s}>{s || "healthy"}</option>)}
                </select>
              </div>
              <div className="coach-vs">vs</div>
              <div className="coach-side">
                <span className="coach-side-tag foe">FOE</span>
                <select value={data.enemy_active} onChange={(e) => onEdit({ enemy_active: Number(e.target.value) })}>
                  {data.enemies.map((m) => <option key={m.slot} value={m.slot}>{m.name}</option>)}
                </select>
                <input type="number" className="coach-hp" value={state.enemy_hp} min={0} max={foe.max_hp}
                  onChange={(e) => onEdit({ enemy_hp: Math.max(0, Math.min(foe.max_hp, Number(e.target.value))) })} />
                <span className="coach-max">/ {foe.max_hp}</span>
                <select value={state.enemy_status || ""} onChange={(e) => onEdit({ enemy_status: e.target.value })}>
                  {COACH_STATUSES.map((s) => <option key={s} value={s}>{s || "healthy"}</option>)}
                </select>
              </div>
            </div>

            <div className={`coach-rec ${rec.kind}`}>
              <div className="coach-rec-label">▶ {rec.label}</div>
              <div className="coach-rec-meta">
                <span className="coach-pill">{rec.consistency}</span>
                {rec.damage && <span className="coach-dim">{dmgText(rec.damage)}</span>}
                <span className="coach-dim">{rec.reason}</span>
              </div>
              {(data.alternatives || []).length > 0 && (
                <div className="coach-alts">or: {data.alternatives.map((a, i) => (
                  <span key={i} className="coach-alt">{a.move_name} <i>({a.consistency})</i>{i < data.alternatives.length - 1 ? " · " : ""}</span>
                ))}</div>
              )}
            </div>

            {(data.warnings || []).map((w, i) => <div className="coach-warn" key={i}>⚠ {w}</div>)}

            <div className="coach-foe-block">
              <div className="coach-section-tag">What {foe.name} is likely to do — pick what actually happened:</div>
              {pred.map((p, i) => {
                const pr = p.projection;
                return (
                  <label key={i} className={`coach-pred ${i === pick ? "sel" : ""}`}>
                    <input type="radio" name="enemy-move" checked={i === pick} onChange={() => setPick(i)} />
                    <span className="coach-pred-move">{p.move}</span>
                    <span className="coach-prob">{Math.round((p.probability || 0) * 100)}%</span>
                    {p.damage && p.damage.max > 0 && <span className="coach-dim">hits {dmgText(p.damage)}</span>}
                    {pr.enemy_recoil_damage > 0 ? (
                      <span className="coach-recoil">recoil {pr.enemy_recoil_damage} → foe {pr.enemy_hp_before_player} before your move</span>
                    ) : pr.enemy_self_damage > 0 ? (
                      <span className="coach-recoil">self-damage {pr.enemy_self_damage} → foe {pr.enemy_hp_before_player} before your move</span>
                    ) : null}
                    {pr.recoil_flips_player_ko && <span className="coach-recoil-ko">recoil makes your move KO</span>}
                    <span className="coach-proj">→ you {pr.player_fainted ? "faint" : pr.player_hp} · foe {pr.enemy_fainted ? "KO" : pr.enemy_hp}</span>
                  </label>
                );
              })}
            </div>

            <div className="coach-actions">
              <button className="rnb-btn rnb-green" onClick={() => onNext(chosen)} disabled={status === "running" || !chosen}>Next turn →</button>
              <button className="rnb-btn" onClick={onStart}>Restart</button>
              {status === "running" && <span className="coach-dim">thinking…</span>}
            </div>

            <CoachLog log={log} />
          </div>
        );
      }

      function CoachLog({ log }) {
        if (!log || !log.length) return null;
        return (
          <div className="coach-log">
            <div className="coach-section-tag">Turn history</div>
            {log.map((t, i) => (
              <div className="coach-log-row" key={i}>
                <b>T{t.turn}</b> {t.you}: {t.action} <span className="coach-dim">— {t.foe} used {t.enemyMove}</span>
              </div>
            ))}
          </div>
        );
      }

      function buildBattlePlanDocument(result, selectedTrainer, heartScaleOverride) {
        if (!result) return "";
        const band = confidenceBand(result.confidence);
        const confPct = Math.round((result.confidence || 0) * 100);
        const confidenceRangeText = confidenceRange(result);
        const winnable = result.result === "win-line";
        const verdict = winnable
          ? "Winnable line found — this plan clears the whole fight under the model."
          : "Partial line — this plan makes progress but does not fully clear the fight yet.";

        const drops = confidenceDrops(result.turns);
        const topDrops = drops.slice(0, 3);

        // Collect unique risk notes across the line for the plain-English breakdown.
        const riskSet = [];
        const seen = new Set();
        (result.turns || []).forEach((turn) => {
          (turn.risks || []).forEach((risk) => {
            const key = risk.trim().toLowerCase();
            if (risk.trim() && !seen.has(key)) { seen.add(key); riskSet.push(risk.trim()); }
          });
        });

        const enemyParty = (selectedTrainer && selectedTrainer.party) || result.enemies || [];

        const section = (title, inner) => `
          <section class="bp-section">
            <h2>${escapeHtml(title)}</h2>
            ${inner}
          </section>`;

        // What you need to do — numbered, plain steps (current-items line).
        const stepsHtml = renderPlanSteps(result.turns);

        // --- Alternate lines: ideal items, and best-case (no secondary effects) ---
        const idealLine = result.optimized_item_line;
        const bestLine = result.best_case_line;

        const altLineHtml = (line, intro) => {
          if (!line) return "";
          const p = Math.round((line.confidence || 0) * 100);
          const b = confidenceBand(line.confidence);
          const changes = (line.item_changes || []).length
            ? `<p style="margin:2px 0 8px;"><strong>Item changes:</strong> ` +
              line.item_changes.map((c) => `${escapeHtml(c.pokemon)} → ${escapeHtml(c.new_item)}`).join(", ") + `</p>`
            : "";
          return `
            <p class="bp-altmeta"><strong>${p}% &middot; ${escapeHtml(b.word)}.</strong> ${escapeHtml(intro)}</p>
            ${line.mode_note ? `<p class="bp-muted" style="margin:0 0 8px;">${escapeHtml(line.mode_note)}</p>` : ""}
            ${changes}
            ${renderPlanSteps(line.turns)}`;
        };

        // --- Heart scales ---
        const estimated = estimateHeartScales(selectedTrainer);
        const haveScales = (heartScaleOverride != null && heartScaleOverride !== "")
          ? Math.max(0, parseInt(heartScaleOverride, 10) || 0)
          : estimated;
        const scaleSourceHint = HEART_SCALE_SOURCES.slice(0, 8)
          .map((s) => `${escapeHtml(s.where)} (${s.count})`).join(", ");
        const weakTurn = (confidenceDrops(result.turns)[0] || {}).turn;
        const weakMon = weakTurn ? weakTurn.answer : ((result.team || [])[0] || {}).name;
        const weakEnemy = weakTurn ? weakTurn.enemy : "the toughest enemy";
        const needsHelp = (result.confidence || 0) < 0.75 || result.result !== "win-line";
        const scaleSuggestions = needsHelp
          ? [
              `Relearn a move on <strong>${escapeHtml(weakMon)}</strong> (1 scale) at the Move Relearner so it carries a cleaner answer to <strong>${escapeHtml(weakEnemy)}</strong>.`,
              `Max a Speed IV on <strong>${escapeHtml(weakMon)}</strong> (1 scale), or change its nature to a +Speed one (3 scales), to flip the speed tie against ${escapeHtml(weakEnemy)}.`,
              `Max an HP or defensive IV (1 scale) on the Pokémon that takes the scariest hit so it survives and keeps the line.`,
            ]
          : [
              `This line is already stable — save your scales. If you want extra insurance, maxing a Speed IV (1 scale) on your lead removes most speed-tie risk.`,
            ];
        const heartScaleHtml = `
          <p><strong>Estimated heart scales by this point:</strong> ${haveScales != null ? haveScales : "unknown"}${(heartScaleOverride != null && heartScaleOverride !== "") ? " (your override)" : (estimated != null ? " (estimate — override in the panel)" : "")}.</p>
          <p class="bp-muted" style="margin-top:0;">Spend them at the Move Relearner in any Pokémon Center. Costs: relearn a move = <strong>1</strong>, max one IV = <strong>1</strong>, change a nature = <strong>3</strong>. They are finite and the bag is locked in battle, so set this up beforehand.</p>
          <p style="margin-bottom:4px;"><strong>Ways to spend scales to escape this fight:</strong></p>
          <ul class="bp-list">${scaleSuggestions.map((s) => `<li>${s}</li>`).join("")}</ul>
          <p class="bp-muted" style="margin-top:8px;">Need more scales? Early sources: ${scaleSourceHint}, and more underwater (Dive) later.</p>`;

        // --- Strategy notes ---
        const strategyHtml = `<ul class="bp-list">` +
          strategyNotes(result).map((n) => `<li>${escapeHtml(n)}</li>`).join("") + `</ul>`;

        // Confidence breakdown — what dragged this specific number down.
        const dropHtml = topDrops.length
          ? `<ul class="bp-list">` + topDrops.map((row) => `
              <li>
                <strong>Turn ${escapeHtml(row.turn.turn)} (${escapeHtml(row.turn.answer)} vs ${escapeHtml(row.turn.enemy)})</strong>
                cost about <strong>${Math.round(row.drop * 100)}%</strong>${(row.turn.risks || []).length ? ` &mdash; ${escapeHtml((row.turn.risks || [])[0])}` : ""}.
              </li>`).join("") + `</ul>`
          : `<p class="bp-muted">No single turn stood out — confidence stayed high throughout.</p>`;

        const riskHtml = riskSet.length
          ? `<ul class="bp-list">` + riskSet.slice(0, 12).map((risk) => `<li>${escapeHtml(risk)}</li>`).join("") + `</ul>`
          : `<p class="bp-muted">No specific risks were flagged on this line.</p>`;

        const enemyHtml = enemyParty.length
          ? `<table class="bp-table"><thead><tr><th>#</th><th>Enemy</th><th>Item</th><th>Moves</th></tr></thead><tbody>` +
            enemyParty.map((mon, i) => `<tr>
                <td>${i + 1}</td>
                <td>${escapeHtml(mon.species || mon.name)}${mon.level ? ` Lv.${escapeHtml(mon.level)}` : ""}</td>
                <td>${escapeHtml(mon.item || "—")}</td>
                <td>${escapeHtml((mon.moves || []).join(" / ") || "unknown")}</td>
              </tr>`).join("") + `</tbody></table>`
          : `<p class="bp-muted">Enemy team not available.</p>`;

        const teamHtml = (result.team || []).length
          ? `<table class="bp-table"><thead><tr><th>#</th><th>Your Pokémon</th><th>HP</th><th>Moves</th></tr></thead><tbody>` +
            (result.team || []).map((mon, i) => `<tr>
                <td>${i + 1}</td>
                <td>${escapeHtml(mon.name || mon.species)}${mon.item ? ` @ ${escapeHtml(mon.item)}` : ""}</td>
                <td>${escapeHtml(mon.hp || "?")}/${escapeHtml(mon.max_hp || "?")}</td>
                <td>${escapeHtml((mon.moves || []).join(" / ") || "unknown")}</td>
              </tr>`).join("") + `</tbody></table>`
          : `<p class="bp-muted">No imported team.</p>`;

        const itemHtml = (result.item_recommendations || []).length
          ? `<ul class="bp-list">` + (result.item_recommendations || []).map((rec) =>
              `<li><strong>${escapeHtml(rec.pokemon)}:</strong> ${rec.current_item ? `${escapeHtml(rec.current_item)} → ` : ""}${escapeHtml(rec.suggested_item)} &mdash; ${escapeHtml(rec.reason)}</li>`
            ).join("") + `</ul>`
          : "";

        const now = new Date();
        const trainerLabel = (selectedTrainer && selectedTrainer.label) || result.trainer || "Battle";

        return `<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Battle Plan — ${escapeHtml(trainerLabel)}</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: #000; background: #fff;
    font-size: 12px; line-height: 1.5;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .bp-page { max-width: 820px; margin: 0 auto; padding: 28px 34px 60px; }
  .bp-header { background: #000; color: #fff; padding: 18px 22px; border-radius: 4px; }
  .bp-header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; }
  .bp-header .bp-sub { margin-top: 4px; font-size: 12px; color: #d8d8d8; }
  .bp-toolbar { margin: 16px 0; }
  .bp-toolbar button {
    font: inherit; font-weight: 700; cursor: pointer;
    background: #000; color: #fff; border: 1px solid #000;
    padding: 8px 16px; border-radius: 4px;
  }
  .bp-verdict {
    border: 2px solid #000; border-radius: 4px; padding: 16px 18px; margin-top: 18px;
    display: flex; gap: 18px; align-items: flex-start; justify-content: space-between;
  }
  .bp-verdict .bp-verdict-text { flex: 1; }
  .bp-verdict h2 { margin: 0 0 6px; font-size: 15px; }
  .bp-verdict p { margin: 0; }
  .bp-conf {
    text-align: center; border: 2px solid #000; border-radius: 4px;
    padding: 10px 14px; min-width: 120px;
  }
  .bp-conf .bp-conf-num { font-size: 30px; font-weight: 800; line-height: 1; }
  .bp-conf .bp-conf-word { font-size: 12px; font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .bp-conf-bar { height: 8px; border: 1px solid #000; border-radius: 999px; margin-top: 8px; overflow: hidden; }
  .bp-conf-bar > span { display: block; height: 100%; background: #000; }
  .bp-section { margin-top: 26px; page-break-inside: avoid; }
  .bp-section h2 {
    font-size: 14px; margin: 0 0 10px; padding-bottom: 6px;
    border-bottom: 2px solid #000; text-transform: uppercase; letter-spacing: 1px;
  }
  .bp-steps { margin: 0; padding-left: 0; list-style: none; counter-reset: step; }
  .bp-steps li {
    border: 1px solid #000; border-radius: 4px; padding: 10px 12px 10px 14px;
    margin-bottom: 8px; position: relative; page-break-inside: avoid;
  }
  .bp-step-head { font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .bp-step-do { font-weight: 700; margin: 3px 0; font-size: 13px; }
  .bp-step-detail { color: #333; }
  .bp-step-risk { margin-top: 4px; padding-top: 4px; border-top: 1px dashed #999; }
  .bp-list { margin: 0; padding-left: 18px; }
  .bp-list li { margin-bottom: 4px; }
  .bp-strategy-plan { margin: 0; padding-left: 22px; }
  .bp-strategy-plan li { margin-bottom: 10px; padding-left: 4px; page-break-inside: avoid; }
  .bp-muted { color: #555; }
  .bp-table { width: 100%; border-collapse: collapse; }
  .bp-table th, .bp-table td { border: 1px solid #000; padding: 5px 8px; text-align: left; vertical-align: top; }
  .bp-table th { background: #000; color: #fff; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
  .bp-altmeta { margin: 0 0 8px; padding: 6px 10px; background: #f0f0f0; border-left: 4px solid #000; }
  .bp-note { margin-top: 22px; padding: 12px 14px; border: 1px dashed #000; border-radius: 4px; color: #333; font-size: 11px; }
  @media print {
    .bp-toolbar { display: none; }
    .bp-page { padding: 0; max-width: none; }
    .bp-header { border-radius: 0; }
  }
</style>
</head>
<body>
  <div class="bp-page">
    <div class="bp-toolbar"><button onclick="window.print()">Save as PDF / Print</button></div>
    <div class="bp-header">
      <h1>Battle Plan</h1>
      <div class="bp-sub">${escapeHtml(trainerLabel)}${result.location ? ` &middot; ${escapeHtml(result.location)}` : ""} &middot; Generated ${escapeHtml(now.toLocaleString())}</div>
    </div>

    <div class="bp-verdict">
      <div class="bp-verdict-text">
        <h2>${winnable ? "✓ " : "△ "}${escapeHtml(verdict)}</h2>
        <p>${escapeHtml(result.risk_policy || (result.crit_safe ? "Enemy crit-aware mode is on." : "Normal mode."))}</p>
      </div>
      <div class="bp-conf">
        <div class="bp-conf-num">${confPct}%</div>
        <div class="bp-conf-word">${escapeHtml(band.word)}</div>
        <div class="bp-conf-bar"><span style="width:${confPct}%"></span></div>
      </div>
    </div>

    ${section("Line 1 — What you need to do (your current items)", stepsHtml)}

    ${section("Tactical game plan — strategies used", renderUsedStrategyPlan(result))}

    ${idealLine ? section("Line 2 — With ideal held items", altLineHtml(idealLine, "Same fight, but with the planner's recommended held items equipped.")) : ""}

    ${bestLine ? section("Line 3 — Best case (nothing goes wrong)", altLineHtml(bestLine, "If no enemy crits land and no secondary effects fire, this is how cleanly it goes.")) : ""}

    ${section("Why the confidence is " + confPct + "%", `
      <p><strong>${escapeHtml(band.word)}.</strong> ${escapeHtml(band.blurb)}</p>
      <p><strong>Honest range: ${escapeHtml(confidenceRangeText)}.</strong> The lower number includes modeled luck exposure; the upper number measures the structural plan with enemy crits and secondary-effect hax separated into the audit below.</p>
      <p>Confidence is not an exact win rate. It is a model score multiplied down for inaccurate player moves, dangerous AI alternatives, tight survival margins, and planned sacks. Enemy crits and secondary effects are reported in the lower bound and hax outlook instead of being hidden inside the headline.</p>
      <p style="margin-bottom:4px;"><strong>What dragged this line down the most:</strong></p>
      ${dropHtml}
      <p style="margin:10px 0 4px;"><strong>Specific risks flagged on this line:</strong></p>
      ${riskHtml}
    `)}

    ${(result.threat_answers || []).length ? section("Best answer to each enemy", renderThreatAnswers(result)) : ""}

    ${result.hax_outlook ? section("Flinch & crit outlook", renderHaxOutlook(result)) : ""}

    ${section("Berry budget", renderBerryBudget(result))}

    ${section("Heart scales — escape options", heartScaleHtml)}

    ${section("Strategy notes", strategyHtml)}

    ${result.prep_line ? section("Line 4 — With pre-battle prep", `
      ${result.prep_line.prep_note ? `<p class="bp-altmeta"><strong>${escapeHtml(result.prep_line.prep_note)}</strong></p>` : ""}
      ${altLineHtml(result.prep_line, "Same fight, but with the recommended pre-battle preparation applied before entering.")}`) : ""}

    ${section("Enemy team", enemyHtml)}
    ${section("Your team (as imported)", teamHtml)}
    ${itemHtml ? section("Item recommendations", itemHtml) : ""}

    ${section("Strategy toolbox — what the planner can do", renderStrategyToolbox(result))}

    <div class="bp-note">
      <strong>How to read this:</strong> Confidence is a practical warning system for how much to trust the line, under the planner's model of Run &amp; Bun mechanics and AI. It is not a Monte-Carlo win rate, not a guarantee, and not proof that no better line exists. A low number can still be the best available line — it just means more can go wrong.
    </div>
  </div>
</body>
</html>`;
      }

      function openDocInNewTab(html) {
        if (!html) return false;
        const win = window.open("", "_blank");
        if (!win) return false;
        win.document.open();
        win.document.write(html);
        win.document.close();
        return true;
      }

      function openBattlePlanPdf(result, selectedTrainer, heartScaleOverride) {
        return openDocInNewTab(buildBattlePlanDocument(result, selectedTrainer, heartScaleOverride));
      }

      function PreparationDiagnosis({ diagnosis }) {
        if (!diagnosis || diagnosis.status === "ready") return null;
        return <div className="prep-diagnosis" data-testid="preparation-diagnosis">
          <strong>Why this setup stopped—and what to change</strong>
          <p>{diagnosis.summary}</p>
          {(diagnosis.blockers || []).map((blocker, index) => <div className="prep-blocker" key={`${blocker.kind}-${index}`}>
            <b>{blocker.title}</b><span>{blocker.evidence}</span><small>Do this: {blocker.action}</small>
          </div>)}
          {(diagnosis.recommended_steps || []).length > 0 && <ol className="prep-steps">{diagnosis.recommended_steps.map((step, index) => <li key={`prep-step-${index}`}>{step}</li>)}</ol>}
          {diagnosis.ev_policy && <small>{diagnosis.ev_policy}</small>}
        </div>;
      }

      function RnbSimOutput({ result, selectedTrainer, onOpenFlowchart, simulatorForm }) {
        const [copyStatus, setCopyStatus] = useState("");
        const [gbaValidation, setGbaValidation] = useState(null);
        const [gbaValidationStatus, setGbaValidationStatus] = useState("idle");
        const [heartScales, setHeartScales] = useState("");
        const [revealedHints, setRevealedHints] = useState(1);
        useEffect(() => setRevealedHints(1), [result?.saved_run?.id, result?.trainer]);
        async function copyReport() {
          try {
            await copyTextToClipboard(buildLineFinderReport(result, selectedTrainer));
            setCopyStatus("Copied");
            setTimeout(() => setCopyStatus(""), 1800);
          } catch (error) {
            setCopyStatus("Copy failed");
            setTimeout(() => setCopyStatus(""), 2400);
          }
        }
        async function downloadPlan() {
          setCopyStatus("Building PDF…");
          // Open synchronously from the click so browsers allow the PDF tab; the
          // asynchronous server response is navigated into it once ready.
          const pdfTab = window.open("about:blank", "_blank");
          try {
            const { contingency_flowchart, ...compactResult } = result;
            if (heartScales !== "") compactResult.heart_scales = Number(heartScales);
            const response = await fetch("/api/calc/plan.pdf", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                result: compactResult,
                trainer_label: selectedTrainer?.label || result.trainer || "Battle Plan",
                game_mode: result.game_mode || "run-and-bun",
              }),
            });
            if (!response.ok) throw new Error(await response.text());
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            if (pdfTab) {
              pdfTab.location.href = url;
            } else {
              const link = document.createElement("a");
              link.href = url;
              link.target = "_blank";
              link.rel = "noopener";
              document.body.appendChild(link);
              link.click();
              link.remove();
            }
            setTimeout(() => URL.revokeObjectURL(url), 300000);
            setCopyStatus("PDF opened in a new tab");
          } catch (error) {
            if (pdfTab) pdfTab.close();
            setCopyStatus("PDF failed — try again");
          }
          setTimeout(() => setCopyStatus(""), 2600);
        }
        function openFlowchart() {
          if (onOpenFlowchart) onOpenFlowchart();
          else {
            setCopyStatus("Open Contingencies");
            setTimeout(() => setCopyStatus(""), 2600);
          }
        }
        async function validateInGba() {
          if (!result) return;
          setGbaValidationStatus("Replaying this exact line 30 times in the real game…");
          setGbaValidation(null);
          try {
            const response = await fetch("/api/simulator/validate-planner-line", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                rom: simulatorForm?.rom,
                state: simulatorForm?.state,
                result,
                repetitions: 30,
                instances: Math.min(8, Number(simulatorForm?.instances || 4)),
              }),
            });
            if (!response.ok) throw new Error(await response.text());
            const data = await response.json();
            setGbaValidation(data);
            setGbaValidationStatus(data.status === "validated" ? "Real-game replay complete" : "Planner line rejected by the real game");
          } catch (error) {
            setGbaValidationStatus(`Could not validate: ${error}`);
          }
        }
        const estScales = estimateHeartScales(selectedTrainer);
        if (result?.hint_mode && revealedHints < 5) {
          const hints = result.progressive_hints || [];
          const levels = result.level_guidance || {};
          return <section className="rnb-sim-output" aria-label="Progressive battle hints">
            <div className="rnb-panel-title">Hint Mode · {result.trainer}</div>
            <div className="rnb-panel-body">
              <div className="hint-result">
                <div><strong>{revealedHints} of 4 hints revealed</strong><div className="rnb-muted">The full team and turn-by-turn line remain hidden.</div></div>
                {levels.over_cap?.length > 0 && <div className="hint-level-warning">Level cap {levels.cap}: {levels.over_cap.join(", ")} already exceed it. They may be analyzed, but the planner will not recommend additional levels.</div>}
                {hints.slice(0, revealedHints).map((hint) => <div className="hint-step" key={`hint-${hint.level}`}><strong>Hint {hint.level}: {hint.title}</strong><span>{hint.text}</span></div>)}
                {result.result !== "win-line" && <PreparationDiagnosis diagnosis={result.failure_diagnosis} />}
                <div className="rnb-actions">
                  <button className="rnb-btn rnb-green" onClick={() => setRevealedHints((value) => Math.min(5, value + 1))}>{revealedHints < 4 ? "Reveal next hint" : "Show the full plan"}</button>
                  {revealedHints > 1 && <button className="rnb-btn" onClick={() => setRevealedHints(1)}>Reset hints</button>}
                </div>
              </div>
            </div>
          </section>;
        }
        return (
          <section className="rnb-sim-output" aria-label="Sim Calc output">
            <div className="rnb-panel-title">Sim Calc Output</div>
            <div className="rnb-panel-body">
              {selectedTrainer && (
                <>
                  <div className="rnb-trainer-title">
                    {selectedTrainer.label}
                    {selectedTrainer.is_double && <span className="doubles-badge">2v2</span>}
                  </div>
                  <div className="rnb-mon-list">
                    {(selectedTrainer.party || []).map((mon, index) => (
                      <div className="rnb-trainer-mon" key={`rnb-opp-${index}-${mon.species}`}>
                        <strong>{mon.species} Lv.{mon.level || "?"}</strong>
                        {selectedTrainer.is_double && index === 1 && <span className="doubles-lead-tag">lead pair ↑</span>}
                        <div className="rnb-muted">{mon.item ? `@ ${mon.item}` : "No item"}</div>
                        <div className="rnb-muted">{(mon.moves || []).join(" / ")}</div>
                      </div>
                    ))}
                  </div>
                </>
              )}

              {!result ? (
                <div className="rnb-turn-row">
                  <strong>No calculation yet.</strong>
                  <div className="rnb-muted">Pick a trainer, paste Showdown-style imports, then press Sim Calc for HP carry, switch costs, AI choice odds, crits, and secondary-effect planning.</div>
                </div>
              ) : (
                <>
                  <div className="rnb-turn-row">
                    <strong>{result.trainer}</strong>
                    <div className="rnb-muted">Result: {result.result} | Confidence range {confidenceRange(result)} ({confidenceBand(result.confidence).word} structural line){result.location ? ` | ${result.location}` : ""}</div>
                    <div className="rnb-muted">{confidenceBand(result.confidence).blurb}</div>
                    {(result.field_conditions || []).length > 0 && <div className="rnb-muted">Modeled field: {result.field_conditions.join(" · ")}</div>}
                    <div className="rnb-muted">{result.risk_policy || (result.crit_safe ? "Enemy crit-aware mode is on." : "Normal mode.")}</div>
                    <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                      <label className="rnb-muted" style={{ display: "flex", alignItems: "center", gap: 4 }}>
                        Heart scales:
                        <input
                          type="number"
                          min="0"
                          value={heartScales}
                          placeholder={estScales != null ? `est. ${estScales}` : "set"}
                          onChange={(e) => setHeartScales(e.target.value)}
                          style={{ width: 70, background: "#000", color: "#fff", border: "1px solid var(--border)", borderRadius: 4, padding: "4px 6px" }}
                        />
                      </label>
                      <button className="rnb-btn rnb-green" type="button" onClick={downloadPlan}>Battle plan (PDF)</button>
                      {result.contingency_flowchart && (
                        <button className="rnb-btn rnb-green" type="button" onClick={openFlowchart}>Open flowchart</button>
                      )}
                      <button className="rnb-btn rnb-green" type="button" onClick={copyReport}>Copy analysis report</button>
                      <button className="rnb-btn rnb-green" type="button" onClick={validateInGba} disabled={gbaValidationStatus.startsWith("Replaying")}>Test line in real GBA ×30</button>
                      {copyStatus && <span className="rnb-muted">{copyStatus}</span>}
                    </div>
                    {gbaValidationStatus !== "idle" && <div className="rnb-muted" style={{marginTop:8}}>{gbaValidationStatus}</div>}
                    {gbaValidation && <div className="rnb-gba-verdict" style={{marginTop:8,padding:10,border:"1px solid var(--border)",borderRadius:6}}>
                      <strong>{Math.round((gbaValidation.deathless_clear_rate || 0) * 100)}% deathless · {Math.round((gbaValidation.clear_rate || 0) * 100)}% total clears</strong>
                      <div className="rnb-muted">{gbaValidation.wins} wins · {gbaValidation.blackouts} blackouts · {gbaValidation.unfinished} unfinished · {gbaValidation.errors} rejected/diverged</div>
                      {(gbaValidation.warnings || []).length > 0 && <div className="rnb-muted">Safe replay notes: {gbaValidation.warnings.join(" · ")}</div>}
                    </div>}
                  </div>
                  <VideoPicker videos={result.videos || []} title={`${result.trainer || "Simulator"} replay`} subtitle="Generated with the complementary turn-by-turn text log" />
                  <PreparationDiagnosis diagnosis={result.failure_diagnosis} />
                  {(result.strategy_report || []).some((strategy) => strategy.used) && (
                    <div className="rnb-turn-row">
                      <strong>Tactical game plan</strong>
                      <div className="rnb-muted">The line is using these strategy patterns. The PDF includes the full playbook and the exact turns where each one matters.</div>
                      {(result.strategy_report || []).filter((strategy) => strategy.used).map((strategy) => (
                        <div className="rnb-strategy-used" key={`used-strategy-${strategy.id}`}>
                          <b>{strategy.name}{strategy.modeled === false ? " · advisory" : ""}</b>
                          <span>{strategy.description}</span>
                          {(strategy.where || []).length > 0 && <small>{strategy.where.join(" · ")}</small>}
                        </div>
                      ))}
                    </div>
                  )}
                  {(result.item_recommendations || []).length > 0 && (
                    <div className="rnb-turn-row">
                      <strong>Item plan</strong>
                      <div className="rnb-muted">The main line uses your pasted items first. The planner also prints a recommended-item line below when it has useful item changes.</div>
                      {(result.item_recommendations || []).map((rec, index) => (
                        <div className="rnb-muted" key={`rnb-item-rec-${index}`}>
                          {rec.pokemon}: {rec.current_item ? `${rec.current_item} -> ` : ""}{rec.suggested_item} | {rec.reason} Source: {rec.source}
                        </div>
                      ))}
                    </div>
                  )}
                  {result.is_doubles && (
                    <div className="rnb-turn-row">
                      <strong style={{color:"#6ab4f0"}}>⚔ Doubles battle (2v2)</strong>
                      {result.lead_positions && <div className="doubles-board-summary">
                        <span><b>Your slot 1</b>{result.lead_positions.player?.[0] || "—"}</span>
                        <span><b>Your slot 2</b>{result.lead_positions.player?.[1] || "—"}</span>
