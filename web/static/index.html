<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Emerald Battle Lab</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%232e6844'/%3E%3Ccircle cx='16' cy='16' r='7' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css" />
    <style>
      :root {
        --bg: #000;
        --panel: #080808;
        --node: #111;
        --text: #f5f5f5;
        --muted: #a8a8a8;
        --green: #fff;
        --yellow: #cfcfcf;
        --red: #fff;
        --cyan: #fff;
        --border: #343434;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      #root { height: 100vh; }
      .app { display: flex; height: 100vh; overflow: hidden; }
      .sidebar {
        width: 320px;
        flex: 0 0 320px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        padding: 18px;
        overflow-y: auto;
      }
      .main { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; }
      .topbar {
        height: 56px;
        flex: 0 0 56px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        background: #050505;
        position: relative;
        z-index: 20;
      }
      .product-mark {
        display: flex;
        flex-direction: column;
        flex: 0 0 auto;
        margin-right: 10px;
        line-height: 1.05;
      }
      .product-mark strong { font-size: 12px; letter-spacing: .04em; }
      .product-mark span { margin-top: 4px; color: #7fcfff; font-size: 9px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
      .global-progress { position: absolute; left: 0; right: 0; top: 55px; z-index: 25; pointer-events: none; }
      .global-progress-track { height: 5px; overflow: hidden; background: #202020; border-top: 1px solid #333; }
      .global-progress-fill { height: 100%; min-width: 2px; background: linear-gradient(90deg,#65bfff,#d9f2ff); transition: width .25s ease; box-shadow: 0 0 12px rgba(101,191,255,.75); }
      .global-progress-label { position: absolute; right: 14px; top: 9px; max-width: min(520px,calc(100vw - 28px)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border: 1px solid #3d5666; background: #0b1115; color: #bde4ff; padding: 5px 8px; font-size: 10px; font-weight: 800; letter-spacing: .04em; box-shadow: 0 8px 24px rgba(0,0,0,.55); }
      .task-progress-card { margin: 14px 0; border: 1px solid #344650; background: #080d10; padding: 12px; }
      .task-progress-head { display: flex; justify-content: space-between; gap: 12px; color: #bde4ff; font-size: 11px; font-weight: 800; }
      .task-progress-track { height: 10px; margin-top: 9px; background: #1b2226; overflow: hidden; }
      .task-progress-fill { height: 100%; background: repeating-linear-gradient(90deg,#65bfff 0 22px,#d9f2ff 22px 25px); transition: width .3s ease; }
      .gba-launcher {
        position: absolute; z-index: 30; right: 16px; top: 62px; width: min(440px, calc(100% - 32px));
        padding: 14px; border: 1px solid #666; background: #141414; box-shadow: 0 18px 50px rgba(0,0,0,.7);
        border-radius: 8px; color: var(--text);
      }
      .gba-launcher-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-weight: 800; }
      .gba-launcher-head button { border: 0; background: transparent; color: #aaa; cursor: pointer; }
      .gba-launcher p { color: var(--muted); font-size: 12px; line-height: 1.45; }
      .gba-launcher-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
      .gba-launcher-actions button { width: auto; }
      h1 { margin: 0 0 18px; font-size: 24px; line-height: 1.15; }
      h2 { margin: 18px 0 10px; font-size: 15px; color: var(--cyan); }
      .tabs, .canvas-tabs { display: flex; gap: 8px; }
      .tab {
        border: 1px solid var(--border);
        color: var(--text);
        background: #0b0b0b;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
      }
      .tab.active { border-color: var(--cyan); color: white; box-shadow: inset 0 -2px 0 white; }
      label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: 12px; }
      input, select, textarea {
        width: 100%;
        border: 1px solid var(--border);
        background: #050505;
        color: var(--text);
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
        font-size: 13px;
      }
      textarea {
        min-height: 260px;
        resize: vertical;
        line-height: 1.4;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      input[type="checkbox"] { width: auto; margin-right: 8px; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .button-row { display: flex; gap: 8px; margin-top: 16px; }
      button.primary, button.ghost {
        border-radius: 6px;
        padding: 10px 12px;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
      }
      button.primary { border: 1px solid white; background: white; color: #000; font-weight: 700; flex: 1; }
      button.ghost { border: 1px solid var(--border); background: transparent; color: var(--text); }
      button.danger { border: 1px solid white; background: #000; color: white; font-weight: 800; }
      button:disabled { opacity: .45; cursor: not-allowed; }
      .status {
        margin-top: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        background: #0b0b0b;
      }
      .progress { height: 8px; background: #1a1a1a; border-radius: 999px; overflow: hidden; margin-top: 10px; }
      .bar { height: 100%; width: 0; background: var(--cyan); transition: width .2s ease; }
      .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
      .stat { border: 1px solid var(--border); border-radius: 6px; padding: 8px; background: #050505; }
      .stat strong { display: block; font-size: 16px; color: white; }
      .weakness {
        border-left: 3px solid white;
        background: #050505;
        padding: 10px;
        border-radius: 6px;
        font-size: 13px;
      }
      .battle-plan {
        margin-top: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        background: #050505;
      }
      .battle-plan h2 { margin-top: 0; }
      .plan-row {
        display: grid;
        grid-template-columns: 64px 1fr;
        gap: 8px;
        padding: 7px 0;
        border-top: 1px solid var(--border);
        font-size: 13px;
      }
      .plan-row:first-of-type { border-top: 0; }
      .plan-turn { color: var(--cyan); font-weight: 800; }
      .plan-action { color: white; line-height: 1.35; }
      .plan-summary {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
      }
      .candidate {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        margin-top: 10px;
        background: #050505;
        cursor: pointer;
      }
      .candidate.best { border-color: white; box-shadow: inset 0 0 0 1px white; }
      .candidate .meter { height: 7px; background: #1a1a1a; border-radius: 999px; margin-top: 8px; overflow: hidden; }
      .candidate .meter span { display: block; height: 100%; background: var(--green); }
      .candidate-details { margin-top: 10px; display: grid; gap: 8px; color: var(--muted); font-size: 12px; }
      .candidate-team, .candidate-plan, .candidate-calcs {
        border-top: 1px solid var(--border);
        padding-top: 8px;
      }
      .candidate-plan div, .candidate-calcs div { margin-top: 5px; line-height: 1.35; }
      .candidate-tag { color: white; font-weight: 700; }
      .team-grid { display: grid; gap: 7px; margin-top: 10px; }
      .team-slot {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px;
        background: #000;
        font-size: 12px;
      }
      .team-slot.box { border-color: white; }
      .coach-line {
        border-top: 1px solid var(--border);
        padding-top: 9px;
        margin-top: 9px;
      }
      .coach-line:first-of-type { border-top: 0; margin-top: 0; padding-top: 0; }
      .coach-title { color: white; font-weight: 800; font-size: 12px; margin-bottom: 5px; }
      .coach-calc, .coach-risk { color: var(--muted); font-size: 12px; line-height: 1.4; margin-top: 4px; }
      .calc-engine-view {
        height: 100%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        background: #1b1b1b;
        overflow: hidden;
      }
      .calc-engine-toolbar {
        flex: 0 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        background: #050505;
        color: var(--muted);
        font-size: 12px;
      }
      .calc-engine-toolbar strong { color: white; }
      .calc-engine-toolbar a {
        color: white;
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 9px;
        white-space: nowrap;
      }
      .calc-engine-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: #1b1b1b;
      }
      .calc-engine-body {
        flex: 1 1 auto;
        min-height: 0;
        position: relative;
        overflow: hidden;
      }
      .calc-toolbar-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .line-finder-drawer {
        position: absolute;
        top: 12px;
        right: 12px;
        bottom: 12px;
        width: min(440px, calc(100% - 24px));
        z-index: 3;
        border: 1px solid #aaa;
        background: #202020;
        color: #e4e4e4;
        box-shadow: 0 20px 44px rgba(0,0,0,.55);
        display: flex;
        flex-direction: column;
        font: 10pt Verdana, sans-serif;
      }
      .line-finder-drawer header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 9px 10px;
        border-bottom: 1px solid #555;
        background: #232323;
        font-weight: bold;
      }
      .line-finder-drawer header button {
        border: 1px solid #777;
        background: #111;
        color: white;
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
      }
      .line-finder-body {
        padding: 10px;
        overflow: auto;
      }
      .line-finder-body label {
        color: #e4e4e4;
        margin: 7px 0 3px;
        font-size: .9em;
      }
      .line-finder-body textarea { min-height: 190px; }
      .line-finder-body .rnb-sim-output .rnb-panel-body { max-height: none; }
      .trainer-search-wrap { position: relative; }
      .trainer-search { padding-right: 54px !important; }
      .trainer-search-wrap button {
        position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
        border: 0; background: transparent; color: #aaa; padding: 4px 5px;
        font: inherit; font-size: 11px; cursor: pointer;
      }
      .trainer-search-wrap button:hover { color: #fff; }
      .trainer-search-count { color: #aaa; font-size: 11px; margin: 4px 0 6px; }
      .battle-source-toggle {
        display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
        margin-bottom: 12px; padding: 4px; border: 1px solid #505050; background: #181818;
      }
      .battle-source-toggle button {
        border: 0; padding: 8px; background: transparent; color: #aaa; cursor: pointer; font-weight: 700;
      }
      .battle-source-toggle button.active { background: #244a35; color: #fff; }
      .custom-opponent-builder { padding: 10px; border: 1px solid #4e4e4e; background: #1d1d1d; margin-bottom: 10px; }
      .custom-enemy-imports { min-height: 220px !important; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .doubles-position-builder {
        margin: 12px 0; padding: 10px; border: 1px solid #326789;
        background: linear-gradient(145deg, rgba(22,70,96,.34), rgba(20,31,37,.45));
      }
      .doubles-position-title { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
      .doubles-position-title span { color: #9fc0d3; font-size: 11px; }
      .doubles-position-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .doubles-position-grid label { margin: 0; padding: 7px; background: rgba(0,0,0,.25); }
      .line-finder-body select[aria-label="Trainer search results"] {
        min-height: 74px; max-height: 190px; padding: 2px;
      }
      .line-finder-body select[aria-label="Trainer search results"] option { padding: 5px 7px; }
      .trainer-search-empty { color: #e0b341; border: 1px solid #675522; background: #28230f; padding: 8px; margin-top: 5px; line-height: 1.4; }
      .flow-wrap { flex: 1; min-height: 0; position: relative; }
      .react-flow { background: var(--bg); }

      /* ---- Contingency flowchart nodes (ReactFlow) ---- */
      .fc-node {
        width: 300px; box-sizing: border-box; background: #0c0c0c;
        border: 1px solid #2c2c2c; border-radius: 8px; padding: 8px 10px;
        font-size: 11px; color: var(--muted); opacity: 0.62;
        transition: opacity .12s, border-color .12s, box-shadow .12s;
      }
      .fc-node .react-flow__handle { opacity: 0; }
      .fc-node .fc-head {
        font-weight: 800; font-size: 11px; letter-spacing: .4px; text-transform: uppercase;
        color: var(--text); display: flex; justify-content: space-between; align-items: center; gap: 6px;
      }
      .fc-node .fc-badge {
        font-size: 8.5px; font-weight: 800; letter-spacing: .3px; text-transform: uppercase;
        background: #fff; color: #000; border-radius: 999px; padding: 1px 6px; white-space: nowrap;
      }
      .fc-step { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 16px; color: #cfcfcf; }
      .fc-step b { color: #fff; font-weight: 700; }
      .fc-hp { color: #777; }
      .fc-pivot { background: #fff; color: #000; font-weight: 800; padding: 0 5px; border-radius: 3px; }
      .fc-foot { margin-top: 5px; font-weight: 800; font-size: 10.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .fc-foot.fc-q { color: #bdbdbd; }
      .fc-foot.fc-okk { color: #46c46a; }
      .fc-foot.fc-warn { color: #e0b341; }
      /* the most-likely path: full opacity, bright outline */
      .fc-node.fc-on { opacity: 1; border-color: #fff; background: #151515; box-shadow: 0 0 0 1px #fff, 0 4px 14px rgba(0,0,0,.5); }
      .fc-node.fc-fork { border-style: dashed; }
      .fc-node.fc-win { border-left: 3px solid #46c46a; }
      .fc-node.fc-partial { border-left: 3px solid #e0b341; }
      .fc-node.fc-merge { border-left: 3px solid #6aa9ff; border-style: dotted; opacity: 0.92; }
      .fc-foot.fc-merge-foot { color: #6aa9ff; }
      .fc-node.fc-trunc { border-left: 3px solid #b98add; border-style: dotted; opacity: 0.8; }
      .fc-foot.fc-trunc-foot { color: #b98add; }
      .fc-shell { position: absolute; inset: 0; background: #070707; }
      .fc-shell > .react-flow { left: 288px; right: 340px; width: calc(100% - 628px) !important; }
      .fc-routes {
        position: absolute; z-index: 7; inset: 0 auto 0 0; width: 288px;
        background: #0b0b0b; border-right: 1px solid #2a2a2a; padding: 16px 14px;
        overflow: auto; color: var(--muted); font-size: 12px;
      }
      .fc-routes-head { display: flex; align-items: center; justify-content: space-between; }
      .fc-routes-head h2 { color: #fff; font-size: 18px; margin: 0; }
      .fc-routes-head span { color: #777; font-variant-numeric: tabular-nums; }
      .fc-current-state { margin-top: 12px; padding: 10px; border: 1px solid #3a3a3a; background: #101010; border-radius: 6px; }
      .fc-current-state label { display: block; color: #fff; font-size: 12px; font-weight: 800; margin-bottom: 6px; }
      .fc-current-state textarea { width: 100%; min-height: 64px; resize: vertical; box-sizing: border-box; background: #080808; color: #fff; border: 1px solid #333; border-radius: 4px; padding: 8px; font: inherit; line-height: 1.4; }
      .fc-current-state > div { color: #8f8f8f; font-size: 10.5px; line-height: 1.35; margin-top: 5px; }
      .fc-current-state > button { border: 0; background: transparent; color: #bbb; padding: 5px 0 0; font-size: 10.5px; cursor: pointer; text-decoration: underline; }
      .fc-search { width: 100%; box-sizing: border-box; margin-top: 14px; padding: 9px 10px; background: #101010; color: #fff; border: 1px solid #343434; border-radius: 5px; font: inherit; }
      .fc-filter-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin: 10px 0 18px; }
      .fc-filter-row button { padding: 6px 3px; background: #111; color: #aaa; border: 1px solid #303030; border-radius: 4px; font-size: 10px; cursor: pointer; }
      .fc-filter-row button.active { background: #e8e8e8; color: #050505; border-color: #fff; font-weight: 800; }
      .fc-route-label { color: #fff; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; margin: 12px 0 7px; }
      .fc-primary-route { border: 1px solid #303030; border-radius: 5px; overflow: hidden; }
      .fc-primary-route button { position: relative; width: 100%; display: grid; grid-template-columns: 28px 1fr; gap: 8px; align-items: center; text-align: left; background: #0e0e0e; color: #ddd; border: 0; border-bottom: 1px solid #252525; padding: 8px; cursor: pointer; }
      .fc-primary-route button:last-child { border-bottom: 0; }
      .fc-primary-route button:hover { background: #162116; }
      .fc-primary-route b { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
      .fc-primary-route small { display: block; color: #777; margin-top: 2px; }
      .fc-route-turn { width: 22px; height: 22px; display: grid; place-items: center; border: 1px solid #555; border-radius: 50%; color: #fff; font-weight: 800; }
      .fc-route-list { border: 1px solid #303030; border-radius: 5px; overflow: auto; max-height: 300px; }
      .fc-route-list button { width: 100%; display: grid; grid-template-columns: 8px 1fr auto; gap: 8px; align-items: center; text-align: left; padding: 8px; background: #0e0e0e; color: #bbb; border: 0; border-bottom: 1px solid #242424; cursor: pointer; font-size: 11px; }
      .fc-route-list button:hover { background: #171717; color: #fff; }
      .fc-route-list button.selected { background: #172317; color: #fff; box-shadow: inset 3px 0 #46c46a; }
      .fc-route-list b { color: #fff; font-variant-numeric: tabular-nums; }
      .fc-route-summary { min-width: 0; }
      .fc-route-summary > span { display: block; color: #ddd; }
      .fc-route-summary small { display: block; margin-top: 3px; color: #747474; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .fc-route-dot { width: 7px; height: 7px; border-radius: 50%; background: #e0b341; }
      .fc-route-dot.win-line { background: #46c46a; } .fc-route-dot.truncated { background: #b98add; } .fc-route-dot.merge { background: #6aa9ff; }
      .fc-show-more { width: 100%; margin-top: 6px; padding: 7px; border: 1px solid #303030; border-radius: 4px; background: #111; color: #bbb; font-size: 10.5px; cursor: pointer; }
      .fc-expansion-progress { border: 1px solid #3b633b; background: #101a10; border-radius: 6px; padding: 9px; }
      .fc-toolbar-progress { flex: 1 0 100%; box-sizing: border-box; }
      .fc-expansion-progress > div:first-child { display: flex; justify-content: space-between; gap: 8px; color: #fff; }
      .fc-progress-track { display: block; width: 100%; height: 9px; overflow: hidden; border: 0; border-radius: 99px; background: #252525; margin: 7px 0; appearance: none; }
      .fc-progress-track::-webkit-progress-bar { background: #252525; border-radius: 99px; }
      .fc-progress-track::-webkit-progress-value { background: linear-gradient(90deg, #3e9348, #72dd7b); border-radius: 99px; transition: width .25s ease; }
      .fc-progress-track::-moz-progress-bar { background: linear-gradient(90deg, #3e9348, #72dd7b); border-radius: 99px; }
      .fc-expansion-progress small { color: #9a9a9a; line-height: 1.4; }
      .fc-expansion-progress button { margin-top: 8px; width: 100%; border: 1px solid #765252; background: #211313; color: #efb4b4; border-radius: 4px; padding: 6px 8px; cursor: pointer; }
      .fc-toolbar {
        position: absolute; left: 300px; top: 12px; right: 340px; z-index: 6;
        display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
        background: rgba(8,8,8,.94); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px;
      }
      .fc-title { color: var(--text); font-weight: 800; font-size: 13px; }
      .fc-summary { color: var(--muted); font-size: 11.5px; margin-top: 2px; }
      .fc-toolbar-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .fc-side {
        position: absolute; right: 12px; top: 12px; bottom: 12px; width: 316px; z-index: 6;
        background: rgba(8,8,8,.94); border: 1px solid var(--border); border-radius: 8px;
        padding: 12px; overflow: auto; color: var(--muted); font-size: 12px;
      }
      .fc-side h3 { margin: 0 0 8px; color: var(--text); font-size: 13px; }
      .fc-side-section { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 10px; }
      .fc-side-row { margin: 6px 0; line-height: 1.4; }
      .fc-side-row b { color: var(--text); }

    <script type="text/babel" data-presets="react-classic">

      const savedLocalPath = (key) => {

        catch (_error) { return ""; }
      };
      const savedLocalJson = (key, fallback) => {
        try { return JSON.parse(localStorage.getItem(`pokemon-battle-solver:${key}`)) || fallback; }
        catch (_error) { return fallback; }
      };
      const localTestingConfig = window.__LOCAL_TESTING_CONFIG__ || {};
      // A validated private server default beats a stale browser value. This keeps one
      // mistyped path from disabling autofill forever; manual edits still work for the
      // current session and machines without .env.local continue to use browser storage.
      const defaultRom = localTestingConfig.rom || savedLocalPath("rom") || "";
      const defaultState = localTestingConfig.state || savedLocalPath("state") || "";
      const defaultPcState = localTestingConfig.pc_state || savedLocalPath("pc-state") || "";
      const defaultBattleState = localTestingConfig.battle_state || savedLocalPath("battle-state") || "";

      const emeraldDefaultState = localTestingConfig.emerald_state || savedLocalPath("emerald-state") || "";
      const emeraldDefaultPcState = localTestingConfig.emerald_pc_state || savedLocalPath("emerald-pc-state") || emeraldDefaultState;
      const emeraldDefaultBattleState = localTestingConfig.emerald_battle_state || savedLocalPath("emerald-battle-state") || emeraldDefaultState;

      const initialGameMode = requestedGameMode === "run-and-bun" ? "run-and-bun" : "emerald";
      const requestedView = new URLSearchParams(location.search).get("view") || (initialGameMode === "emerald" ? "simulators" : "gauntlet");
      const requestedStrategyView = ["calc", "flowchart", "coach"].includes(requestedView) ? requestedView : "calc";
      const initialCanvasView = ["calc", "flowchart", "coach"].includes(requestedView) ? "strategy" : requestedView;

      function SolverNode({ data }) {
        const cls = `solver-node ${(data.label || "").replace(" ", "-")} ${data.isRecommended ? "recommended" : ""} ${data.highlighted ? "highlighted" : ""} ${data.dimmed ? "dimmed" : ""}`;
        const hpWidth = Math.round((data.avg_hp || 0) * 100);
        const hpColor = data.label === "DEATHLESS" || data.label === "GOOD" ? "var(--green)" : data.label === "DANGER" || data.label === "LOSS" || data.label === "AVOID" ? "var(--red)" : "var(--yellow)";
        return (
          <div className={cls}>
            <Handle type="target" position={Position.Top} />
            <div className="node-title"><span className="node-icon">{labelIcon(data.label)}</span><span>Turn {data.turn || 0} · {data.label || "ROOT"}</span></div>

            <Handle type="source" position={Position.Bottom} />

      const nodeTypes = { solver: SolverNode };

      function pct(value) {
        return `${Math.round((value || 0) * 100)}%`;

      function labelIcon(label) {
        return {
          "DEATHLESS": "✓",
          "SACK LINE": "⚔",
          "GOOD": "★",
          "RISKY": "⚠",
          "DANGER": "☠",
          "LOSS": "✗",
          "AVOID": "✗",
          "ROOT": "⬡",

      function layout(nodes, edges) {
        const graph = new dagre.graphlib.Graph();
        graph.setDefaultEdgeLabel(() => ({}));
        graph.setGraph({ rankdir: "TB", nodesep: 80, ranksep: 150, marginx: 80, marginy: 40 });

        edges.forEach((edge) => graph.setEdge(edge.source, edge.target));
        dagre.layout(graph);
        return nodes.map((node) => {
          const pos = graph.node(node.id);
          return { ...node, position: { x: pos.x - 140, y: pos.y - 59 } };
        });

        const [calcTrainers, setCalcTrainers] = useState(() => window.__TRAINER_CATALOG__ || []);
        const [calcSample, setCalcSample] = useState("");
        const [calcForm, setCalcForm] = useState({

        async function loadCalcTrainers(mode = gameMode) {
          let lastError = null;
          for (let attempt = 0; attempt < 5; attempt += 1) {
            try {
              const apiMode = mode === "emerald" ? "pokemon-emerald" : "run-and-bun";
              const response = await fetch(`/api/calc/trainers?game_mode=${encodeURIComponent(apiMode)}`, { cache: "no-store" });
              if (!response.ok) throw new Error(`Trainer database returned ${response.status}`);
              const data = await response.json();
              if (!(data.trainers || []).length) throw new Error("Trainer database returned no trainers");
            setCalcTrainers(data.trainers || []);
            setCalcSample(data.sample_import || "");
            const defaultTrainer = mode === "emerald"
              ? ((data.trainers || []).find((trainer) => trainer.recommended_test) || data.trainers?.[0])
              : data.trainers?.[0];
            setCalcForm((current) => ({
              ...current,
              trainer_id: defaultTrainer?.id || 0,
              imports: mode === "emerald"
                ? (defaultTrainer?.checkpoint_roster_import || defaultTrainer?.checkpoint_team_import || current.imports || "")
                : (data.sample_import || current.imports || ""),
            }));
            setGauntletForm((current) => {
              if (current.trainer_ids.length) return current;
              const trainers = data.trainers || [];
              if (mode === "emerald") {
                const leagueNames = ["Elite Four Sidney", "Elite Four Phoebe", "Elite Four Glacia", "Elite Four Drake", "Champion Wallace"];
                const league = leagueNames.map((name) => trainers.find((trainer) => trainer.trainer_name === name)).filter(Boolean);
                if (league.length === 5) return { ...current, trainer_ids:league.map((trainer) => trainer.id), start_trainer_id:league[0].id, end_trainer_id:league[4].id, next_count:4, route_mode:"until", back_to_back:false, healing_mode:"bag", ruleset:"hardcore-nuzlocke", items_in_battle:false, allow_revives:false, hint_mode:false };
              }
              const corgiIndex = mode === "run-and-bun" ? trainers.findIndex((trainer) => /breeder\s+corgi/i.test(trainer.trainer_name || trainer.label || "")) : -1;
              const requiredIndex = trainers.findIndex((trainer) => trainer.required);
              const start = corgiIndex >= 0 ? corgiIndex : (requiredIndex >= 0 ? requiredIndex : 0);
              const route = trainers.slice(start, start + 5);
              return {
                ...current,
                start_trainer_id: route[0]?.id ?? null,
                end_trainer_id: route[route.length - 1]?.id ?? null,
                next_count: 4,
                trainer_ids: route.map((trainer) => trainer.id),
              };
            });
              return;
            } catch (error) {
              lastError = error;
              if (attempt < 4) await new Promise((resolve)=>setTimeout(resolve, 400 * (attempt + 1)));
            }
          }
          setCalcStatus(`Trainer database did not load. Retrying when a trainer menu opens. ${lastError || ""}`);
        }

        function handleMessage(msg) {
          if (msg.type === "started") {
            resetGraph();
            setStatus("running");
            setMessage(msg.message);
          }
          if (msg.type === "status") {
            setStatus(msg.data.phase || "idle");
            setMessage(msg.data.message || "");
          }
          if (msg.type === "battle_state") {
            setBattle(msg.data);
            addRoot(msg.data);
          }
          if (msg.type === "flowchart") replaceGraph(msg.data || []);
          if (msg.type === "progress") {
            setProgress(msg.data);
            if (msg.data.message) setMessage(msg.data.message);
          }
          if (msg.type === "proof_progress") setProofProgress(msg.data || {});
          if (msg.type === "node") addNode(msg.data);
          if (msg.type === "simulators") {
            setSimulatorEvents((items) => [...(msg.data || []), ...items].slice(0, 250));
          }
          if (msg.type === "validation") {
            setValidatedLines((items) => [msg.data, ...items.filter((item) => item.line?.join("|") !== msg.data?.line?.join("|"))]);
          }
          if (msg.type === "video_recording") setMessage(msg.message || "Recording recommended line…");
          if (msg.type === "sim_run_log") {
            setSimRunLogs((items) => [msg.data, ...items.filter((item) => item.id !== msg.data?.id)].slice(0, 100));
            if (msg.data?.proof_complete && msg.data?.output_state) {
              setForm((current) => ({ ...current, result_state: msg.data.output_state }));
              setMessage("Cartridge proof complete. Test again still uses the original battle save; continue from the victory checkpoint only when you choose to.");
            }
          }
          if (msg.type === "weakness_report") setWeakness(msg.data);
          if (msg.type === "box_candidate") {
            setCandidates((items) => [...items.filter((x) => x.name !== msg.data.name), msg.data].sort((a, b) => b.improvement - a.improvement));
          }
          if (msg.type === "complete") {
            setComplete(msg.data);
            if (msg.data.validated_lines) setValidatedLines(msg.data.validated_lines);
            setStatus("complete");
            setMessage("Solve complete");
            if (canvasTabRef.current !== "simulators") setCanvasTab("plan");
            highlightRecommended();
          }
          if (msg.type === "proof_rejected") {
            setComplete(msg.data);
            if (msg.data.validated_lines) setValidatedLines(msg.data.validated_lines);
            setStatus("proof-rejected");
            setMessage("Planner finished, but the required real-game replay did not pass. No line was marked complete.");
          }
          if (msg.type === "prepare_complete") {
            setStatus("complete");
            setMessage(msg.data.best_swap_name ? `Best swap: ${msg.data.best_swap_name}` : "Prepare complete");
            setComplete((current) => ({ ...(current || {}), team_plan: msg.data.team_plan || null }));
            setCanvasTab("candidates");
          }
          if (msg.type === "killed") {
            setStatus("killed");
            setMessage(msg.message || "Simulations killed");
          }
          if (msg.type === "error") {
            setStatus("error");
            setMessage(msg.message);
          }
        }

        function resetGraph() {
          setNodes([]);
          setEdges([]);
          setCandidates([]);
          setWeakness(null);
          setComplete(null);
          setSelected(null);
          setSimulatorEvents([]);
          setValidatedLines([]);
          setProgress({ iterations_done: 0, iterations_total: 1, trials_run: 0, nodes_explored: 0, best_win_rate: 0, has_deathless: false });
          setProofProgress({ running: true, phase: "Starting cartridge proof", pct: 0, completed_replays: 0, total_replays: Number(form.final_line_trials) * Number(form.final_line_candidates), video_ready: false, verified: false });
          setTimeout(() => flow?.fitView({ padding: 0.2, duration: 250 }), 0);
        }

        async function restoreLastResult() {
          try {
            const response = await fetch("/api/result");
            if (!response.ok) return;
            const result = await response.json();
            if (!result) return;
            if (Array.isArray(result.candidates)) {
              setCandidates(result.candidates);
              setWeakness(result.weakness_report || null);
              setComplete({ team_plan: result.team_plan || null });
              return;
            }
            if (Array.isArray(result.battle_plan)) {
              setValidatedLines(result.validated_lines || []);
              setComplete({
                has_deathless_line: result.has_deathless_line,
                recommended_line: result.recommended_line || [],
                battle_plan: result.battle_plan || [],
                win_probability: result.win_probability || 0,
                faint_probability: result.faint_probability || 0,
                total_trials: result.total_trials_run || 0,
                search_time: result.search_time_seconds || 0,
              });
            }
          } catch (_error) {
            // There may not be a previous result yet.
          }
        }

        function addRoot(data) {
          const root = {
            id: "root",
            type: "solver",
            position: { x: 80, y: 40 },
            data: {
              turn: 0,
              action: "BATTLE START",
              win_rate: 0,
              faint_rate: 0,
              visit_count: data.legal_actions,
              label: "ROOT",
              branch_condition: `${data.is_doubles ? "Doubles" : "Singles"} · ${data.legal_actions} actions`,
            },
          };
          setNodes(layout([root], []));
          setTimeout(() => flow?.fitView({ padding: 0.25, duration: 250 }), 0);
        }

        function addNode(data) {
          const id = data.id || `${data.parent_id}-${data.turn}-${data.action}`;
          const nextEdge = data.parent_id ? {
            id: `${data.parent_id}-${id}`,
            source: data.parent_id,
            target: id,
            animated: data.is_recommended,
            style: { stroke: data.is_recommended ? "#fff" : "#343434", strokeWidth: data.is_recommended ? 3 : 1 },
            label: data.branch_condition || "",
            labelStyle: { fill: "#97a3ba", fontSize: 11 },
            labelBgStyle: { fill: "#000", fillOpacity: 0.85 },
          } : null;
          setEdges((currentEdges) => {
            const updatedEdges = nextEdge && !currentEdges.some((edge) => edge.id === nextEdge.id)
              ? [...currentEdges, nextEdge]
              : currentEdges;
            setNodes((currentNodes) => {
              const nextNodes = currentNodes.filter((node) => node.id !== id);
              nextNodes.push({
                id,
                type: "solver",
                position: { x: 0, y: 0 },
                data: {
                  ...data,
                  isRecommended: data.is_recommended,
                  dimmed: false,
                  highlighted: false,
                },
              });
              return layout(nextNodes, updatedEdges);
            });
            setTimeout(() => flow?.fitView({ padding: 0.2, duration: 250 }), 0);
            return updatedEdges;
          });
        }

        function replaceGraph(items) {
          const nextEdges = items
            .filter((item) => item.parent_id)
            .map((item) => ({
              id: `${item.parent_id}-${item.id}`,
              source: item.parent_id,
              target: item.id,
              animated: item.is_recommended,
              style: { stroke: item.is_recommended ? "#fff" : "#343434", strokeWidth: item.is_recommended ? 3 : 1 },
              label: item.branch_condition || "",
              labelStyle: { fill: "#97a3ba", fontSize: 11 },
              labelBgStyle: { fill: "#000", fillOpacity: 0.85 },
            }));
          const nextNodes = items.map((item) => ({
            id: item.id,
            type: "solver",
            position: { x: 0, y: 0 },
            data: {
              ...item,
              isRecommended: item.is_recommended,
              dimmed: item.id !== "root" && !item.is_recommended,
              highlighted: false,
            },
          }));
          setSelected(null);
          setEdges(nextEdges);
          setNodes(layout(nextNodes, nextEdges));
          setTimeout(() => flow?.fitView({ padding: 0.2, duration: 300 }), 0);
        }

        function pathForNode(nodeId, edgeList) {
          const path = new Set([nodeId]);
          let cursor = nodeId;
          while (cursor && cursor !== "root") {
            const incoming = edgeList.find((edge) => edge.target === cursor);
            if (!incoming) break;
            path.add(incoming.source);
            cursor = incoming.source;
          }
          return path;
        }

        function selectNodePath(node) {
          setSelected(node.data);
          const path = pathForNode(node.id, edges);
          setNodes((current) => current.map((item) => ({
            ...item,
            data: {
              ...item.data,
              highlighted: path.has(item.id),
              dimmed: !path.has(item.id),
            },
          })));
          setEdges((current) => current.map((edge) => {
            const inPath = path.has(edge.source) && path.has(edge.target);
            return {
              ...edge,
              animated: inPath,
              style: { stroke: inPath ? "#fff" : "#343434", strokeWidth: inPath ? 3 : 1, opacity: inPath ? 1 : 0.35 },
            };
          }));
        }

        function fitTree() {
          flow?.fitView({ padding: 0.2, duration: 300 });
        }

        function relayoutAndFit() {
          setNodes((current) => layout(current, edges));
          setTimeout(fitTree, 0);
        }

        function highlightRecommended() {
          setNodes((current) => layout(current.map((node) => ({
            ...node,
            data: { ...node.data, dimmed: node.id !== "root" && !node.data.isRecommended, highlighted: false },
          })), edges));
          setTimeout(fitTree, 0);
        }

              rom: form.rom,
              state: stateOverride || form.state,
              instances: Number(form.instances),
              turns: Number(form.turns),
              iterations: Number(form.iterations),
              trials_per_node: Number(form.trials_per_node),
              final_line_trials: Number(form.final_line_trials),
              final_line_candidates: Number(form.final_line_candidates),
              nuzlocke: form.nuzlocke,
              game_mode: gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun",
            }),
          });
          if (!response.ok) setMessage(await response.text());
        }
