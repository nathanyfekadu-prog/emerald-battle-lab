        async function ensureSimulatorCheckpoint(sourcePath, updateField = "state") {
          if (!sourcePath || !/\.sav$/i.test(sourcePath)) return sourcePath;
          setSimulatorInspectStatus("Opening the battery save and creating a battle checkpoint…");
          const response = await fetch("/api/simulator/checkpoint", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              rom: form.rom,
              source_state: sourcePath,
              settle_frames: 120,
              game_mode: gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun",
            }),
          });
          if (!response.ok) throw new Error(await response.text());
          const data = await response.json();
          setForm((current) => ({ ...current, [updateField]: data.state, result_state: "" }));
          setSimulatorInspectStatus(`${data.player_name ? `Player ${data.player_name}. ` : ""}${data.note} Saved to ${data.state}`);
          return data.state;
        }

        async function inspectSimulatorState(stateOverride = null) {
          setSimulatorInspectStatus("reading save state");
          try {
            const sourcePath = typeof stateOverride === "string" ? stateOverride : form.state;
            const statePath = await ensureSimulatorCheckpoint(sourcePath, "state");
            const response = await fetch("/api/simulator/inspect", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ rom: form.rom, state: statePath, game_mode: gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun" }),
            });
            if (!response.ok) throw new Error(await response.text());
            const data = await response.json();
            setSimulatorSnapshot(data);
            setSimulatorInspectStatus(data.recognized ? "battle recognized" : "trainer not recognized");
            return statePath;
          } catch (error) {
            setSimulatorInspectStatus(`Could not read battle: ${error}`);
            return null;
          }
        }

        async function createSimulatorCheckpoint(fromRomSave = false) {
          setSimulatorInspectStatus(fromRomSave ? "loading the ROM's battery save" : "creating a fresh checkpoint");
          try {
            const response = await fetch("/api/simulator/checkpoint", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                rom: form.rom,
                source_state: fromRomSave ? "" : form.state,
                settle_frames: 120,
                game_mode: gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun",
              }),
            });
            if (!response.ok) throw new Error(await response.text());
            const data = await response.json();
            setForm((current) => ({ ...current, state: data.state, result_state: "" }));
            setSimulatorInspectStatus(`${data.player_name ? `Player ${data.player_name}. ` : ""}${data.note} Saved to ${data.state}`);
            if (data.battle_ready) await inspectSimulatorState(data.state);
          } catch (error) {
            setSimulatorInspectStatus(`Could not create checkpoint: ${error.message}`);
          }
        }

        async function runSimulator() {
          const checkpoint = await inspectSimulatorState();
          if (checkpoint) await submitSolve(checkpoint);
        }

        async function killJob() {
          setMessage("Killing simulations...");
          const response = await fetch("/api/kill", { method: "POST" });
          if (!response.ok) setMessage(await response.text());
        }

        async function openGba() {
          setMessage("Opening GBA...");
          const response = await fetch("/api/open-gba", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ rom: form.rom }),
          });
          if (response.ok) {
            setMessage("Opened GBA in mGBA");
            setShowGbaLauncher(false);
          } else {
            setMessage(await response.text());
          }
        }

        async function runCalcSim() {
          setCalcStatus("running");
          setCalcResult(null);
          setFlowchartProgress(null);
          setCalcProgress({ pct: 0, phase: "starting" });
          let lastPct = 0;
          const poll = setInterval(async () => {
            try {
              const r = await fetch("/api/calc/progress");
              if (!r.ok) return;
              const p = await r.json();
              lastPct = Math.max(lastPct, p.pct || 0); // monotonic
              setCalcProgress({ ...p, pct: lastPct });
            } catch (e) { /* server busy; keep last */ }
          }, 400);
          const response = await fetch("/api/calc/sim", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              trainer_id: Number(calcForm.trainer_id),
              game_mode: gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun",
              imports: calcForm.imports,
              max_turns: Number(calcForm.max_turns || 30),
              crit_safe: Boolean(calcForm.crit_safe),
              weather: calcForm.weather || null,
              reflect: Boolean(calcForm.reflect),
              light_screen: Boolean(calcForm.light_screen),
              custom_trainer_name: calcForm.custom_trainer_name || "Custom Doubles",
              custom_enemy_imports: calcForm.custom_mode ? (calcForm.custom_enemy_imports || "") : "",
              custom_is_double: calcForm.custom_mode ? Boolean(calcForm.custom_is_double) : true,
              player_leads: (calcForm.player_leads || []).length >= 2 && (calcForm.player_leads || []).every(Number.isInteger) ? calcForm.player_leads : [],
              enemy_leads: calcForm.enemy_leads || [],
              hint_mode: Boolean(calcForm.hint_mode),
              level_cap: gameMode === "emerald" ? Number(calcForm.level_cap || 15) : null,
              ruleset: calcForm.ruleset || "hardcore-nuzlocke",
              items_in_battle: Boolean(calcForm.items_in_battle),
            }),
          });
          clearInterval(poll);
          setCalcProgress(null);
          if (!response.ok) {
            setCalcStatus(await response.text());
            return;
          }
          const data = await response.json();
          setCalcResult(data);
          setCalcStatus(data.result || "complete");
          loadSavedCalcRuns();
        }

        async function submitGauntlet(routeIds, backToBack, stateOverride = "") {
          if ((routeIds || []).length < 2) {
            setGauntletStatus("Add at least two trainers to the route.");
            return;
          }
          setShowGauntletSetup(false);
          setGauntletResult(null);
          setGauntletStatus("solving the full route");
          setGauntletProgress({ running: true, pct: 0, current: 1, total: routeIds.length, trainer: "Starting route", phase: "preparing" });
          let lastPct = 0;
          const poll = setInterval(async () => {
            try {
              const response = await fetch("/api/calc/gauntlet/progress");
              if (!response.ok) return;
              const next = await response.json();
              lastPct = Math.max(lastPct, Number(next.pct || 0));
              setGauntletProgress({ ...next, pct: lastPct });
            } catch (_error) { /* retain the last trustworthy progress update */ }
          }, 350);
          try {
            const sourceState = stateOverride || form.pc_state || form.state;
            const canUseLocalState = Boolean(form.rom && sourceState);
            const rosterState = canUseLocalState
              ? await ensureSimulatorCheckpoint(sourceState, form.pc_state === sourceState ? "pc_state" : "state")
              : "";
            const firstTrainer = calcTrainers.find((trainer) => Number(trainer.id) === Number(routeIds[0]));
            const embeddedRoster = firstTrainer?.checkpoint_roster_import || firstTrainer?.checkpoint_team_import || "";
            const response = await fetch("/api/calc/gauntlet", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                trainer_ids: routeIds,
                game_mode: gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun",
                imports: embeddedRoster || calcForm.imports,
                max_turns: Number(calcForm.max_turns || 30),
                crit_safe: Boolean(calcForm.crit_safe),
                heal_between: !backToBack,
                healing_mode: gauntletForm.healing_mode || (backToBack ? "none" : "bag"),
                optimize_between_fights: (gauntletForm.healing_mode || "bag") === "pokemon-center",
                rom: form.rom,
                pc_state: rosterState,
                use_live_pc_box: canUseLocalState,
                ruleset: gauntletForm.ruleset || "hardcore-nuzlocke",
                items_in_battle: Boolean(gauntletForm.items_in_battle),
                allow_revives: Boolean(gauntletForm.allow_revives),
                hint_mode: Boolean(gauntletForm.hint_mode),
                leveling_policy: gauntletForm.leveling_policy || "party-max",
                max_total_faints: Number(gauntletForm.max_total_faints ?? 3),
                weather: calcForm.weather || null,
                reflect: Boolean(calcForm.reflect),
                light_screen: Boolean(calcForm.light_screen),
              }),
            });
            if (!response.ok) throw new Error(await response.text());
            const data = await response.json();
            setGauntletResult(data);
            const plannerComplete = data.result === "route-complete";
            setGauntletStatus(data.proof_complete ? "cartridge verified" : (plannerComplete ? "planner route complete; video and text evidence saved" : (data.proof_error || data.stopped_reason || "route stopped")));
            setGauntletProgress((current) => ({
              ...(current || {}), running: false,
              pct: 100,
              phase: data.proof_complete ? "cartridge proof complete" : (plannerComplete ? "planner route complete" : "route stopped"),
              stage: data.proof_complete ? "verified" : (plannerComplete ? "planner-complete" : "stopped"),
              completed_replays: Number(data.emulator_validation?.fixed_replays || 0),
              total_replays: Number(data.emulator_validation?.fixed_replays || 2),
              video_ready: Boolean(data.proof_complete && (data.videos || []).some((video) => video.video_ready)),
            }));
            loadSavedGauntletRuns();
          } catch (error) {
            let detail = error.message || String(error);
            try { detail = JSON.parse(detail).detail || detail; } catch (_parseError) {}
            setGauntletStatus(`Could not start this route: ${detail}`);
            setGauntletProgress((current) => ({ ...(current || {}), running: false, pct: 0, stage: "setup-error", phase: "Check the save and party, then try again" }));
          } finally {
            clearInterval(poll);
          }
        }

        async function runGauntlet() {
          return submitGauntlet(gauntletForm.trainer_ids || [], Boolean(gauntletForm.back_to_back));
        }

        async function runProvenRoute(playbook) {
          const trainer_ids = playbook?.trainer_ids || [];
          if (trainer_ids.length < 2) {
            setGauntletStatus("That executable route has no trainer order.");
            return;
          }
          setGauntletForm({
            trainer_ids, back_to_back: false, route_mode: "until",
            start_trainer_id: trainer_ids[0], next_count: trainer_ids.length - 1,
            end_trainer_id: trainer_ids[trainer_ids.length - 1],
          });
          return submitGauntlet(trainer_ids, false, playbook.starting_state || "");
        }

        async function exploreEveryBranch() {
          setCalcStatus("expanding every branch");
          const chartLineSearch = (calcResult?.contingency_flowchart_note || "").includes("recommended-items")
            ? (calcResult?.optimized_item_line?.line_search || calcResult?.line_search || {})
            : (calcResult?.line_search || {});
          setFlowchartProgress({ running: true, pct: 1, phase: "starting", expanded: 0, queued: 0, elapsed_s: 0 });
          let progressPoll = setInterval(async () => {
            try {
              const response = await fetch("/api/calc/flowchart/progress");
              if (response.ok) setFlowchartProgress(await response.json());
            } catch (_error) { /* keep the last known progress */ }
          }, 350);
          try {
            const response = await fetch("/api/calc/flowchart/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                trainer_id: Number(calcForm.trainer_id), imports: calcForm.imports,
                game_mode: gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun",
                max_turns: Number(calcForm.max_turns || 30), crit_safe: Boolean(calcForm.crit_safe),
                weather: calcForm.weather || null, reflect: Boolean(calcForm.reflect),
                light_screen: Boolean(calcForm.light_screen),
                custom_trainer_name: calcForm.custom_trainer_name || "Custom Doubles",
                custom_enemy_imports: calcForm.custom_mode ? (calcForm.custom_enemy_imports || "") : "",
                custom_is_double: calcForm.custom_mode ? Boolean(calcForm.custom_is_double) : true,
                player_leads: (calcForm.player_leads || []).length >= 2 && (calcForm.player_leads || []).every(Number.isInteger) ? calcForm.player_leads : [], enemy_leads: calcForm.enemy_leads || [],
                selected_team_names: (calcResult?.team || []).map((member) => member.name || member.species).filter(Boolean),
                line_search_lead: chartLineSearch.lead ?? null,
                player_move_overrides: chartLineSearch.move_overrides || {},
              }),
            });
            if (!response.ok) throw new Error(await response.text());
            const update = await response.json();
            setCalcResult((current) => ({ ...current, ...update }));
            const cancelled = Boolean(update.contingency_flowchart?._meta?.cancelled);
            setCalcStatus(cancelled ? "flowchart expansion stopped" : "complete");
            setFlowchartProgress((current) => ({
              ...(current || {}), running: false, complete: !cancelled,
              pct: cancelled ? (current?.pct || 0) : 100,
              phase: cancelled ? "cancelled" : "complete", queued: 0, eta_s: 0,
            }));
          } catch (error) {
            setCalcStatus(`Flowchart expansion failed: ${error}`);
            setFlowchartProgress((current) => ({ ...(current || {}), running: false, phase: "failed" }));
          } finally {
            clearInterval(progressPoll);
          }
        }

        async function stopExploringBranches() {
          setFlowchartProgress((current) => ({ ...(current || {}), phase: "stopping" }));
          try {
            await fetch("/api/calc/flowchart/cancel", { method: "POST" });
          } catch (_error) { /* the running request will still preserve any completed work */ }
        }

        // ---- Interactive co-pilot ----
        async function coachFetch(state) {
          setCoachStatus("running");
          try {
            const response = await fetch("/api/coach/step", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                trainer_id: Number(calcForm.trainer_id),
                game_mode: gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun",
                imports: calcForm.imports,
                crit_safe: Boolean(calcForm.crit_safe),
                ...state,
              }),
            });
            if (!response.ok) { setCoachStatus(await response.text()); return null; }
            const data = await response.json();
            setCoachData(data);
            setCoachStatus("ok");
            return data;
          } catch (e) { setCoachStatus(String(e)); return null; }
        }

        async function coachStart() {
          setCoachLog([]);
          setCoachTurn(1);
          const data = await coachFetch({ player_active: null, enemy_active: 0 });
          if (!data) return;
          setCoachState({
            player_active: data.player_active, player_hp: data.player_max_hp, player_status: "",
            enemy_active: data.enemy_active, enemy_hp: data.enemy_max_hp, enemy_status: "",
            player_consumed_items: data.player_consumed_items || data.team.map(() => false),
            enemy_consumed_items: data.enemy_consumed_items || data.enemies.map(() => false),
          });
        }

        // Apply an edit to the live situation and re-ask for advice.
        function coachEdit(patch) {
          const next = { ...coachState, ...patch };
          // Changing a mon resets its HP to that mon's max (a fresh switch-in / new foe).
          if (patch.player_active !== undefined && coachData) next.player_hp = coachData.team[patch.player_active].max_hp;
          if (patch.enemy_active !== undefined && coachData) next.enemy_hp = coachData.enemies[patch.enemy_active].max_hp;
          setCoachState(next);
          coachFetch(next);
        }

        // Commit the turn: log it, advance to the projected next state for the chosen enemy move.
        function coachNext(prediction) {
          if (!coachData || !prediction) return;
          const proj = prediction.projection;
          const rec = coachData.recommendation;
          setCoachLog((log) => [...log, {
            turn: coachTurn,
            you: coachData.team[coachData.player_active].name,
            foe: coachData.enemies[coachData.enemy_active].name,
            action: rec.label,
            enemyMove: prediction.move,
          }]);
          setCoachTurn((t) => t + 1);
          if (proj.battle_won) { setCoachState(null); setCoachData({ ...coachData, won: true }); return; }
          const next = {
            player_active: proj.your_next_slot,
            player_hp: proj.player_fainted ? coachData.team[proj.your_next_slot].max_hp : proj.player_hp,
            player_status: proj.player_fainted ? "" : coachState.player_status,
            enemy_active: proj.enemy_next_slot,
            enemy_hp: proj.enemy_fainted ? coachData.enemies[proj.enemy_next_slot].max_hp : proj.enemy_hp,
            enemy_status: proj.enemy_fainted ? "" : coachState.enemy_status,
            player_consumed_items: proj.player_consumed_items || coachState.player_consumed_items || [],
            enemy_consumed_items: proj.enemy_consumed_items || coachState.enemy_consumed_items || [],
          };
          setCoachState(next);
          coachFetch(next);
        }

        const progressPct = Math.min(100, Math.round((progress.iterations_done / Math.max(1, progress.iterations_total)) * 100));
        const activeTaskProgress = gauntletProgress?.running ? {
          pct: gauntletProgress.pct || 0,
          label: `Gauntlet ${gauntletProgress.current || 1}/${gauntletProgress.total || gauntletForm.trainer_ids.length}: ${gauntletProgress.trainer || "starting"} · ${gauntletProgress.phase || "working"}`,
        } : flowchartProgress?.running ? {
          pct: flowchartProgress.pct || 0,
          label: `Exploring every flowchart branch · ${flowchartProgress.phase || "expanding"} · ${flowchartProgress.expanded || 0} states`,
        } : calcProgress ? {
          pct: calcProgress.pct || 0,
          label: `Line finder · ${calcProgress.phase || "calculating"}`,
        } : (["running", "solve", "recording", "prepare"].includes(status)) ? {
          pct: Number(proofProgress?.pct || progressPct),
          label: `Simulator · ${proofProgress?.phase || message || progress.message || "testing plans"}`,
        } : null;

        return (
          <div className={`app mode-${gameMode}`}>
            <main className="main">
              <div className="topbar">
                <div className="product-mark"><strong>{gameMode === "emerald" ? "Emerald Battle Atlas" : "Pokémon Battle Solver"}</strong><span>{gameMode === "emerald" ? "173 captured fights · no ROM required" : "Cartridge-verified Run & Bun"}</span></div>
                <div className="canvas-tabs">
                    <button className={`tab ${canvasTab === "simulators" ? "active" : ""}`} onClick={() => setCanvasTab("simulators")}>Simulator</button>
                    {gameMode === "emerald" && <button className={`tab ${canvasTab === "emerald" ? "active" : ""}`} onClick={() => setCanvasTab("emerald")}>Trainer map</button>}
                    {gameMode === "run-and-bun" && <button className={`tab ${canvasTab === "demo" ? "active" : ""}`} onClick={() => setCanvasTab("demo")}>Judge Demo</button>}
                    <button className={`tab ${canvasTab === "gauntlet" ? "active" : ""}`} onClick={() => { setCanvasTab("gauntlet"); setShowGauntletSetup(true); }}>Gauntlet</button>
                    <details className="more-tools">
                      <summary>More</summary>
                      <div>
                        <button onClick={() => { setCanvasTab("strategy"); setStrategyTab("calc"); }}>Battle planner</button>
                        <button onClick={() => { setCanvasTab("strategy"); setStrategyTab("flowchart"); }}>Contingency map</button>
                        <button onClick={() => { setCanvasTab("strategy"); setStrategyTab("coach"); }}>Turn coach</button>
                        {gameMode !== "emerald" && <button onClick={() => setCanvasTab("changelog")}>Changelog</button>}
                      </div>
                    </details>
                </div>
                <div className="toolbar">
                  <div className="game-mode-switch" role="group" aria-label="Game mode">
                    <button className={gameMode === "emerald" ? "active" : ""} onClick={() => { setGameMode("emerald"); setCanvasTab("simulators"); setShowGauntletSetup(false); }}>Pokémon Emerald</button>
                    <button className={gameMode === "run-and-bun" ? "active" : ""} onClick={() => { setGameMode("run-and-bun"); setCanvasTab("gauntlet"); }}>Run & Bun</button>
                  </div>
                  <button className="ghost" onClick={() => setShowGbaLauncher((shown) => !shown)}>Open GBA</button>
                  <div className={`connection ${connected ? "ok" : "bad"}`}>{connected ? "Solver connected" : "Connecting to solver…"}</div>
                </div>
                {activeTaskProgress && <div className="global-progress" role="progressbar" aria-label={activeTaskProgress.label} aria-valuemin="0" aria-valuemax="100" aria-valuenow={Math.round(activeTaskProgress.pct)}>
                  <div className="global-progress-track"><div className="global-progress-fill" style={{ width: `${Math.max(1, activeTaskProgress.pct)}%` }} /></div>
                  <div className="global-progress-label">{Math.round(activeTaskProgress.pct)}% · {activeTaskProgress.label}</div>
                </div>}
              </div>
              {showGbaLauncher && (
                <div className="gba-launcher" role="dialog" aria-label="Open ROM in GBA">
                  <div className="gba-launcher-head"><span>Open ROM in mGBA</span><button onClick={() => setShowGbaLauncher(false)}>Close</button></div>
                  <p>Choose the local {gameMode === "emerald" ? "Pokémon Emerald" : "Run & Bun"} ROM you want to test. This launches it in mGBA without starting a solver run.</p>
                  <label>ROM path</label>
                  <input value={form.rom} onChange={(event) => setForm({ ...form, rom: event.target.value })} placeholder={gameMode === "emerald" ? "/path/to/Pokemon Emerald.gba" : "/path/to/RunAndBun.gba"} />
                  <div className="gba-launcher-actions">
                    <button className="primary" onClick={openGba}>Open in mGBA</button>
                    <span className="node-meta">{message || "The file must exist on this Mac."}</span>
                  </div>
                </div>
              )}
              {showGauntletSetup && (
                <GauntletSetupModal
                  gameMode={gameMode}
                  trainers={calcTrainers}
                  form={gauntletForm}
                  setForm={setGauntletForm}
                  onClose={() => setShowGauntletSetup(false)}
                  onRun={runGauntlet}
                  running={gauntletStatus === "solving the full route"}
                  teamImports={calcForm.imports}
                  setTeamImports={(imports) => setCalcForm((current) => ({ ...current, imports }))}
                  localForm={form}
                />
              )}
              <div className="flow-wrap">
                {gameMode === "emerald" && canvasTab === "emerald" ? (
                  <EmeraldView data={window.__EMERALD_DATA__ || { trainers:[], locations:[], stats:{} }} onPlanTrainer={(trainerId) => {
                    const emerald = window.__EMERALD_DATA__ || {};
                    const trainer = (emerald.trainers || []).find((item) => Number(item.id) === Number(trainerId));
                    const capture = (emerald.checkpoint_library?.entries || []).find((item) => Number(item.trainer_id) === Number(trainerId));
                    const ace = Math.max(1, ...(trainer?.party || []).map((mon) => Number(mon.level || 1)));
                    const nextCap = (emerald.level_caps || []).find((cap) => Number(cap.ace_level) >= ace)?.ace_level || 100;
                    setCalcForm((current) => ({ ...current, trainer_id: Number(trainerId), custom_mode: false, level_cap: Number(nextCap), imports: capture?.roster_import || capture?.team_import || current.imports }));
                    setCanvasTab("strategy"); setStrategyTab("calc");
                  }} />
                ) : canvasTab === "tree" ? (
                  <ReactFlow nodes={nodes} edges={edges} onNodesChange={onNodesChange} onEdgesChange={onEdgesChange} nodeTypes={nodeTypes} fitView minZoom={0.1} maxZoom={1.8} onInit={setFlow} onNodeClick={(_, node) => selectNodePath(node)}>
                    <Background color="#222" />
                    <Controls />
                    <MiniMap nodeColor={(node) => node.data?.isRecommended ? "#fff" : "#111"} />
                  </ReactFlow>
                ) : canvasTab === "plan" ? (
                  <PlanView plan={complete?.battle_plan || []} />
                ) : canvasTab === "strategy" ? (
                  <div className="strategy-lab">
                    <nav className="strategy-lab-nav" aria-label="Strategy Lab tools">
                      <strong>STRATEGY LAB</strong>
                      <button className={strategyTab === "calc" ? "active" : ""} onClick={() => setStrategyTab("calc")}>Battle plan</button>
                      <button className={strategyTab === "flowchart" ? "active" : ""} onClick={() => setStrategyTab("flowchart")}>Contingencies</button>
                      <button className={strategyTab === "coach" ? "active" : ""} onClick={() => setStrategyTab("coach")}>Turn Coach</button>
                    </nav>
                    <div className="strategy-lab-body">
                      {strategyTab === "calc" ? <CalcView
                        gameMode={gameMode}
                        trainers={calcTrainers}
                        form={calcForm}
                        setForm={setCalcForm}
                        result={calcResult}
                        status={calcStatus}
                        progress={calcProgress}
                        runCalcSim={runCalcSim}
                        sample={calcSample}
                        onOpenFlowchart={() => setStrategyTab("flowchart")}
                        savedRuns={savedCalcRuns.filter((run) => (run.game_mode || "run-and-bun") === (gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun"))}
                        onOpenSavedRun={openSavedCalcRun}
                        onDeleteSavedRun={deleteSavedCalcRun}
                        simulatorForm={form}
                      /> : strategyTab === "flowchart" ? <FlowchartView
                        result={calcResult}
                        onExploreAll={exploreEveryBranch}
                        onCancelExplore={stopExploringBranches}
                        exploreStatus={calcStatus}
                        expansionProgress={flowchartProgress}
                        onOpenCoach={() => setStrategyTab("coach")}
                      /> : <CoachView
                        data={coachData}
                        state={coachState}
                        status={coachStatus}
                        log={coachLog}
                        turn={coachTurn}
                        hasTeam={Boolean(calcForm.imports && calcForm.imports.trim())}
                        onStart={coachStart}
                        onEdit={coachEdit}
                        onNext={coachNext}
                      />}
                    </div>
                  </div>
                ) : canvasTab === "demo" ? (
                  <JudgeDemoView data={judgeDemo} onOpenEvidence={() => setCanvasTab("gauntlet")} onOpenStrategy={() => setCanvasTab("strategy")} />
                ) : canvasTab === "simulators" ? (
                  gameMode === "emerald" ? <CalcView
                    gameMode={gameMode}
                    trainers={calcTrainers}
                    form={calcForm}
                    setForm={setCalcForm}
                    result={calcResult}
                    status={calcStatus}
                    progress={calcProgress}
                    runCalcSim={runCalcSim}
                    sample={calcSample}
                    onOpenFlowchart={() => { setCanvasTab("strategy"); setStrategyTab("flowchart"); }}
                    savedRuns={savedCalcRuns.filter((run) => (run.game_mode || "run-and-bun") === "pokemon-emerald")}
                    onOpenSavedRun={openSavedCalcRun}
                    onDeleteSavedRun={deleteSavedCalcRun}
                    simulatorForm={form}
                  /> : <SimulatorView
                    gameMode={gameMode}
                    trainers={calcTrainers}
                    events={simulatorEvents}
                    snapshot={simulatorSnapshot}
                    inspectStatus={simulatorInspectStatus}
                    validations={validatedLines}
                    form={form}
                    setForm={setForm}
                    onInspect={inspectSimulatorState}
                    onCheckpoint={createSimulatorCheckpoint}
                    onRun={runSimulator}
                    onKill={killJob}
                    running={status === "running" || status === "solve" || status === "recording"}
                    progress={progress}
                    proofProgress={proofProgress}
                    runLogs={simRunLogs.filter((run) => (run.game_mode || "run-and-bun") === (gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun"))}
                  />
                ) : canvasTab === "gauntlet" ? (
                  <GauntletView
                    gameMode={gameMode}
                    trainers={calcTrainers}
                    form={gauntletForm}
                    result={gauntletResult}
                    status={gauntletStatus}
                    progress={gauntletProgress}
                    onConfigure={() => setShowGauntletSetup(true)}
                    onRunProven={runProvenRoute}
                    savedRuns={savedGauntletRuns.filter((run) => (run.game_mode || "run-and-bun") === (gameMode === "emerald" ? "pokemon-emerald" : "run-and-bun"))}
                    localForm={form}
                    setLocalForm={setForm}
                  />
                ) : canvasTab === "changelog" ? (
                  <ChangelogView gameMode={gameMode} />
                ) : (
                  <div className="cards-view">
                    {complete?.team_plan && <TeamPlanSummary teamPlan={complete.team_plan} onApply={applyPreparedTeam} applyStatus={prepareApplyStatus} />}
                    {candidates.length === 0 ? <div className="empty">Box candidates will appear here during Prepare.</div> : candidates.map((c, i) => <Candidate key={`${c.name}-view-${i}`} candidate={c} onClick={() => setSelected(c)} />)}
                  </div>
                )}
              </div>
            </main>
          </div>
        );
      }

      function EmeraldView({ data, onPlanTrainer }) {
        const allTrainers = data.trainers || [];
        const checkpointLibrary = data.checkpoint_library || { entries:[], stats:{} };
        const checkpointEntries = checkpointLibrary.entries || [];
        const checkpointByTrainer = useMemo(() => {
          const grouped = new Map();
          checkpointEntries.forEach((entry) => {
            const id = Number(entry.trainer_id);
            if (!grouped.has(id)) grouped.set(id, []);
            grouped.get(id).push(entry);
          });
          return grouped;
        }, [checkpointEntries]);
        const trainers = useMemo(() => allTrainers.filter((trainer) => checkpointByTrainer.has(Number(trainer.id))).map((trainer) => {
          const captures = checkpointByTrainer.get(Number(trainer.id)) || [];
          return { ...trainer, captures, checkpoint_count:captures.length, tier:captures.some((entry) => entry.tier === "boss") ? "boss" : captures.some((entry) => entry.tier === "story") ? "story" : "trainer" };
        }), [allTrainers, checkpointByTrainer]);
        const locations = useMemo(() => (data.locations || []).map((item) => {
          const ids = (item.trainer_ids || []).filter((id) => checkpointByTrainer.has(Number(id)));
          return { ...item, trainer_ids:ids, required_count:ids.filter((id) => allTrainers.find((trainer) => Number(trainer.id) === Number(id))?.required).length };
        }).filter((item) => item.trainer_ids.length), [data.locations, checkpointByTrainer, allTrainers]);
        const stats = checkpointLibrary.stats || {};
        const [query, setQuery] = useState("");
        const [location, setLocation] = useState("");
        const [requiredOnly, setRequiredOnly] = useState(false);
        const [doublesOnly, setDoublesOnly] = useState(false);
        const [bossOnly, setBossOnly] = useState(false);
        const [selectedId, setSelectedId] = useState(trainers[0]?.id ?? null);
        const [mapMode, setMapMode] = useState("hoenn");
        const [exactMapId, setExactMapId] = useState("");
        const [mapZoom, setMapZoom] = useState(1);
        const exactMapViewportRef = useRef(null);

        const filtered = useMemo(() => {
          const needle = query.trim().toLowerCase();
          return trainers.filter((trainer) => {
            if (location && trainer.map_location !== location) return false;
            if (requiredOnly && !trainer.required) return false;
            if (doublesOnly && !trainer.is_double) return false;
            if (bossOnly && trainer.tier !== "boss") return false;
            if (!needle) return true;
            const haystack = [
              trainer.trainer_name, trainer.route, trainer.sublocation, trainer.map_location,
              ...(trainer.party || []).flatMap((mon) => [mon.species, ...(mon.moves || [])]),
            ].filter(Boolean).join(" ").toLowerCase();
            return haystack.includes(needle);
          });
        }, [trainers, query, location, requiredOnly, doublesOnly, bossOnly]);
        const bossTrainers = useMemo(() => trainers.filter((trainer) => trainer.tier === "boss"), [trainers]);

        const selected = trainers.find((trainer) => trainer.id === selectedId) || filtered[0] || null;
        const selectedLocation = location || selected?.map_location || "";
        const mapLocation = locations.find((item) => item.name === selectedLocation) || null;
        const trainerMarkers = mapLocation ? filtered.filter((trainer) => trainer.map_location === mapLocation.name) : [];
        const exactMaps = useMemo(() => {
          const grouped = new Map();
          trainers.forEach((trainer) => {
            const event = trainer.map_event;
            if (!event) return;
            if (!grouped.has(event.map_id)) grouped.set(event.map_id, { id:event.map_id, name:event.map_name, width:event.map_width, height:event.map_height, trainers:[] });
            grouped.get(event.map_id).trainers.push(trainer);
          });
          return [...grouped.values()].sort((a,b) => a.name.localeCompare(b.name));
        }, [trainers]);
        const activeExactMapId = exactMapId || selected?.map_event?.map_id || exactMaps[0]?.id || "";
        const activeExactMap = exactMaps.find((item) => item.id === activeExactMapId) || exactMaps[0] || null;
        useEffect(() => {
          if (mapMode !== "exact" || !selected?.map_event || !exactMapViewportRef.current) return;
          const timer = setTimeout(() => {
            const viewport = exactMapViewportRef.current;
            const pin = viewport?.querySelector(`[data-trainer-id="${selected.id}"]`);
            if (!viewport || !pin) return;
            viewport.scrollLeft = Math.max(0, pin.offsetLeft - viewport.clientWidth / 2);
            viewport.scrollTop = Math.max(0, pin.offsetTop - viewport.clientHeight / 2);
          }, 0);
          return () => clearTimeout(timer);
        }, [mapMode, activeExactMapId, selected?.id, mapZoom]);
        const setMapLocation = (name) => {
          const next = location === name ? "" : name;
          setLocation(next);
          const first = trainers.find((trainer) => !next || trainer.map_location === next);
          if (first) setSelectedId(first.id);
        };
        const selectTrainerOnMap = (trainer) => {
          setSelectedId(trainer.id);
          if (!trainer.map_event) return;
          setMapMode("exact");
          setExactMapId(trainer.map_event.map_id);
          setMapZoom(1);
        };

        return (
          <div className="emerald-view">
            <div className="emerald-shell">
              <section className="emerald-hero">
                <div>
                  <div className="emerald-kicker">JUDGE BUILD · ROM-FREE GEN III</div>
                  <h1>The completed Emerald run, battle by battle.</h1>
                  <p>Every playable fight below came from a real checkpoint in this finished save. Choose a trainer on the map, load the captured roster, and simulate it without downloading a GBA file.</p>
                </div>
                <div className="emerald-source">Sources: decoded user-owned checkpoints · <a href="https://docs.google.com/spreadsheets/d/1frqW2CeHop4o0NP6Ja_TAAPPkGIrvxkeQJBfyxFggyk/edit?gid=1064630895#gid=1064630895" target="_blank" rel="noreferrer">Emerald trainer sheet ↗</a> · <a href="https://github.com/pret/pokeemerald" target="_blank" rel="noreferrer">pret/pokeemerald maps ↗</a><br />No ROM or save-state binary is included in the judge build.</div>
              </section>

              <div className="emerald-stats">
                <div className="emerald-stat"><strong>{stats.checkpoints || checkpointEntries.length}</strong><span>Captured checkpoints</span></div>
                <div className="emerald-stat"><strong>{stats.unique_trainers || trainers.length}</strong><span>Playable battles</span></div>
                <div className="emerald-stat"><strong>{stats.boss_checkpoints || bossTrainers.length}</strong><span>Boss checkpoints</span></div>
                <div className="emerald-stat"><strong>{locations.length}</strong><span>Visited locations</span></div>
              </div>

              <section className="boss-checkpoint-rail" aria-label="Recommended difficult fights">
                <div className="boss-rail-head"><div><span>RECOMMENDED FOR JUDGES</span><strong>Boss fights and story walls</strong></div><button onClick={() => setBossOnly((value) => !value)}>{bossOnly ? "Show every captured fight" : "Focus bosses"}</button></div>
                <div className="boss-rail-scroll">{bossTrainers.map((trainer) => <button className={selected?.id === trainer.id ? "active" : ""} key={`boss-${trainer.id}`} onClick={() => selectTrainerOnMap(trainer)}>{trainer.map_event?.graphics_id && <img src={`/static/emerald-trainers/${trainer.map_event.graphics_id}.png`} alt="" />}<span><strong>{trainer.trainer_name}</strong><small>{trainer.map_location} · Lv. {Math.max(...trainer.party.map((mon) => Number(mon.level || 1)))}</small></span></button>)}</div>
              </section>

              <section className="emerald-controls" aria-label="Emerald trainer filters">
                <div><label htmlFor="emerald-search">Search trainer, Pokémon, move, or route</label><input id="emerald-search" value={query} onChange={(event) => setQuery(event.target.value)} placeholder="Try Roxanne, Route 110, Swampert, or Rock Tomb" /></div>
                <div><label htmlFor="emerald-location">Map location</label><select id="emerald-location" value={location} onChange={(event) => setMapLocation(event.target.value)}><option value="">All Hoenn locations</option>{locations.map((item) => <option value={item.name} key={item.name}>{item.name} · {item.trainer_ids.length}</option>)}</select></div>
                <button className={`emerald-filter ${requiredOnly ? "active" : ""}`} onClick={() => setRequiredOnly((value) => !value)}>{requiredOnly ? "Required only ✓" : "Required only"}</button>
                <button className={`emerald-filter ${doublesOnly ? "active" : ""}`} onClick={() => setDoublesOnly((value) => !value)}>{doublesOnly ? "Doubles only ✓" : "Doubles only"}</button>
                <button className={`emerald-filter ${bossOnly ? "active" : ""}`} onClick={() => setBossOnly((value) => !value)}>{bossOnly ? "Boss fights ✓" : "Boss fights"}</button>
              </section>

              <div className="emerald-workspace">
                <section className="emerald-panel">
                  <div className="emerald-panel-head"><strong>{mapMode === "hoenn" ? "Hoenn route atlas" : "Exact trainer map"}</strong><div className="atlas-mode-switch"><button className={mapMode === "hoenn" ? "active" : ""} onClick={() => setMapMode("hoenn")}>Hoenn</button><button className={mapMode === "exact" ? "active" : ""} onClick={() => { setMapMode("exact"); if (selected?.map_event) setExactMapId(selected.map_event.map_id); }}>Map floor</button></div></div>
                  {mapMode === "hoenn" ? <div className="hoenn-atlas" role="img" aria-label="Schematic Hoenn map with trainer location pins">
                    {locations.map((item) => {
                      const active = selectedLocation === item.name;
                      return <React.Fragment key={item.name}>
                        <button className={`map-pin ${item.required_count ? "required" : ""} ${active ? "active" : ""}`} style={{ left:`${item.x}%`, top:`${item.y}%` }} onClick={() => setMapLocation(item.name)} title={`${item.name}: ${item.trainer_ids.length} trainers${item.required_count ? `, ${item.required_count} required` : ""}`} aria-label={`${item.name}, ${item.trainer_ids.length} trainers`} />
                        {active && <span className="map-pin-label active" style={{ left:`${item.x}%`, top:`${item.y}%` }}>{item.name}<br />{item.trainer_ids.length} fights</span>}
                      </React.Fragment>;
                    })}
                    {trainerMarkers.map((trainer, index) => {
                      const ring = 2.2 + Math.floor(index / 10) * 1.45;
                      const angle = (index * 137.508) * Math.PI / 180;
                      const x = Math.max(2, Math.min(98, mapLocation.x + Math.cos(angle) * ring));
                      const y = Math.max(3, Math.min(97, mapLocation.y + Math.sin(angle) * ring * .72));
                      return <button
                        key={`trainer-pin-${trainer.id}`}
                        className={`trainer-map-pin ${trainer.required ? "required" : ""} ${selected?.id === trainer.id ? "active" : ""}`}
                        style={{ left:`${x}%`, top:`${y}%` }}
                        onClick={() => selectTrainerOnMap(trainer)}
                        title={`${trainer.trainer_name} · ${trainer.map_event ? `${trainer.map_event.map_name} tile ${trainer.map_event.x},${trainer.map_event.y}` : trainer.route}`}
                        aria-label={`Select ${trainer.trainer_name}`}
                      />;
                    })}
                  </div> : <div className="exact-map-shell">
                    <div className="exact-map-toolbar"><select value={activeExactMap?.id || ""} onChange={(event) => { setExactMapId(event.target.value); setMapZoom(1); const map = exactMaps.find((item) => item.id === event.target.value); if (map?.trainers[0]) setSelectedId(map.trainers[0].id); }} aria-label="Choose an Emerald map floor">{exactMaps.map((map) => <option value={map.id} key={map.id}>{map.name} · {map.trainers.length} trainer{map.trainers.length === 1 ? "" : "s"}</option>)}</select><div className="exact-map-zoom" aria-label="Map zoom"><button className={mapZoom === 1 ? "active" : ""} onClick={() => setMapZoom(1)}>Fit</button><button className={mapZoom === 2 ? "active" : ""} onClick={() => setMapZoom(2)}>2×</button></div></div>
                    {activeExactMap && <div className="exact-map-viewport" ref={exactMapViewportRef}><div className="exact-map-grid" style={{ width:`${mapZoom * 100}%`, aspectRatio:`${Math.max(1,activeExactMap.width)}/${Math.max(1,activeExactMap.height)}` }}>
                      <img className="exact-map-image" src={`/static/emerald-maps/${activeExactMap.name}.png`} alt={`${activeExactMap.name} rendered Pokémon Emerald map`} draggable="false" />
                      {activeExactMap.trainers.map((trainer) => <button data-trainer-id={trainer.id} key={`exact-${trainer.id}`} className={`exact-trainer-pin ${trainer.required ? "required" : ""} ${selected?.id === trainer.id ? "active" : ""}`} style={{ left:`${Math.max(1,Math.min(99,(trainer.map_event.x + .5) / Math.max(1,activeExactMap.width) * 100))}%`, top:`${Math.max(1,Math.min(99,(trainer.map_event.y + .5) / Math.max(1,activeExactMap.height) * 100))}%`, width:`${1 / Math.max(1,activeExactMap.width) * 100}%`, height:`${2 / Math.max(1,activeExactMap.height) * 100}%` }} onClick={() => selectTrainerOnMap(trainer)} title={`${trainer.trainer_name} · tile ${trainer.map_event.x}, ${trainer.map_event.y}`} aria-label={`Select ${trainer.trainer_name} at tile ${trainer.map_event.x}, ${trainer.map_event.y}`}><img src={`/static/emerald-trainers/${trainer.map_event.graphics_id}.png`} alt="" draggable="false" /></button>)}
                    </div><div className="exact-map-caption">Emerald map render · {activeExactMap.width} × {activeExactMap.height} tiles · click a trainer marker</div></div>}
                  </div>}
                </section>

                <section className="emerald-panel">
                  <div className="emerald-panel-head"><strong>{filtered.length} matching trainers</strong><span>Bold gold = required</span></div>
                  <div className="emerald-list">
                    {filtered.length ? filtered.map((trainer) => (
                      <button key={trainer.id} className={`emerald-trainer-row ${trainer.required ? "required" : ""} ${selected?.id === trainer.id ? "active" : ""}`} onClick={() => selectTrainerOnMap(trainer)}>
                        {trainer.map_event?.graphics_id && <img className="trainer-list-sprite" src={`/static/emerald-trainers/${trainer.map_event.graphics_id}.png`} alt="" />}
                        <span><span className="emerald-trainer-name"><span>{trainer.trainer_name}</span>{trainer.tier === "boss" && <span className="emerald-badge boss">BOSS</span>}{trainer.is_double && <span className="emerald-badge">DOUBLE</span>}</span>
                        <span className="emerald-trainer-meta">{trainer.route}{trainer.sublocation ? ` · ${trainer.sublocation}` : ""} · {trainer.party.length} Pokémon · {trainer.checkpoint_count} save{trainer.checkpoint_count === 1 ? "" : "s"}</span></span>
                      </button>
                    )) : <div className="emerald-empty">No trainer matches these filters.</div>}
                  </div>
                </section>

                <section className="emerald-panel">
                  <div className="emerald-panel-head"><strong>Trainer card</strong><span>{selected ? `Sheet row ${selected.source_row}` : "No selection"}</span></div>
                  {selected ? <div className="emerald-detail">
                    <div className="emerald-kicker">{selected.is_double ? "DOUBLE BATTLE" : "SINGLE BATTLE"}</div>
                    <h2>{selected.trainer_name}</h2>
                    <div className="emerald-detail-route">{selected.route}{selected.sublocation ? ` · ${selected.sublocation}` : ""}{selected.money ? ` · ₽${selected.money}` : ""}</div>
                    {selected.map_event && <div className="emerald-detail-route">Exact event: {selected.map_event.map_name} · tile ({selected.map_event.x}, {selected.map_event.y}) · sight {selected.map_event.sight}</div>}
                    {selected.required && <div className="emerald-required-note">Required to advance the Emerald story line</div>}
                    <button className="rnb-btn rnb-green" onClick={() => onPlanTrainer?.(selected.id)}>Plan this trainer</button>
                    <div className="emerald-party">
                      {selected.party.map((mon, index) => <div className="emerald-mon" key={`${selected.id}-${index}-${mon.species}`}>
                        <div className="emerald-mon-head"><strong>{index + 1}. {mon.species}</strong><span>Lv. {mon.level ?? "?"}</span></div>
                        <div className="emerald-moves">{(mon.moves || []).map((move) => <span className="emerald-move" key={move}>{move}</span>)}</div>
                        <div className="emerald-mon-stats">
                          <span><b>HP</b> {mon.stats?.hp ?? "—"}</span><span><b>ATK</b> {mon.stats?.attack ?? "—"}</span><span><b>DEF</b> {mon.stats?.defense ?? "—"}</span>
                          <span><b>SPA</b> {mon.stats?.sp_attack ?? "—"}</span><span><b>SPD</b> {mon.stats?.sp_defense ?? "—"}</span><span><b>SPE</b> {mon.stats?.speed ?? "—"}</span>
                        </div>
                      </div>)}
                    </div>
                  </div> : <div className="emerald-empty">Choose a trainer to inspect its full party.</div>}
                </section>
              </div>
            </div>
          </div>
        );
      }

      function TeamPlanSummary({ teamPlan, compact = false, onApply = null, applyStatus = "" }) {
        const fullTeam = teamPlan?.full_team || [];
        const play = teamPlan?.play_by_play || [];
        const itemRecs = teamPlan?.item_recommendations || [];
        if (!fullTeam.length && !play.length && !itemRecs.length) return null;
        return (
          <section className={compact ? "" : "battle-plan"} aria-label="Crafted calc team plan">
            {!compact && <h2>Crafted Calc Team</h2>}
            {fullTeam.length > 0 && (
              <div className="team-grid">
                {fullTeam.map((slot) => (
                  <div className={`team-slot ${slot.source === "box" ? "box" : ""}`} key={`team-slot-${slot.slot}`}>
                    <strong>{slot.slot}. {slot.name}</strong>
                    {slot.item ? ` @ ${slot.item}` : ""}
                    <div className="node-meta">
                      {slot.source === "box" ? `Box ${slot.box}, slot ${slot.box_slot}${slot.replaces ? ` · replaces ${slot.replaces}` : ""}` : `${slot.hp}/${slot.max_hp} HP · current team`}
                    </div>
                    {slot.item_note && <div className="coach-risk">{slot.item_note}</div>}
                  </div>
                ))}
              </div>
            )}
            {fullTeam.length > 0 && onApply && (
              <div className="candidate-details">
                <button
                  className="primary"
                  onClick={() => onApply(teamPlan)}
                  disabled={!teamPlan.apply_ready}
                >
                  Apply team + held items
                </button>
                {!teamPlan.apply_ready && <div className="coach-risk">{teamPlan.apply_error || "This plan cannot be applied to the selected save."}</div>}
                {applyStatus && <div className="node-meta">{applyStatus}</div>}
              </div>
            )}
            {!compact && play.length > 0 && (
              <div className="candidate-details">
                {itemRecs.length > 0 && (
                  <div className="candidate-calcs">
                    <span className="candidate-tag">Item plan</span>
                    {itemRecs.map((rec, index) => (
                      <div key={`item-rec-${index}`}>
                        {rec.pokemon}: {rec.current_item ? `${rec.current_item} -> ` : ""}{rec.suggested_item}
                        <div className="coach-risk">{rec.reason} Source: {rec.source}</div>
                      </div>
                    ))}
                  </div>
                )}
                <div className="candidate-plan">
                  <span className="candidate-tag">Step-by-step calc line</span>
                  {play.map((step) => (
                    <div className="coach-line" key={`coach-${step.turn}-${step.enemy}`}>
                      <div className="coach-title">Turn {step.turn}: {step.enemy} · {step.answer || "flex slot"}</div>
                      <div>{step.action}</div>
                      <div className="coach-calc">{step.calc}</div>
                      <div className="coach-risk">Consistency: {step.consistency}</div>
                      {(step.risks || []).slice(0, 4).map((risk, index) => <div className="coach-risk" key={`risk-${step.turn}-${index}`}>Risk: {risk}</div>)}
                    </div>
                  ))}
                </div>
                {teamPlan.risk_policy && <div className="candidate-calcs"><span className="candidate-tag">Policy</span><div>{teamPlan.risk_policy}</div></div>}
              </div>
            )}
            {teamPlan.verified_emulator_plan && <div className="candidate-calcs"><span className="candidate-tag">Emulator verified</span><div>{teamPlan.verified_emulator_plan}</div></div>}
          </section>
        );
      }

      function Candidate({ candidate, onClick }) {
        const calcs = candidate.matchup_summary || [];
        const plan = candidate.plan || [];
        const team = candidate.team || [];
        return (
          <div className={`candidate ${candidate.rank === 1 ? "best" : ""}`} onClick={onClick}>
            <strong>#{candidate.rank} {candidate.name} Lv.{candidate.level} Box{candidate.box}</strong>
            <div>Calc score: {Math.round(candidate.score || 0)} · Est. deathless: {pct(candidate.deathless_win_rate)} ↑ {pct(candidate.improvement)}</div>
            {(candidate.replace_name || candidate.suggested_item) && (
              <div className="node-meta">
                {candidate.replace_name ? `Replace ${candidate.replace_name}` : "Add to team"}
                {candidate.suggested_item ? ` · Item: ${candidate.suggested_item}` : ""}
              </div>
            )}
            {candidate.note && <div className="node-meta">{candidate.note}</div>}
            <div className="candidate-details">
              {team.length > 0 && <div className="candidate-team"><span className="candidate-tag">Team:</span> {team.join(" · ")}</div>}
              {plan.length > 0 && (
                <div className="candidate-plan">
                  <span className="candidate-tag">Plan</span>
                  {plan.slice(0, 4).map((line, index) => <div key={`${candidate.name}-plan-${index}`}>{line}</div>)}
                </div>
              )}
              {calcs.length > 0 && (
                <div className="candidate-calcs">
                  <span className="candidate-tag">Top calcs</span>
                  {calcs.slice(0, 3).map((calc, index) => (
                    <div key={`${candidate.name}-calc-${index}`}>
                      {calc.best_move || "No damage"} vs {calc.enemy}: {calc.damage} (crit {calc.crit_damage}); back {calc.enemy_best_move || "none"} {calc.enemy_damage} (crit {calc.enemy_crit_damage})
                      {(calc.enemy_risk_notes || []).length > 0 && <div>Risk: {(calc.enemy_risk_notes || []).slice(0, 2).join("; ")}</div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="meter"><span style={{ width: `${Math.max(2, Math.round((candidate.deathless_win_rate || 0) * 100))}%` }} /></div>
          </div>
        );
      }

      function PlanView({ plan }) {
        return (
          <section className="plan-view" aria-label="Projected battle plan">
            <h2>Projected Turn Outcomes</h2>
            {!plan.length ? (
              <div className="empty">Run a solve to see end-of-turn screenshots and HP snapshots here.</div>
            ) : plan.map((step) => (
              <div className="plan-card" key={`plan-view-${step.turn}`}>
                <div>
                  <div className="plan-card-turn">TURN {step.turn}</div>
                  <div className="plan-card-action">{step.action}</div>
                  <div className="plan-card-outcome">{step.outcome || "No projected HP snapshot for this turn."}</div>
                </div>
                <GameScreen screen={step.screen} className="plan-screen" missingClassName="plan-screen-missing" />
              </div>
            ))}
          </section>
        );
      }

      // ---- Changelog ----
      // One entry per push, oldest first. Early entries are reconstructed from the
      // project's docs and test artifacts (the repo predates version control).
      const CHANGELOG = [
        { version: "Push 1", date: "early project", title: "Emulator battle solver (MCTS)", items: [
          "mGBA-driven battle solver: pool of emulator instances, RNG desync, memory probing of party structs.",
          "MCTS whole-fight search with deathless-line priority, sack penalties, and nuzlocke weighting.",
          "CLI: solve / probe / calibrate / prepare commands with flowchart + JSON output.",
        ]},
        { version: "Push 2", date: "early project", title: "Web UI + live solve view", items: [
          "FastAPI server with WebSocket updates; React UI with battle tree, plan view, and box candidates.",
          "Prepare mode: decode the PC box from a save state and craft candidate teams.",
        ]},
        { version: "Push 3", date: "early project", title: "Run & Bun damage calc + trainer data", items: [
          "Ported the RnB damage calculator (items, abilities, natures, IVs/EVs, crit model).",
          "Imported every trainer battle (parties, items, abilities, moves) into trainer_battles.json.",

      function JudgeDemoView({ data, onOpenEvidence, onOpenStrategy }) {
        if (!data) return <section className="judge-demo"><div className="empty">Loading the committed judge sample…</div></section>;
        const proof = data.proof || {};
        const battle = data.sample_battle || {};
        return <section className="judge-demo" aria-label="ROM-free judge demo">
          <div className="gauntlet-hero">
            <div><div className="sim-kicker">ROM-FREE JUDGE MODE · RECORDED RESULT</div><h2>See what the solver proved without installing the game.</h2><p>{data.description}</p></div>
            <div className="sim-action-row"><button className="ghost" onClick={onOpenStrategy}>Open Strategy Lab</button><button className="primary" onClick={onOpenEvidence}>Watch local proof</button></div>
          </div>
          <div className="judge-proof-grid">
            <div><strong>{proof.trainer_count}</strong>connected fights</div>
            <div><strong>{proof.repeat_deathless_wins}/{proof.repeat_runs}</strong>deathless repeats</div>
            <div><strong>{proof.turn_count}</strong>recorded turns</div>
            <div><strong>{proof.savestate_loads_after_start}</strong>mid-run reloads</div>
            <div><strong>{proof.graveyard_used ? "YES" : "NO"}</strong>graveyard used</div>
          </div>
          <div className="judge-demo-grid">
            <article className="judge-panel">
              <div className="sim-kicker">WHAT THE PROGRAM DOES</div>
              <h3>State to strategy to cartridge proof</h3>
              <div className="judge-pipeline">{(data.pipeline || []).map((step) => <div key={step}>{step}</div>)}</div>
              <div className="judge-battle">
                <div className="sim-combatant"><span>YOUR ACTIVE</span><strong>{battle.player_active}</strong><em>{(battle.player_moves || []).join(" · ")}</em></div>
                <b>VS</b>
                <div className="sim-combatant enemy"><span>ENEMY ACTIVE</span><strong>{battle.enemy_active}</strong><em>{(battle.enemy_moves || []).join(" · ")}</em></div>
              </div>
              <p>{battle.trainer} · {battle.location}</p>
            </article>
            <article className="judge-panel">
              <div className="sim-kicker">VERIFIED CONNECTED ROUTE</div>
              <h3>{data.title}</h3>
              <div className="judge-route">{(data.route || []).map((fight, index) => <div className="judge-route-row" key={fight.trainer}><b>{index + 1}</b><span>{fight.trainer}</span><small>{fight.turns} turns · HP {compactHp(fight.ending_player_hp)}</small></div>)}</div>

      function CalcView({ gameMode, trainers, form, setForm, result, status, progress, runCalcSim, sample, onOpenFlowchart, savedRuns, onOpenSavedRun, onDeleteSavedRun, simulatorForm }) {
        const [showLineFinder, setShowLineFinder] = useState(true);
        const [trainerQuery, setTrainerQuery] = useState("");
        const [localTeamStatus, setLocalTeamStatus] = useState("");
        const levelCaps = gameMode === "emerald" ? (window.__EMERALD_DATA__?.level_caps || []) : [];
        const imported = useMemo(() => parseImportedPreview(form.imports), [form.imports]);
        const customEnemies = useMemo(() => parseImportedPreview(form.custom_enemy_imports), [form.custom_enemy_imports]);
        const builtInTrainer = trainers.find((trainer) => Number(trainer.id) === Number(form.trainer_id)) || trainers[0] || null;
        const selectedTrainer = form.custom_mode ? {
          id: -1,
          label: form.custom_trainer_name || "Custom Doubles",
          trainer_name: form.custom_trainer_name || "Custom Doubles",
          location: "Custom battle",
          section: "Custom tournament",
          is_double: Boolean(form.custom_is_double),
          party: customEnemies,
        } : builtInTrainer;
        const filteredTrainers = useMemo(() => {
          const tokens = trainerQuery.toLowerCase().trim().split(/\s+/).filter(Boolean);
          if (!tokens.length) return trainers;
          return trainers.filter((trainer) => {
            const haystack = [
              trainer.trainer_name, trainer.label, trainer.location, trainer.section,
              trainer.is_double ? "double doubles 2v2" : "single singles",
              ...(trainer.party || []).map((mon) => mon.species),
            ].filter(Boolean).join(" ").toLowerCase();
            const words = haystack.replace(/[^a-z0-9]+/g, " ").split(/\s+/).filter(Boolean);
            return tokens.every((token) => (
              haystack.includes(token)
              || (token.length >= 5 && words.some((word) => fcWithinEdits(token, word, 1)))
            ));
          });
        }, [trainers, trainerQuery]);
        const selectedTrainerIsVisible = filteredTrainers.some((trainer) => Number(trainer.id) === Number(form.trainer_id));
        const doublesMode = Boolean(selectedTrainer?.is_double);

        function setLead(side, fieldSlot, rawValue) {
          const key = side === "player" ? "player_leads" : "enemy_leads";
          const next = [...(form[key] || [])];
          next[fieldSlot] = rawValue === "" ? "" : Number(rawValue);
          setForm({ ...form, [key]: next });
        }

        async function loadEmeraldCheckpointTeam() {
          setLocalTeamStatus("Reading your local Emerald checkpoint…");
          try {
            const response = await fetch("/api/games/emerald/local-save", { cache: "no-store" });
            if (!response.ok) throw new Error(await response.text());
            const data = await response.json();
            setForm((current) => ({ ...current, imports: data.imports || current.imports }));
            setLocalTeamStatus(`${data.party_count} Pokémon loaded with exact levels, IVs, EVs, moves, and HP.`);
          } catch (error) {
            setLocalTeamStatus(`Could not read the checkpoint: ${error.message}`);
          }
        }

        function chooseTrainer(trainerId) {
          const trainer = trainers.find((item) => Number(item.id) === Number(trainerId));
          const ace = Math.max(1, ...(trainer?.party || []).map((mon) => Number(mon.level || 1)));
          const nextCap = levelCaps.find((cap) => Number(cap.ace_level) >= ace)?.ace_level || form.level_cap || 100;
          setForm({
            ...form,
            trainer_id: Number(trainerId),
            enemy_leads: [0, 1],
            level_cap: Number(nextCap),
            imports: gameMode === "emerald"
              ? (trainer?.checkpoint_roster_import || trainer?.checkpoint_team_import || form.imports)
              : form.imports,
          });
        }

        return (
          <section className="calc-engine-view battle-planner-only" aria-label={`${gameMode === "emerald" ? "Pokemon Emerald" : "Run and Bun"} battle planner`}>
            <div className="calc-engine-toolbar">
              <div>
                <strong>{gameMode === "emerald" ? "Captured battle planner" : "Run & Bun battle planner"}</strong> {gameMode === "emerald" ? "uses only fights decoded from this completed Emerald run. Choose a checkpoint and test the saved roster—no ROM or manual calculator required." : "finds a full line from the selected trainer and party."}
              </div>
              {gameMode === "emerald" && <div className="checkpoint-count-chip">{window.__EMERALD_DATA__?.checkpoint_library?.stats?.checkpoints || trainers.length} captured saves</div>}
            </div>
            <div className="calc-engine-body">
              {showLineFinder && (
                <aside className="line-finder-drawer" aria-label="Line finder">
                  <header>
                    <span>Battle setup</span>
                  </header>
                  <div className="line-finder-body">
                    <div className="rnb-small-note">Use the embedded calc as your workspace, then run this panel to find the best team member and projected line against the selected trainer.</div>

      function parseImportedPreview(text) {
        if (!text) return [];
        return text.split(/\n\s*\n/).map((block) => {
          const lines = block.split("\n").map((line) => line.trim()).filter(Boolean);
          if (!lines.length) return null;
          const header = lines[0] || "Pokemon";
          const itemParts = header.split("@").map((part) => part.trim());
          const nameSpecies = itemParts[0] || "Pokemon";
          const moveLines = lines.filter((line) => line.startsWith("- ")).map((line) => line.slice(2));
          const levelLine = lines.find((line) => /^Level:/i.test(line));
          const abilityLine = lines.find((line) => /^Ability:/i.test(line));
          return {
            name: nameSpecies.replace(/\(.+\)/, "").trim() || nameSpecies,
            species: (nameSpecies.match(/\(([^)]+)\)/) || [null, nameSpecies])[1],
            item: itemParts[1] || "",
            level: levelLine ? Number(levelLine.replace(/[^0-9]/g, "")) || 100 : 100,
            ability: abilityLine ? abilityLine.replace(/^Ability:\s*/i, "") : "",
            moves: moveLines,
          };
        }).filter(Boolean);
      }

      function buildLineFinderReport(result, selectedTrainer) {
        if (!result) return "";
        const lines = [];
        lines.push(`${result.game_label || "Run & Bun"} Line Finder Report`);
        lines.push("");
        if (selectedTrainer) {
          lines.push(`Trainer: ${selectedTrainer.label}`);
          lines.push("Enemy team:");
          (selectedTrainer.party || []).forEach((mon, index) => {
            lines.push(`${index + 1}. ${mon.species} Lv.${mon.level || "?"}${mon.item ? ` @ ${mon.item}` : ""}`);
            lines.push(`   Moves: ${(mon.moves || []).join(" / ") || "unknown"}`);
          });
          lines.push("");
        }
        lines.push(`Current-item result: ${result.result} | confidence ${Math.round((result.confidence || 0) * 100)}%`);
        if (result.location) lines.push(`Location: ${result.location}`);
        lines.push(`Policy: ${result.risk_policy || (result.crit_safe ? "Enemy crit-aware mode is on." : "Normal mode.")}`);
        lines.push("");
        lines.push("Current imported team:");
        (result.team || []).forEach((mon, index) => {
          lines.push(`${index + 1}. ${mon.name || mon.species}${mon.item ? ` @ ${mon.item}` : ""} (${mon.hp || "?"}/${mon.max_hp || "?"} HP)`);
          lines.push(`   Moves: ${(mon.moves || []).join(" / ") || "unknown"}`);
        });
        if ((result.item_recommendations || []).length) {
          lines.push("");
          lines.push("Item recommendations:");
          result.item_recommendations.forEach((rec, index) => {
            lines.push(`${index + 1}. ${rec.pokemon}: ${rec.current_item ? `${rec.current_item} -> ` : ""}${rec.suggested_item}`);
            lines.push(`   Reason: ${rec.reason}`);
            lines.push(`   Source: ${rec.source}`);
          });
        }
        lines.push("");
        lines.push("Current-item line:");
        appendTurns(lines, result.turns || [], "Turn");
        if (result.optimized_item_line) {
          lines.push("");
          lines.push(`Recommended-item result: ${result.optimized_item_line.result} | confidence ${Math.round((result.optimized_item_line.confidence || 0) * 100)}%`);
          if ((result.optimized_item_line.item_changes || []).length) {
            lines.push("Recommended-item changes:");
            result.optimized_item_line.item_changes.forEach((change, index) => {
              lines.push(`${index + 1}. ${change.pokemon}: ${change.old_item ? `${change.old_item} -> ` : ""}${change.new_item}`);
              if (change.reason) lines.push(`   Reason: ${change.reason}`);
            });
          }
          lines.push("Recommended-item line:");
          appendTurns(lines, result.optimized_item_line.turns || [], "Alt Turn");
        }
        if ((result.matchups || []).length) {
          lines.push("");
          lines.push("Top matchup table:");
          (result.matchups || []).slice(0, 12).forEach((row) => {
            lines.push(`${row.player} vs ${row.enemy}: player ${row.best_move || "none"} ${row.damage}; enemy ${row.enemy_best || "none"} ${row.enemy_damage}`);
          });
        }
        return lines.join("\n");
      }

      function appendTurns(lines, turns, label) {
        if (!turns.length) {
          lines.push("No turns printed.");
          return;
        }
        turns.forEach((turn) => {
          lines.push(`${label} ${turn.turn}: ${turn.enemy} | ${turn.answer}`);
          lines.push(`Action: ${turn.action}`);
          lines.push(`Calc: ${turn.calc}`);
          lines.push(`HP: ${turn.your_hp} | Enemy: ${turn.enemy_hp} | ${turn.consistency}`);
          (turn.risks || []).forEach((risk) => lines.push(`Risk: ${risk}`));
        });
      }

      async function copyTextToClipboard(text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      }

      // ---- Plain-English Battle Plan (printable PDF) ----

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // Translate a 0..1 confidence into a plain-English band + one-line meaning.
      function confidenceBand(value) {
        const v = value || 0;
        if (v >= 0.85) return { word: "Very safe", blurb: "This line is stable. It mostly relies on accurate moves, clean KOs, and the enemy having few dangerous alternatives." };
        if (v >= 0.65) return { word: "Solid", blurb: "This line usually holds. A few rolls, enemy choices, or secondary effects could shake it, but the plan is sound." };
        if (v >= 0.45) return { word: "Shaky", blurb: "This line works under the modeled assumptions, but it leans on favorable rolls, accurate moves, or the enemy not picking a dangerous branch." };
        if (v >= 0.25) return { word: "Risky", blurb: "This is the best line found, but it is exposed to misses, crits, alternate AI choices, or sacks. Expect to reset sometimes." };
        return { word: "Very risky", blurb: "This line is barely held together — it may be blocked, depend on hax, or rely on branches the planner does not trust." };
      }

      function confidenceRange(result) {
        const range = result && result.confidence_range;
        if (!range || range.floor == null || range.ceiling == null) return pct(result && result.confidence);
        return `${pct(range.floor)}–${pct(range.ceiling)}`;
      }

      // Turn confidence is a running cumulative product. The drop at each turn shows
      // how much that turn cost. This surfaces the turns that actually pulled the number down.
      function confidenceDrops(turns) {
        const rows = [];
        let prev = 1.0;
        (turns || []).forEach((turn) => {
          const now = typeof turn.confidence === "number" ? turn.confidence : prev;
          const drop = Math.max(0, prev - now);
          rows.push({ turn, drop, running: now });
          prev = now;
        });
        return rows.filter((row) => row.drop > 0.001).sort((a, b) => b.drop - a.drop);
      }

      function moveFromAction(action) {
        const match = /click\s+(.+?)\.?$/i.exec(action || "");
        return match ? match[1] : (action || "");
      }

      function plainTurnInstruction(turn) {
        const move = moveFromAction(turn.action);
        if (move) return `Use ${move} with ${turn.answer} against ${turn.enemy}.`;
        return `${turn.answer} acts against ${turn.enemy}.`;
      }

      // Heart Scales in Run & Bun: spent at the Move Relearner NPC found in every
      // Pokémon Center. Costs: relearn a move = 1, max one IV = 1, change nature = 3.
      // They are finite (you cannot farm them) and the bag is locked during battles,
      // so plan moves/IVs/natures BEFORE the fight. Sources are progression-ordered.
      const HEART_SCALE_SOURCES = [
        { where: "Route 104", count: 1, note: "North-west corner of the beach (hidden)" },
        { where: "Route 106", count: 1, note: "Rock furthest north-west at the beach" },
        { where: "Petalburg City", count: 1, note: "Surf past the northern pond" },
        { where: "Route 105", count: 1, note: "Rock at the south-west corner (Surf)" },
        { where: "Route 109", count: 1, note: "Island with no NPCs (hidden, Surf)" },
        { where: "Route 115", count: 1, note: "South-west corner of the beach (Surf)" },
        { where: "Route 118", count: 2, note: "SW island (hidden) + SW-corner rock (Surf)" },
        { where: "Route 119", count: 2, note: "South of the bridge past the Weather Institute" },
        { where: "Aqua Hideout", count: 1, note: "Generator room by Electrode-H" },
        { where: "Lilycove City", count: 1, note: "Dive and resurface NW" },
        { where: "Route 124", count: 4, note: "Underwater (Dive)" },
        { where: "Route 126", count: 2, note: "Underwater (Dive)" },
        { where: "Route 127", count: 2, note: "Underwater (Dive)" },
        { where: "Route 128", count: 3, note: "Underwater (Dive)" },
        { where: "Route 132", count: 1, note: "Underwater (Dive)" },
        { where: "Route 134", count: 1, note: "Underwater (Dive)" },
        { where: "Route 114", count: 1, note: "Up the Waterfall" },
        { where: "Victory Road", count: 2, note: "Two on the ice floor" },
      ];
      // Estimated heart scales realistically collectable by each gym "split" the
      // trainer belongs to. An estimate — the player can override it in the UI.
      const SECTION_HEART_SCALES = {
        "Brawly Split": 2,
        "Roxanne Split": 3,
        "Wattson Split": 5,
        "Norman Split": 8,
        "Flannery Split": 11,
        "Winona Split": 14,
        "Tate & Liza Split": 18,
        "Juan Split": 21,
        "Victory Road Split": 25,
        "Pokémon League": 27,
      };

      function estimateHeartScales(selectedTrainer) {
        const section = selectedTrainer && selectedTrainer.section;
        if (section && SECTION_HEART_SCALES[section] != null) return SECTION_HEART_SCALES[section];
        return null;
      }

      function renderPlanSteps(turns) {
        if (!(turns || []).length) return `<p class="bp-muted">No turns were printed for this line.</p>`;
        return `<ol class="bp-steps">` + (turns || []).map((turn) => `
              <li>
                <div class="bp-step-head">Turn ${escapeHtml(turn.turn)} &mdash; ${escapeHtml(turn.answer)} vs ${escapeHtml(turn.enemy)}</div>
                <div class="bp-step-do">${escapeHtml(plainTurnInstruction(turn))}</div>
                ${turn.calc ? `<div class="bp-step-detail">What happens: ${escapeHtml(turn.calc)}</div>` : ""}
                <div class="bp-step-detail">Your HP after: ${escapeHtml(turn.your_hp)} &nbsp;|&nbsp; Enemy HP after: ${escapeHtml(turn.enemy_hp)}</div>
                ${(turn.risks || []).length ? `<div class="bp-step-risk"><strong>Watch out for:</strong> ${escapeHtml((turn.risks || []).join(" · "))}</div>` : ""}
              </li>`).join("") + `</ol>`;
      }

      // Surface Run & Bun strategy reminders relevant to the imported team.
      function strategyNotes(result) {
        const notes = [
          "Battles are Set mode: when an enemy faints you choose your next Pokémon, but you cannot switch freely on your own turn. The plan already plays around this.",
          "The bag is locked during trainer battles — no potions, no X-items, no berries you throw. All healing must come from moves/abilities/held berries.",
        ];
        const moves = new Set();
        (result.team || []).forEach((mon) => (mon.moves || []).forEach((m) => moves.add(String(m).toLowerCase())));
        const has = (name) => moves.has(name.toLowerCase());
        if (has("Fake Out")) notes.push("Lead with Fake Out for free chip damage and a guaranteed flinch on turn one — great for scouting or stalling a turn.");
